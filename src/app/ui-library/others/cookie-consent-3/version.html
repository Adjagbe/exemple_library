<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Consent 3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; min-height: 100vh; }
.demo-content { padding-top: 80px; padding-left: 2rem; text-align: center; color: #6b7280; padding-right: 2rem; }
.cc3 { position: fixed; top: 0; left: 0; right: 0; background: #111827; z-index: 9999; }
.cc3__inner { max-width: 1100px; margin: 0 auto; padding: .875rem 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.cc3__text { flex: 1; font-size: .8rem; color: rgba(255,255,255,.8); line-height: 1.6; display: flex; align-items: center; gap: .5rem; min-width: 200px; }
.cc3__text a { color: #818cf8; text-decoration: none; }
.cc3__btns { display: flex; gap: .75rem; flex-shrink: 0; }
.cc3__refuse { padding: .5rem 1.25rem; background: transparent; color: rgba(255,255,255,.7); border: 1px solid rgba(255,255,255,.2); border-radius: .625rem; font-weight: 600; font-size: .8rem; cursor: pointer; }
.cc3__accept { padding: .5rem 1.25rem; background: #4f46e5; color: #fff; border: none; border-radius: .625rem; font-weight: 700; font-size: .8rem; cursor: pointer; }
.cc3__refuse:hover { background: rgba(255,255,255,.08); }
.cc3__accept:hover { background: #4338ca; }
</style>
</head>
<body>
<div class="cc3" id="cc3">
  <div class="cc3__inner">
    <div class="cc3__text">
      <i class="bi bi-cookie"></i> Ce site utilise des cookies pour améliorer votre expérience.
      <a href="#">En savoir plus</a>
    </div>
    <div class="cc3__btns">
      <button class="cc3__refuse" onclick="hideCC()">Refuser</button>
      <button class="cc3__accept" onclick="hideCC()">Accepter</button>
    </div>
  </div>
</div>

<script>
function hideCC() { document.getElementById('cc3').style.display='none'; document.querySelector('.demo-content').style.paddingTop = '2rem'; }
</script>
</body>
</html>
