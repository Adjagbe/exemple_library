<div class="modal3-demo">
  <button class="modal3-open-btn" (click)="open = true"><i class="bi bi-trash3"></i> Supprimer l'élément</button>
</div>
<div *ngIf="open" class="modal3-backdrop" (click)="open = false">
  <div class="modal3" (click)="$event.stopPropagation()">
    <div class="modal3__icon-wrap"><i class="bi bi-exclamation-triangle-fill"></i></div>
    <h3>Confirmer la suppression</h3>
    <p>Cette action est irréversible. L'élément sera définitivement supprimé de vos données.</p>
    <div class="modal3__btns">
      <button class="modal3__cancel" (click)="open = false">Annuler</button>
      <button class="modal3__delete" (click)="open = false"><i class="bi bi-trash3"></i> Supprimer</button>
    </div>
  </div>
</div>
