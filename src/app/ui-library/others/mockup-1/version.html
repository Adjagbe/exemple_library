<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup 1</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f0f4ff, #faf5ff); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 2rem; }
.mk1 { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 1.3fr; gap: 4rem; align-items: center; }
.mk1__text h2 { font-size: 2.25rem; font-weight: 800; color: #111827; line-height: 1.2; margin-bottom: 1.25rem; }
.mk1__text p { font-size: 1rem; color: #6b7280; line-height: 1.75; margin-bottom: 2rem; }
.mk1__btn { background: #4f46e5; color: #fff; border: none; padding: .875rem 2rem; border-radius: .875rem; font-size: .95rem; font-weight: 700; cursor: pointer; }
.mk1__browser { background: #fff; border-radius: 1.25rem; box-shadow: 0 16px 48px rgba(0,0,0,.12); overflow: hidden; }
.mk1__browser-bar { background: #f8fafc; border-bottom: 1px solid #e5e7eb; padding: .875rem 1.25rem; display: flex; align-items: center; gap: .75rem; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-r { background: #ef4444; }
.dot-y { background: #f59e0b; }
.dot-g { background: #10b981; }
.mk1__url { flex: 1; background: #f1f5f9; border-radius: .5rem; padding: .375rem .75rem; font-size: .75rem; color: #64748b; margin-left: .5rem; }
.mk1__screen { padding: 1.25rem; background: #f8fafc; }
.mk1__screen-nav { background: #fff; border-radius: .625rem; height: 36px; margin-bottom: .875rem; border: 1px solid #e5e7eb; }
.mk1__screen-hero { background: linear-gradient(135deg, #e0e7ff, #ede9fe); border-radius: .625rem; height: 80px; margin-bottom: .875rem; }
.mk1__screen-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .625rem; }
.mk1__screen-block { background: #e5e7eb; border-radius: .5rem; height: 56px; }
</style>
</head>
<body>
<div class="mk1">
  <div class="mk1__text">
    <h2>Un dashboard pensé pour la performance</h2>
    <p>Interface intuitive et responsive, conçue pour vous donner une vue d'ensemble claire de vos projets et métriques clés.</p>
    <button class="mk1__btn">Découvrir la démo</button>
  </div>
  <div class="mk1__browser">
    <div class="mk1__browser-bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <div class="mk1__url">app.example.com</div>
    </div>
    <div class="mk1__screen">
      <div class="mk1__screen-nav"></div>
      <div class="mk1__screen-hero"></div>
      <div class="mk1__screen-grid">
        <div class="mk1__screen-block"></div>
        <div class="mk1__screen-block"></div>
        <div class="mk1__screen-block"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
