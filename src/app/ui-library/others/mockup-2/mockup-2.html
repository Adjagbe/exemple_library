<section class="mk2">
  <div class="mk2__inner">
    <div class="mk2__phone">
      <div class="mk2__notch"></div>
      <div class="mk2__pscreen">
        <div class="mk2__pbar"></div>
        <div class="mk2__pcard mk2__pcard--hero"></div>
        <div class="mk2__pgrid">
          <div class="mk2__pcard"></div>
          <div class="mk2__pcard"></div>
        </div>
        <div class="mk2__plist">
          <div *ngFor="let i of [1,2,3]" class="mk2__pitem"><div class="mk2__pavatar"></div><div class="mk2__plines"><span></span><span></span></div></div>
        </div>
      </div>
    </div>
    <div class="mk2__text">
      <div class="mk2__badge"><i class="bi bi-phone"></i> Mobile first</div>
      <h2>Une expérience mobile exceptionnelle</h2>
      <p>Chaque fonctionnalité est pensée pour les usages en mobilité. Rapide, intuitive, élégante.</p>
      <div class="mk2__features">
        <div class="mk2__feat"><i class="bi bi-lightning-charge"></i><span>Chargement instantané</span></div>
        <div class="mk2__feat"><i class="bi bi-hand-index-thumb"></i><span>Gestes naturels</span></div>
        <div class="mk2__feat"><i class="bi bi-moon-stars"></i><span>Mode sombre inclus</span></div>
      </div>
    </div>
  </div>
</section>
