<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter 3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; padding: 4rem 2rem; display: flex; justify-content: center; }
.nl3 { max-width: 560px; width: 100%; text-align: center; }
.nl3 h2 { font-size: 1.75rem; font-weight: 800; color: #111827; margin-bottom: .75rem; }
.nl3 > p { color: #6b7280; line-height: 1.75; margin-bottom: 2rem; }
.nl3__freq { display: flex; gap: .75rem; justify-content: center; margin-bottom: 1.75rem; flex-wrap: wrap; }
.nl3__freq-btn { display: flex; align-items: center; gap: .5rem; border: 1.5px solid #e5e7eb; background: #fff; color: #374151; padding: .625rem 1.25rem; border-radius: .875rem; font-size: .875rem; font-weight: 600; cursor: pointer; transition: all .2s; }
.nl3__freq-btn.active { background: #eef2ff; border-color: #4f46e5; color: #4f46e5; }
.nl3__form { display: flex; gap: .75rem; background: #fff; border: 1.5px solid #e5e7eb; border-radius: 9999px; padding: .375rem .375rem .375rem 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 1rem; }
.nl3__form input { flex: 1; border: none; font-size: .9rem; color: #374151; outline: none; background: transparent; }
.nl3__form input::placeholder { color: #9ca3af; }
.nl3__form button { background: #4f46e5; color: #fff; border: none; padding: .625rem 1.5rem; border-radius: 9999px; font-size: .875rem; font-weight: 700; cursor: pointer; }
.nl3__success { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 1.25rem; padding: 2rem; text-align: center; }
.nl3__success i { font-size: 2rem; color: #10b981; margin-bottom: .75rem; }
.nl3__success h3 { font-weight: 700; color: #111827; margin-bottom: .5rem; }
.nl3__success p { font-size: .875rem; color: #6b7280; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="nl3">
  <h2>Choisissez votre fréquence</h2>
  <p>Personnalisez la fréquence de réception de notre newsletter selon vos préférences.</p>
  <div class="nl3__freq" id="freqBtns">
    <button class="nl3__freq-btn" onclick="setFreq('daily', this)"><i class="bi bi-calendar-day"></i> Quotidienne</button>
    <button class="nl3__freq-btn active" onclick="setFreq('weekly', this)"><i class="bi bi-calendar-week"></i> Hebdomadaire</button>
    <button class="nl3__freq-btn" onclick="setFreq('monthly', this)"><i class="bi bi-calendar-month"></i> Mensuelle</button>
  </div>
  <div class="nl3__form" id="form">
    <input type="email" id="email" placeholder="Votre adresse email">
    <button onclick="subscribe()">S'abonner</button>
  </div>
  <div class="nl3__success hidden" id="success">
    <i class="bi bi-envelope-check-fill"></i>
    <h3>Abonnement confirmé !</h3>
    <p id="freqMsg">Vous recevrez nos emails chaque semaine.</p>
  </div>
</div>
<script>
let freq = 'weekly';
const freqLabels = { daily: 'chaque jour', weekly: 'chaque semaine', monthly: 'chaque mois' };
function setFreq(f, btn) {
  freq = f;
  document.querySelectorAll('.nl3__freq-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function subscribe() {
  const email = document.getElementById('email').value;
  if (!email) return;
  document.getElementById('form').classList.add('hidden');
  document.getElementById('freqBtns').classList.add('hidden');
  document.getElementById('freqMsg').textContent = 'Vous recevrez nos emails ' + freqLabels[freq] + '.';
  document.getElementById('success').classList.remove('hidden');
}
</script>
</body>
</html>
