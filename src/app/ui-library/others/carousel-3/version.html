<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel 3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; padding: 4rem 2rem; display: flex; justify-content: center; }
.car3 { max-width: 700px; width: 100%; }
.car3__card { background: #fff; border: 1.5px solid #e5e7eb; border-radius: 2rem; padding: 3rem; box-shadow: 0 4px 16px rgba(0,0,0,.06); }
.car3__quote { font-size: 3rem; color: #e0e7ff; margin-bottom: 1.25rem; line-height: 1; }
.car3__stars { color: #f59e0b; font-size: 1.1rem; margin-bottom: 1.5rem; letter-spacing: .1em; }
.car3__text { font-size: 1.15rem; font-style: italic; color: #374151; line-height: 1.75; margin-bottom: 2rem; }
.car3__author { display: flex; align-items: center; gap: 1rem; }
.car3__avatar { width: 52px; height: 52px; border-radius: 50%; color: #fff; font-size: .875rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.car3__author-name { font-weight: 700; color: #111827; font-size: .9rem; }
.car3__author-role { font-size: .78rem; color: #6b7280; }
.car3__nav { display: flex; align-items: center; justify-content: center; gap: 1.25rem; margin-top: 2rem; }
.car3__nav-btn { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #e5e7eb; background: #fff; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.car3__nav-btn:hover { background: #f3f4f6; }
.car3__counter { font-size: .875rem; color: #6b7280; font-weight: 600; min-width: 40px; text-align: center; }
</style>
</head>
<body>
<div class="car3">
  <div class="car3__card" id="card">
  </div>
  <div class="car3__nav">
    <button class="car3__nav-btn" onclick="prev()"><i class="bi bi-arrow-left"></i></button>
    <span class="car3__counter" id="counter">1 / 3</span>
    <button class="car3__nav-btn" onclick="next()"><i class="bi bi-arrow-right"></i></button>
  </div>
</div>
<script>
(function() {

const items = [
  { initials:'SM', color:'#4f46e5', name:'Sophie Martin', role:'CEO, TechStart', text:'Cette plateforme a transformé notre façon de travailler. Nos équipes sont deux fois plus productives depuis que nous l\'avons adoptée.' },
  { initials:'LB', color:'#0ea5e9', name:'Lucas Bernard', role:'CTO, InnovateLab', text:'L\'intégration a été simple et le support est exceptionnel. Je recommande vivement à toute startup en croissance.' },
  { initials:'ED', color:'#10b981', name:'Emma Dubois', role:'Product Manager, Scaleup', text:'Les fonctionnalités de collaboration temps réel sont incroyables. Nous avons réduit nos délais de livraison de 40%.' }
];

let cur = 0;

function render() {
  const t = items[cur];
  const card = document.getElementById('card');
  const counter = document.getElementById('counter');

  if (!card || !counter) return; // 🔥 évite erreur Angular

  card.innerHTML = `
    <div class="car3__quote"><i class="bi bi-quote"></i></div>
    <div class="car3__stars">★★★★★</div>
    <div class="car3__text">"${t.text}"</div>
    <div class="car3__author">
      <div class="car3__avatar" style="background:${t.color};">${t.initials}</div>
      <div>
        <div class="car3__author-name">${t.name}</div>
        <div class="car3__author-role">${t.role}</div>
      </div>
    </div>
  `;

  counter.textContent = (cur + 1) + ' / ' + items.length;
}

// 👇 exposer au HTML
window.prev = function() {
  cur = (cur - 1 + items.length) % items.length;
  render();
};

window.next = function() {
  cur = (cur + 1) % items.length;
  render();
};

render();

})();
</script>
</body>
</html>
