<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon 2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; }
.cs2 { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.cs2__inner { max-width: 560px; width: 100%; text-align: center; }
.cs2__icon { font-size: 3rem; color: #4f46e5; margin-bottom: 1.5rem; }
.cs2__inner h1 { font-size: 2.5rem; font-weight: 800; color: #111827; margin: 0 0 1rem; line-height: 1.2; }
.cs2__inner > p { font-size: .95rem; color: #6b7280; margin: 0 0 2.5rem; line-height: 1.8; }
.cs2__progress-wrap { margin-bottom: 2.5rem; }
.cs2__progress-bar { height: 8px; background: #e5e7eb; border-radius: 9999px; overflow: hidden; margin-bottom: .75rem; }
.cs2__progress-fill { height: 100%; width: 65%; background: linear-gradient(90deg, #4f46e5, #7c3aed); border-radius: 9999px; }
.cs2__progress-label { font-size: .8rem; color: #6b7280; text-align: right; }
.cs2__countdown { display: flex; justify-content: center; gap: .75rem; flex-wrap: wrap; }
.cs2__unit { background: #fff; border: 1px solid #e5e7eb; border-radius: 1rem; padding: 1.25rem 1.5rem; min-width: 90px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.cs2__val { font-size: 2.5rem; font-weight: 900; color: #111827; display: block; line-height: 1; }
.cs2__lbl { font-size: .7rem; color: #9ca3af; text-transform: uppercase; letter-spacing: .08em; margin-top: .375rem; display: block; }
.cs2__sep { font-size: 2rem; color: #d1d5db; font-weight: 700; line-height: 1; display: flex; align-items: center; }
</style>
</head>
<body>
<div class="cs2">
  <div class="cs2__inner">
    <div class="cs2__icon"><i class="bi bi-rocket-takeoff-fill"></i></div>
    <h1>Lancement imminent</h1>
    <p>Notre produit est en cours de finalisation. Suivez notre progression et soyez notifié dès le lancement.</p>
    <div class="cs2__progress-wrap">
      <div class="cs2__progress-bar"><div class="cs2__progress-fill"></div></div>
      <div class="cs2__progress-label">65% complété</div>
    </div>
    <div class="cs2__countdown">
      <div class="cs2__unit"><span class="cs2__val" id="days">30</span><span class="cs2__lbl">Jours</span></div>
      <span class="cs2__sep">:</span>
      <div class="cs2__unit"><span class="cs2__val" id="hours">12</span><span class="cs2__lbl">Heures</span></div>
      <span class="cs2__sep">:</span>
      <div class="cs2__unit"><span class="cs2__val" id="mins">00</span><span class="cs2__lbl">Minutes</span></div>
      <span class="cs2__sep">:</span>
      <div class="cs2__unit"><span class="cs2__val" id="secs">00</span><span class="cs2__lbl">Secondes</span></div>
    </div>
  </div>
</div>
<script>
const target = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000 + 12 * 3600 * 1000);
function update() {
  const diff = target - Date.now();
  if (diff <= 0) return;
  document.getElementById('days').textContent = String(Math.floor(diff / 86400000)).padStart(2,'0');
  document.getElementById('hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
  document.getElementById('mins').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
  document.getElementById('secs').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
}
update();
setInterval(update, 1000);
</script>
</body>
</html>
