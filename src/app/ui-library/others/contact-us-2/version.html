<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us 2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
.cu2 { max-width: 820px; margin: 0 auto; padding: 5rem 2rem; }
.cu2 h2 { font-size: 2rem; font-weight: 800; color: #111827; margin: 0 0 .875rem; text-align: center; }
.cu2 > p { font-size: .95rem; color: #6b7280; text-align: center; margin: 0 0 3rem; line-height: 1.8; }
.cu2__topics { display: grid; grid-template-columns: repeat(4, 1fr); gap: .875rem; margin-bottom: 3rem; }
.cu2__topic { background: #fff; border: 2px solid #e5e7eb; border-radius: 1rem; padding: 1.25rem; text-align: center; cursor: pointer; transition: all .15s; }
.cu2__topic:nth-child(5) { grid-column: 1 / -1; max-width: 200px; margin: 0 auto; }
.cu2__topic.active { background: #eef2ff; border-color: #4f46e5; }
.cu2__topic i { font-size: 1.5rem; color: #6b7280; display: block; margin-bottom: .5rem; }
.cu2__topic.active i { color: #4f46e5; }
.cu2__topic span { font-size: .8rem; font-weight: 600; color: #374151; }
.cu2__topic.active span { color: #4f46e5; }
.cu2__form { background: #fff; border: 1px solid #e5e7eb; border-radius: 1.5rem; padding: 2.5rem; }
.cu2__row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.cu2__field { display: flex; flex-direction: column; gap: .375rem; margin-bottom: 1rem; }
.cu2__field label { font-size: .8rem; font-weight: 700; color: #374151; }
.cu2__field input, .cu2__field textarea { padding: .875rem 1rem; border: 1px solid #e5e7eb; border-radius: .875rem; font-size: .875rem; font-family: inherit; outline: none; }
.cu2__field input:focus, .cu2__field textarea:focus { border-color: #4f46e5; }
.cu2__field textarea { resize: vertical; }
.cu2__bottom { display: flex; justify-content: flex-end; }
.cu2__send { padding: .875rem 2rem; background: #4f46e5; color: #fff; border: none; border-radius: .875rem; font-weight: 700; font-size: .875rem; cursor: pointer; display: flex; align-items: center; gap: .5rem; }
</style>
</head>
<body>
<div class="cu2">
  <h2>Comment pouvons-nous vous aider ?</h2>
  <p>Sélectionnez le sujet qui correspond à votre demande, puis remplissez le formulaire.</p>
  <div class="cu2__topics">
    <div class="cu2__topic active" onclick="selectTopic(0, this)"><i class="bi bi-headset"></i><span>Support</span></div>
    <div class="cu2__topic" onclick="selectTopic(1, this)"><i class="bi bi-file-earmark-text"></i><span>Facturation</span></div>
    <div class="cu2__topic" onclick="selectTopic(2, this)"><i class="bi bi-people"></i><span>Partenariat</span></div>
    <div class="cu2__topic" onclick="selectTopic(3, this)"><i class="bi bi-newspaper"></i><span>Presse</span></div>
    <div class="cu2__topic" onclick="selectTopic(4, this)"><i class="bi bi-question-circle"></i><span>Autre</span></div>
  </div>
  <div class="cu2__form">
    <div class="cu2__row">
      <div class="cu2__field"><label>Prénom</label><input type="text" placeholder="Jean"></div>
      <div class="cu2__field"><label>Email</label><input type="email" placeholder="jean@exemple.com"></div>
    </div>
    <div class="cu2__field"><label>Message</label><textarea rows="5" id="msgArea" placeholder="Décrivez votre problème technique..."></textarea></div>
    <div class="cu2__bottom"><button class="cu2__send"><i class="bi bi-send"></i> Envoyer</button></div>
  </div>
</div>
<script>
const placeholders = [
  'Décrivez votre problème technique...',
  'Décrivez votre question de facturation...',
  'Parlez-nous de votre projet de partenariat...',
  'Votre demande presse...',
  'Votre message...'
];
function selectTopic(i, el) {
  document.querySelectorAll('.cu2__topic').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('msgArea').placeholder = placeholders[i];
}
</script>
</body>
</html>
