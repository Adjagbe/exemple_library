<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call To Action 3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; padding: 4rem 2rem; display: flex; justify-content: center; }
.cta3 { max-width: 800px; width: 100%; background: #fafafa; border: 2px solid #e5e7eb; border-radius: 2rem; padding: 4rem; text-align: center; }
.cta3__badge { display: inline-flex; align-items: center; gap: .5rem; background: #fef3c7; color: #d97706; font-size: .78rem; font-weight: 700; padding: .375rem 1rem; border-radius: 9999px; margin-bottom: 1.75rem; }
.cta3 h2 { font-size: 2.25rem; font-weight: 800; color: #111827; margin-bottom: 1rem; line-height: 1.2; }
.cta3 p { color: #6b7280; line-height: 1.75; margin-bottom: 2rem; max-width: 560px; margin-left: auto; margin-right: auto; }
.cta3__price { display: flex; align-items: baseline; justify-content: center; gap: .75rem; margin-bottom: 2.5rem; }
.cta3__price .old { font-size: 1.25rem; color: #d1d5db; text-decoration: line-through; }
.cta3__price .new { font-size: 3rem; font-weight: 900; color: #111827; }
.cta3__price .period { color: #6b7280; font-size: .9rem; }
.cta3__btn { background: #111827; color: #fff; border: none; padding: 1rem 3rem; border-radius: .875rem; font-size: 1rem; font-weight: 700; cursor: pointer; display: inline-block; }
</style>
</head>
<body>
<div class="cta3">
  <div class="cta3__badge"><i class="bi bi-lightning-charge-fill"></i> Offre limitée — Économisez 30%</div>
  <h2>Passez au niveau supérieur</h2>
  <p>Profitez de notre offre exclusive ce mois-ci et débloquez toutes les fonctionnalités Pro.</p>
  <div class="cta3__price">
    <span class="old">€49</span>
    <span class="new">€29</span>
    <span class="period">/mois</span>
  </div>
  <button class="cta3__btn">Profiter de l'offre</button>
</div>
</body>
</html>
