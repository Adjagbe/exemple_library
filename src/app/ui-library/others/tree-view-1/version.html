<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree View 1 – Modern Dark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0b0f1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    /* ── Layout ─────────────────────────────── */
    .tv1 {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 1.25rem;
      max-width: 820px;
      width: 100%;
    }
    @media (max-width: 640px) { .tv1 { grid-template-columns: 1fr; } }

    /* ── Left panel ─────────────────────────── */
    .tv1__panel {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 1.25rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .tv1__panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .875rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.02);
    }

    .tv1__panel-title {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #64748b;
    }

    .tv1__panel-actions { display: flex; gap: .25rem; }

    .tv1__action-btn {
      background: none;
      border: none;
      color: #475569;
      font-size: 1rem;
      cursor: pointer;
      width: 1.75rem;
      height: 1.75rem;
      border-radius: .375rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .tv1__action-btn:hover { background: rgba(255,255,255,.06); color: #94a3b8; }

    .tv1__tree {
      padding: .5rem 0;
      overflow-y: auto;
      max-height: 480px;
    }
    .tv1__tree::-webkit-scrollbar { width: 4px; }
    .tv1__tree::-webkit-scrollbar-track { background: transparent; }
    .tv1__tree::-webkit-scrollbar-thumb { background: rgba(255,255,255,.06); border-radius: 2px; }

    /* ── Tree nodes ─────────────────────────── */
    .tv1__node {
      display: flex;
      align-items: center;
      gap: .375rem;
      padding: .3rem 1rem .3rem 0;
      cursor: pointer;
      position: relative;
      transition: background .15s;
      user-select: none;
    }
    .tv1__node::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: transparent;
      transition: background .2s;
    }
    .tv1__node:hover { background: rgba(255,255,255,.03); }
    .tv1__node.selected { background: rgba(99,102,241,.12); }
    .tv1__node.selected::before { background: #6366f1; }
    .tv1__node.selected .tv1__node-label { color: #c7d2fe; font-weight: 600; }
    .tv1__node.selected .tv1__node-chevron { color: #818cf8; }
    .tv1__node.is-folder .tv1__node-label { color: #e2e8f0; font-weight: 500; }

    .tv1__node-chevron {
      font-size: .625rem;
      color: #475569;
      width: .875rem;
      flex-shrink: 0;
      text-align: center;
      transition: color .15s;
    }
    .tv1__node-spacer { width: .875rem; flex-shrink: 0; }
    .tv1__node-icon { font-size: .9375rem; flex-shrink: 0; line-height: 1; }
    .tv1__node-label {
      font-size: .8125rem;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'JetBrains Mono', monospace;
      transition: color .15s;
    }

    /* ── Right preview ──────────────────────── */
    .tv1__preview {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      min-height: 320px;
    }

    .tv1__preview-empty {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .875rem;
    }
    .tv1__preview-icon { font-size: 3rem; opacity: .3; }
    .tv1__preview-hint { font-size: .875rem; color: #334155; max-width: 200px; line-height: 1.5; }

    .tv1__preview-content { width: 100%; display: flex; flex-direction: column; gap: 1.5rem; }

    .tv1__preview-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .tv1__preview-file-icon { font-size: 2.5rem; line-height: 1; }
    .tv1__preview-name { font-size: 1.0625rem; font-weight: 700; color: #f1f5f9; }
    .tv1__preview-type { font-size: .75rem; color: #64748b; margin-top: .2rem; text-transform: capitalize; }

    .tv1__preview-meta { display: flex; flex-direction: column; gap: .625rem; }
    .tv1__meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .5rem .875rem;
      background: rgba(255,255,255,.02);
      border-radius: .625rem;
    }
    .tv1__meta-key { font-size: .75rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .06em; }
    .tv1__meta-val { font-size: .8125rem; font-weight: 600; color: #94a3b8; font-family: 'JetBrains Mono', monospace; }

    .tv1__preview-badge {
      display: inline-flex;
      align-items: center;
      gap: .375rem;
      padding: .375rem .875rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 700;
      align-self: flex-start;
    }
    .tv1__preview-badge.badge-folder { background: rgba(99,102,241,.15); color: #a5b4fc; }
    .tv1__preview-badge.badge-file   { background: rgba(34,197,94,.12);  color: #4ade80; }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="tv1">
  <!-- Left: file tree panel -->
  <div class="tv1__panel">
    <div class="tv1__panel-head">
      <span class="tv1__panel-title">
        <span>📂</span> Explorer
      </span>
      <div class="tv1__panel-actions">
        <button class="tv1__action-btn" title="New file" onclick="window.tvCollapseAll()">⊟</button>
        <button class="tv1__action-btn" title="Expand all" onclick="window.tvExpandAll()">⊞</button>
      </div>
    </div>
    <div class="tv1__tree" id="tvTree"></div>
  </div>

  <!-- Right: detail preview -->
  <div class="tv1__preview" id="tvPreview">
    <div class="tv1__preview-empty" id="tvEmpty">
      <div class="tv1__preview-icon">🗂️</div>
      <p class="tv1__preview-hint">Select a file or folder to see details</p>
    </div>
    <div class="tv1__preview-content hidden" id="tvDetail">
      <div class="tv1__preview-header">
        <span class="tv1__preview-file-icon" id="tvDIcon"></span>
        <div>
          <div class="tv1__preview-name" id="tvDName"></div>
          <div class="tv1__preview-type" id="tvDType"></div>
        </div>
      </div>
      <div class="tv1__preview-meta">
        <div class="tv1__meta-row"><span class="tv1__meta-key">Type</span><span class="tv1__meta-val" id="tvDKind"></span></div>
        <div class="tv1__meta-row" id="tvDChildRow"><span class="tv1__meta-key">Children</span><span class="tv1__meta-val" id="tvDChildren"></span></div>
        <div class="tv1__meta-row"><span class="tv1__meta-key">ID</span><span class="tv1__meta-val" id="tvDId"></span></div>
        <div class="tv1__meta-row"><span class="tv1__meta-key">Path</span><span class="tv1__meta-val" id="tvDPath"></span></div>
      </div>
      <div class="tv1__preview-badge" id="tvDBadge"></div>
    </div>
  </div>
</div>

<script>
(function () {
  /* ── Data ─────────────────────────────── */
  var tree = [
    { id: 1, label: 'my-project', icon: '📁', type: 'folder', expanded: true, children: [
      { id: 2, label: 'src', icon: '📁', type: 'folder', expanded: true, children: [
        { id: 3, label: 'app', icon: '📁', type: 'folder', expanded: true, children: [
          { id: 4, label: 'app.component.ts', icon: '📄', type: 'file' },
          { id: 5, label: 'app.module.ts',    icon: '📄', type: 'file' },
          { id: 6, label: 'app.routes.ts',    icon: '📄', type: 'file' }
        ]},
        { id: 7, label: 'assets', icon: '📁', type: 'folder', expanded: false, children: [
          { id: 8, label: 'logo.svg',    icon: '🖼️', type: 'file' },
          { id: 9, label: 'favicon.ico', icon: '🖼️', type: 'file' }
        ]},
        { id: 10, label: 'main.ts',      icon: '📄', type: 'file' },
        { id: 11, label: 'styles.scss',  icon: '🎨', type: 'file' }
      ]},
      { id: 12, label: 'public', icon: '📁', type: 'folder', expanded: false, children: [
        { id: 13, label: 'index.html', icon: '🌐', type: 'file' }
      ]},
      { id: 14, label: 'package.json',  icon: '📦', type: 'file' },
      { id: 15, label: 'tsconfig.json', icon: '⚙️',  type: 'file' },
      { id: 16, label: 'angular.json',  icon: '⚙️',  type: 'file' },
      { id: 17, label: '.gitignore',    icon: '🚫', type: 'file' },
      { id: 18, label: 'README.md',     icon: '📝', type: 'file' }
    ]}
  ];

  var selectedId = null;

  /* ── Render ───────────────────────────── */
  function getPath(nodes, targetId, prefix) {
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      var p = (prefix ? prefix + '/' : '') + n.label;
      if (n.id === targetId) return p;
      if (n.children) {
        var found = getPath(n.children, targetId, p);
        if (found) return found;
      }
    }
    return null;
  }

  function renderNodes(nodes, depth, container) {
    nodes.forEach(function (node) {
      var div = document.createElement('div');
      div.className = 'tv1__node' + (node.type === 'folder' ? ' is-folder' : '') + (node.id === selectedId ? ' selected' : '');
      div.style.paddingLeft = (16 + depth * 18) + 'px';

      var chevron = document.createElement('span');
      if (node.type === 'folder') {
        chevron.className = 'tv1__node-chevron';
        chevron.textContent = node.expanded ? '▾' : '▸';
      } else {
        chevron.className = 'tv1__node-spacer';
      }

      var icon = document.createElement('span');
      icon.className = 'tv1__node-icon';
      icon.textContent = node.icon;

      var label = document.createElement('span');
      label.className = 'tv1__node-label';
      label.textContent = node.label;

      div.appendChild(chevron);
      div.appendChild(icon);
      div.appendChild(label);

      div.addEventListener('click', function (e) {
        e.stopPropagation();
        selectedId = node.id;
        if (node.type === 'folder') node.expanded = !node.expanded;
        renderAll();
        showDetail(node);
      });

      container.appendChild(div);

      if (node.expanded && node.children) {
        renderNodes(node.children, depth + 1, container);
      }
    });
  }

  function renderAll() {
    var c = document.getElementById('tvTree');
    c.innerHTML = '';
    renderNodes(tree, 0, c);
  }

  /* ── Detail panel ─────────────────────── */
  function showDetail(node) {
    document.getElementById('tvEmpty').classList.add('hidden');
    var detail = document.getElementById('tvDetail');
    detail.classList.remove('hidden');

    document.getElementById('tvDIcon').textContent = node.icon;
    document.getElementById('tvDName').textContent = node.label;
    document.getElementById('tvDType').textContent = node.type.charAt(0).toUpperCase() + node.type.slice(1);
    document.getElementById('tvDKind').textContent = node.type;
    document.getElementById('tvDId').textContent = '#' + node.id;
    document.getElementById('tvDPath').textContent = getPath(tree, node.id, '') || node.label;

    var childRow = document.getElementById('tvDChildRow');
    if (node.type === 'folder') {
      childRow.style.display = 'flex';
      document.getElementById('tvDChildren').textContent = (node.children ? node.children.length : 0) + ' items';
    } else {
      childRow.style.display = 'none';
    }

    var badge = document.getElementById('tvDBadge');
    if (node.type === 'folder') {
      badge.className = 'tv1__preview-badge badge-folder';
      badge.textContent = '📁 Folder';
    } else {
      badge.className = 'tv1__preview-badge badge-file';
      badge.textContent = '📄 File';
    }
  }

  /* ── Collapse / Expand all ─────────────── */
  function setAllExpanded(nodes, val) {
    nodes.forEach(function (n) {
      if (n.type === 'folder') {
        n.expanded = val;
        if (n.children) setAllExpanded(n.children, val);
      }
    });
  }

  window.tvCollapseAll = function () { setAllExpanded(tree, false); renderAll(); };
  window.tvExpandAll   = function () { setAllExpanded(tree, true);  renderAll(); };

  /* ── Init ─────────────────────────────── */
  renderAll();
})();
</script>
</body>
</html>
