<div class="cs1">
  <div class="cs1__inner">
    <div class="cs1__badge">Bientôt disponible</div>
    <h1>Quelque chose d'incroyable arrive</h1>
    <p>Notre équipe travaille dur pour vous offrir une expérience exceptionnelle. Restez connectés !</p>
    <div class="cs1__countdown">
      <div class="cs1__unit"><span class="cs1__num">{{ pad(days) }}</span><span class="cs1__label">Jours</span></div>
      <span class="cs1__sep">:</span>
      <div class="cs1__unit"><span class="cs1__num">{{ pad(hours) }}</span><span class="cs1__label">Heures</span></div>
      <span class="cs1__sep">:</span>
      <div class="cs1__unit"><span class="cs1__num">{{ pad(minutes) }}</span><span class="cs1__label">Minutes</span></div>
      <span class="cs1__sep">:</span>
      <div class="cs1__unit"><span class="cs1__num">{{ pad(seconds) }}</span><span class="cs1__label">Secondes</span></div>
    </div>
  </div>
</div>
