<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon 1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.cs1 { min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); display: flex; align-items: center; justify-content: center; padding: 2rem; }
.cs1__inner { max-width: 640px; width: 100%; text-align: center; }
.cs1__badge { display: inline-flex; align-items: center; gap: .5rem; padding: .5rem 1.25rem; background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3); border-radius: 9999px; font-size: .8rem; font-weight: 700; color: #818cf8; margin-bottom: 2rem; }
.cs1__inner h1 { font-size: 3rem; font-weight: 800; color: #fff; margin: 0 0 1rem; line-height: 1.15; }
.cs1__inner p { font-size: 1rem; color: rgba(255,255,255,.65); margin: 0 0 3rem; line-height: 1.8; }
.cs1__countdown { display: flex; justify-content: center; align-items: center; gap: .5rem; flex-wrap: wrap; }
.cs1__unit { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); backdrop-filter: blur(8px); border-radius: 1rem; padding: 1.25rem 1.5rem; min-width: 90px; text-align: center; }
.cs1__val { font-size: 2.5rem; font-weight: 900; color: #fff; display: block; line-height: 1; }
.cs1__lbl { font-size: .7rem; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .08em; margin-top: .375rem; display: block; }
.cs1__sep { font-size: 2rem; color: #4f46e5; font-weight: 700; }
</style>
</head>
<body>
<div class="cs1">
  <div class="cs1__inner">
    <div class="cs1__badge"><i class="bi bi-rocket-takeoff-fill"></i> Bientôt disponible</div>
    <h1>Quelque chose d'incroyable arrive</h1>
    <p>Nous travaillons dur pour vous offrir une expérience extraordinaire. Inscrivez-vous pour être parmi les premiers à en profiter.</p>
    <div class="cs1__countdown">
      <div class="cs1__unit"><span class="cs1__val" id="days">00</span><span class="cs1__lbl">Jours</span></div>
      <span class="cs1__sep">:</span>
      <div class="cs1__unit"><span class="cs1__val" id="hours">00</span><span class="cs1__lbl">Heures</span></div>
      <span class="cs1__sep">:</span>
      <div class="cs1__unit"><span class="cs1__val" id="mins">00</span><span class="cs1__lbl">Minutes</span></div>
      <span class="cs1__sep">:</span>
      <div class="cs1__unit"><span class="cs1__val" id="secs">00</span><span class="cs1__lbl">Secondes</span></div>
    </div>
  </div>
</div>
<script>
const target = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
function update() {
  const diff = target - Date.now();
  if (diff <= 0) return;
  document.getElementById('days').textContent = String(Math.floor(diff / 86400000)).padStart(2,'0');
  document.getElementById('hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
  document.getElementById('mins').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
  document.getElementById('secs').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
}
update();
setInterval(update, 1000);
</script>
</body>
</html>
