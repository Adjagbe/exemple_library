<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon 3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.cs3 { min-height: 100vh; background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 100%); display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
.cs3__ripple { position: absolute; border-radius: 50%; border: 1px solid rgba(99,102,241,.15); animation: ripple 3s linear infinite; }
.cs3__ripple:nth-child(1) { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
.cs3__ripple:nth-child(2) { width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 1s; }
.cs3__ripple:nth-child(3) { width: 800px; height: 800px; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 2s; }
@keyframes ripple { 0% { opacity: .6; } 100% { opacity: 0; } }
.cs3__inner { max-width: 560px; width: 100%; text-align: center; position: relative; z-index: 1; }
.cs3__icon { font-size: 3rem; color: #4f46e5; margin-bottom: 1.5rem; }
.cs3__inner h1 { font-size: 2.5rem; font-weight: 800; color: #111827; margin: 0 0 1rem; line-height: 1.2; }
.cs3__inner > p { font-size: .95rem; color: #6b7280; margin: 0 0 2.5rem; line-height: 1.8; }
.cs3__form { display: flex; background: #fff; border: 1px solid #e5e7eb; border-radius: .875rem; padding: .375rem .375rem .375rem 1.25rem; gap: .375rem; margin-bottom: 2rem; box-shadow: 0 4px 16px rgba(0,0,0,.06); }
.cs3__form input { flex: 1; border: none; outline: none; font-size: .875rem; background: transparent; color: #111827; }
.cs3__form input::placeholder { color: #9ca3af; }
.cs3__form button { padding: .75rem 1.5rem; background: #4f46e5; color: #fff; border: none; border-radius: .625rem; font-weight: 700; font-size: .875rem; cursor: pointer; white-space: nowrap; }
.cs3__success { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: .875rem; padding: 1.25rem 1.5rem; color: #065f46; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: .75rem; margin-bottom: 2rem; }
.cs3__success i { font-size: 1.25rem; color: #10b981; }
.cs3__socials { display: flex; justify-content: center; gap: .75rem; }
.cs3__socials a { width: 40px; height: 40px; border: 1px solid #e5e7eb; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; color: #374151; font-size: .95rem; text-decoration: none; transition: all .15s; }
.cs3__socials a:hover { background: #4f46e5; color: #fff; border-color: #4f46e5; }
</style>
</head>
<body>
<div class="cs3">
  <div class="cs3__ripple"></div>
  <div class="cs3__ripple"></div>
  <div class="cs3__ripple"></div>
  <div class="cs3__inner">
    <div class="cs3__icon"><i class="bi bi-rocket-takeoff"></i></div>
    <h1>On prépare quelque chose de grand</h1>
    <p>Laissez-nous votre email et soyez le premier informé du lancement. Zéro spam, promis.</p>
    <div id="formWrap">
      <div class="cs3__form">
        <input type="email" id="emailInput" placeholder="votre@email.com">
        <button onclick="subscribe()">Me notifier</button>
      </div>
    </div>
    <div class="cs3__success" id="successMsg" style="display:none">
      <i class="bi bi-check-circle-fill"></i>
      <span>Super ! Vous serez notifié en priorité.</span>
    </div>
    <div class="cs3__socials">
      <a href="#"><i class="bi bi-twitter-x"></i></a>
      <a href="#"><i class="bi bi-linkedin"></i></a>
      <a href="#"><i class="bi bi-instagram"></i></a>
    </div>
  </div>
</div>
<script>
function subscribe() {
  const email = document.getElementById('emailInput').value;
  if (!email) return;
  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('successMsg').style.display = 'flex';
}
</script>
</body>
</html>
