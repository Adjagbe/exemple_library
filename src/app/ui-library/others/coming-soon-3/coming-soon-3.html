<div class="cs3">
  <div class="cs3__inner">
    <div class="cs3__anim">
      <div class="cs3__circle cs3__circle--1"></div>
      <div class="cs3__circle cs3__circle--2"></div>
      <div class="cs3__circle cs3__circle--3"></div>
      <i class="bi bi-rocket-takeoff cs3__rocket"></i>
    </div>
    <h1>Arrivée imminente</h1>
    <p>Soyez parmi les premiers à être notifiés au lancement. Inscrivez-vous dès maintenant !</p>
    <div *ngIf="!subscribed" class="cs3__form">
      <input type="email" [(ngModel)]="email" placeholder="Votre adresse email" (keyup.enter)="subscribe()">
      <button (click)="subscribe()">Me notifier <i class="bi bi-arrow-right"></i></button>
    </div>
    <div *ngIf="subscribed" class="cs3__ok">
      <i class="bi bi-check-circle-fill"></i>
      <p>Vous êtes inscrit(e) ! On revient très bientôt.</p>
    </div>
    <div class="cs3__socials">
      <a href="#"><i class="bi bi-twitter-x"></i></a>
      <a href="#"><i class="bi bi-linkedin"></i></a>
      <a href="#"><i class="bi bi-instagram"></i></a>
    </div>
  </div>
</div>
