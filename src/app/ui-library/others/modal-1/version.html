<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal 1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; display: flex; align-items: center; justify-content: center; height: 500px; }
.m1-open { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
.m1-open.visible { display: flex; }
.m1-card { background: #fff; border-radius: 1.75rem; padding: 2.5rem; max-width: 440px; width: 90%; text-align: center; position: relative; box-shadow: 0 24px 64px rgba(0,0,0,.2); }
.m1-close { position: absolute; top: 1rem; right: 1rem; width: 32px; height: 32px; border-radius: 50%; background: #f3f4f6; border: none; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #374151; }
.m1-icon { font-size: 3.5rem; color: #10b981; margin-bottom: 1.25rem; }
.m1-card h3 { font-size: 1.25rem; font-weight: 800; color: #111827; margin-bottom: .75rem; }
.m1-card p { color: #6b7280; line-height: 1.7; margin-bottom: 2rem; }
.m1-btns { display: flex; gap: .75rem; }
.btn-outline { flex: 1; background: #fff; border: 1.5px solid #e5e7eb; color: #374151; padding: .75rem; border-radius: .875rem; font-size: .875rem; font-weight: 600; cursor: pointer; }
.btn-primary { flex: 1; background: #4f46e5; color: #fff; border: none; padding: .75rem; border-radius: .875rem; font-size: .875rem; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<button onclick="document.getElementById('overlay').classList.add('visible')" style="background:#4f46e5;color:#fff;border:none;padding:.875rem 2rem;border-radius:.875rem;font-size:.95rem;font-weight:700;cursor:pointer;">Ouvrir la modal</button>

<div class="m1-open" id="overlay" onclick="if(event.target===this)this.classList.remove('visible')">
  <div class="m1-card">
    <button class="m1-close" onclick="document.getElementById('overlay').classList.remove('visible')"><i class="bi bi-x"></i></button>
    <div class="m1-icon"><i class="bi bi-check-circle-fill"></i></div>
    <h3>Action réussie !</h3>
    <p>Votre demande a été traitée avec succès. Vous recevrez une confirmation par email dans quelques instants.</p>
    <div class="m1-btns">
      <button class="btn-outline" onclick="document.getElementById('overlay').classList.remove('visible')">Fermer</button>
      <button class="btn-primary">Continuer</button>
    </div>
  </div>
</div>
</body>
</html>
