<section class="ot3">
  <div class="ot3__head"><h2>Rencontrez l'équipe</h2><p>Des experts passionnés qui construisent l'avenir avec vous.</p></div>
  <div class="ot3__featured">
    <div class="ot3__f-avatar" [style.background]="featured.color">{{ featured.initials }}</div>
    <div class="ot3__f-info">
      <h3>{{ featured.name }}</h3>
      <p class="ot3__f-role">{{ featured.role }}</p>
      <p class="ot3__f-bio">{{ featured.bio }}</p>
      <div class="ot3__f-socials">
        <a [href]="featured.twitter"><i class="bi bi-twitter-x"></i></a>
        <a [href]="featured.linkedin"><i class="bi bi-linkedin"></i></a>
        <a [href]="featured.github"><i class="bi bi-github"></i></a>
      </div>
    </div>
  </div>
  <h4 class="ot3__rest-title">L'équipe complète</h4>
  <div class="ot3__rest">
    <div *ngFor="let m of team" class="ot3__mini">
      <div class="ot3__mini-av" [style.background]="m.color">{{ m.initials }}</div>
      <div><strong>{{ m.name }}</strong><span>{{ m.role }}</span></div>
    </div>
  </div>
</section>
