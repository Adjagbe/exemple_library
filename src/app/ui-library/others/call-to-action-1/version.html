<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call To Action 1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.cta1 { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 6rem 2rem; text-align: center; }
.cta1__inner { max-width: 700px; margin: 0 auto; }
.cta1 h2 { font-size: 2.5rem; font-weight: 800; color: #fff; margin-bottom: 1.25rem; line-height: 1.2; }
.cta1 p { font-size: 1.1rem; color: rgba(255,255,255,.85); line-height: 1.75; margin-bottom: 2.5rem; }
.cta1__btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn-primary { background: #fff; color: #4f46e5; border: none; padding: .875rem 2.25rem; border-radius: .875rem; font-size: .95rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.15); }
.btn-ghost { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); padding: .875rem 2.25rem; border-radius: .875rem; font-size: .95rem; font-weight: 600; cursor: pointer; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); }
</style>
</head>
<body>
<div class="cta1">
  <div class="cta1__inner">
    <h2>Prêt à transformer votre flux de travail ?</h2>
    <p>Rejoignez plus de 50 000 équipes qui utilisent notre plateforme pour livrer des produits plus rapidement et avec plus de qualité.</p>
    <div class="cta1__btns">
      <button class="btn-primary">Commencer gratuitement</button>
      <button class="btn-ghost">Voir la démo</button>
    </div>
  </div>
</div>
</body>
</html>
