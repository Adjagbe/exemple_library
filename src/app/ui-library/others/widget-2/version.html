<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget 2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; padding: 4rem 2rem; display: flex; justify-content: center; }
.w2 { max-width: 480px; width: 100%; background: #fff; border-radius: 1.5rem; padding: 1.75rem; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
.w2__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.w2__header h3 { font-size: 1rem; font-weight: 800; color: #111827; }
.w2__badge { background: #eef2ff; color: #4f46e5; font-size: .78rem; font-weight: 700; padding: .25rem .625rem; border-radius: 9999px; }
.w2__progress { height: 6px; background: #f3f4f6; border-radius: 9999px; overflow: hidden; margin-bottom: 1.5rem; }
.w2__progress-fill { height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed); border-radius: 9999px; transition: width .3s; }
.w2__tasks { display: flex; flex-direction: column; gap: .75rem; }
.w2__task { display: flex; align-items: center; gap: .875rem; padding: .75rem; border-radius: .875rem; border: 1px solid #f3f4f6; cursor: pointer; transition: background .15s; }
.w2__task:hover { background: #f9fafb; }
.w2__check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #e5e7eb; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
.w2__task.done .w2__check { background: transparent; border-color: transparent; }
.w2__task.done .w2__check i { color: #10b981; font-size: .9rem; }
.w2__task-info { flex: 1; }
.w2__task-info .title { font-size: .875rem; font-weight: 600; color: #111827; }
.w2__task.done .w2__task-info .title { text-decoration: line-through; opacity: .5; }
.w2__priority { font-size: .7rem; font-weight: 700; padding: .2rem .5rem; border-radius: 9999px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="w2">
  <div class="w2__header">
    <h3>Mes tâches</h3>
    <span class="w2__badge" id="badge">0/5</span>
  </div>
  <div class="w2__progress"><div class="w2__progress-fill" id="bar"></div></div>
  <div class="w2__tasks" id="tasks"></div>
</div>
<script>
const tasks = [
  { title: 'Revoir la maquette UI', priority: 'high', done: false },
  { title: 'Écrire les tests unitaires', priority: 'medium', done: false },
  { title: 'Mise à jour des dépendances', priority: 'low', done: true },
  { title: 'Réunion client', priority: 'high', done: true },
  { title: 'Déployer en staging', priority: 'medium', done: false }
];
const priorityStyle = {
  high: 'background:#fee2e2;color:#dc2626;',
  medium: 'background:#fef3c7;color:#d97706;',
  low: 'background:#dcfce7;color:#16a34a;'
};
const priorityLabel = { high: 'Haute', medium: 'Moyenne', low: 'Basse' };
function render() {
  const done = tasks.filter(t=>t.done).length;
  const pct = Math.round(done/tasks.length*100);
  document.getElementById('badge').textContent = done + '/' + tasks.length;
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('tasks').innerHTML = tasks.map((t,i) => `
    <div class="w2__task${t.done?' done':''}" onclick="toggle(${i})">
      <div class="w2__check">${t.done ? '<i class="bi bi-check-circle-fill"></i>' : ''}</div>
      <div class="w2__task-info"><div class="title">${t.title}</div></div>
      <span class="w2__priority" style="${priorityStyle[t.priority]}">${priorityLabel[t.priority]}</span>
    </div>
  `).join('');
}
function toggle(i) { tasks[i].done = !tasks[i].done; render(); }
render();
</script>
</body>
</html>
