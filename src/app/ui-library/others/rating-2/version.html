<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rating 2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; padding: 4rem 2rem; display: flex; justify-content: center; }
.rt2 { max-width: 640px; width: 100%; background: #fff; border: 1px solid #e5e7eb; border-radius: 1.5rem; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.rt2__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
.rt2__header h3 { font-size: 1.125rem; font-weight: 800; color: #111827; }
.rt2__avg-badge { background: #fef3c7; color: #d97706; font-size: .8rem; font-weight: 700; padding: .25rem .75rem; border-radius: 9999px; display: none; }
.rt2__avg-badge.visible { display: inline-block; }
.rt2__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
.rt2__cat { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 1rem; padding: 1.25rem; }
.rt2__cat-header { display: flex; align-items: center; gap: .625rem; margin-bottom: 1rem; }
.rt2__cat-header i { color: #4f46e5; font-size: 1.25rem; }
.rt2__cat-header span { font-size: .875rem; font-weight: 700; color: #374151; }
.rt2__stars { display: flex; gap: .25rem; }
.rt2__star { font-size: 1.5rem; color: #e5e7eb; cursor: pointer; transition: color .15s; }
.rt2__star.on { color: #f59e0b; }
</style>
</head>
<body>
<div class="rt2">
  <div class="rt2__header">
    <h3>Évaluez votre expérience</h3>
    <span class="rt2__avg-badge" id="avgBadge">★ <span id="avgVal">0</span></span>
  </div>
  <div class="rt2__grid">
    <div class="rt2__cat">
      <div class="rt2__cat-header"><i class="bi bi-gem"></i><span>Qualité</span></div>
      <div class="rt2__stars" id="cat0"></div>
    </div>
    <div class="rt2__cat">
      <div class="rt2__cat-header"><i class="bi bi-headset"></i><span>Service</span></div>
      <div class="rt2__stars" id="cat1"></div>
    </div>
    <div class="rt2__cat">
      <div class="rt2__cat-header"><i class="bi bi-tag"></i><span>Prix</span></div>
      <div class="rt2__stars" id="cat2"></div>
    </div>
    <div class="rt2__cat">
      <div class="rt2__cat-header"><i class="bi bi-truck"></i><span>Livraison</span></div>
      <div class="rt2__stars" id="cat3"></div>
    </div>
  </div>
</div>
<script>
const ratings = [0,0,0,0];
const hovers = [0,0,0,0];
function render() {
  for(let c=0;c<4;c++) {
    const el = document.getElementById('cat'+c);
    el.innerHTML = '';
    for(let s=1;s<=5;s++) {
      const span = document.createElement('span');
      span.className = 'rt2__star' + ((s <= (hovers[c]||ratings[c])) ? ' on' : '');
      span.textContent = '★';
      span.onmouseover = () => { hovers[c]=s; render(); };
      span.onmouseout = () => { hovers[c]=0; render(); };
      span.onclick = () => { ratings[c]=s; updateAvg(); render(); };
      el.appendChild(span);
    }
  }
}
function updateAvg() {
  const set = ratings.filter(r=>r>0);
  if(!set.length) return;
  const avg = (set.reduce((a,b)=>a+b,0)/set.length).toFixed(1);
  document.getElementById('avgVal').textContent = avg;
  document.getElementById('avgBadge').classList.add('visible');
}
render();
</script>
</body>
</html>
