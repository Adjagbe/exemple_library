<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero 3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
.hero3 { background: #0f172a; background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(79,70,229,.3), transparent); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 4rem 2rem; text-align: center; }
.hero3__inner { max-width: 700px; }
.hero3__label { display: inline-flex; align-items: center; gap: .625rem; border: 1px solid rgba(79,70,229,.4); color: #a5b4fc; font-size: .78rem; font-weight: 600; padding: .375rem 1rem; border-radius: 9999px; margin-bottom: 2rem; }
.hero3__pulse { width: 7px; height: 7px; border-radius: 50%; background: #4f46e5; animation: pulse 2s infinite; }
.hero3 h1 { font-size: 4.5rem; font-weight: 900; color: #fff; line-height: 1.05; margin-bottom: 1.5rem; }
.hero3 p { font-size: 1.125rem; color: #94a3b8; line-height: 1.75; margin-bottom: 3rem; max-width: 520px; margin-left: auto; margin-right: auto; }
.hero3__cta { display: inline-flex; align-items: center; gap: .625rem; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border: none; padding: 1rem 2.5rem; border-radius: 9999px; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 0 40px rgba(79,70,229,.5); margin-bottom: 1.25rem; }
.hero3__note { font-size: .78rem; color: #64748b; }
</style>
</head>
<body>
<div class="hero3">
  <div class="hero3__inner">
    <div class="hero3__label">
      <div class="hero3__pulse"></div>
      Disponible maintenant
    </div>
    <h1>L'IA qui transforme
votre façon de travailler</h1>
    <p>Automatisez vos tâches répétitives, générez du contenu à grande échelle et prenez des décisions basées sur les données tout en un.</p>
    <div>
      <button class="hero3__cta">
        <i class="bi bi-rocket-takeoff-fill"></i>
        Essai gratuit
      </button>
    </div>
    <div class="hero3__note">Aucune carte bancaire requise</div>
  </div>
</div>
</body>
</html>
