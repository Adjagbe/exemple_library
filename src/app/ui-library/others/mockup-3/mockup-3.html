<section class="mk3">
  <div class="mk3__inner">
    <div class="mk3__headline">
      <h2>Multi-plateforme. Une seule codebase.</h2>
      <p>Déployez instantanément sur desktop, tablette et mobile avec une expérience identique.</p>
    </div>
    <div class="mk3__devices">
      <div class="mk3__laptop">
        <div class="mk3__lscreen">
          <div class="mk3__lnav"></div>
          <div class="mk3__lgrid">
            <div *ngFor="let i of [1,2,3,4,5,6]" class="mk3__lcard"></div>
          </div>
        </div>
        <div class="mk3__lbase"></div>
      </div>
      <div class="mk3__tablet">
        <div class="mk3__tscreen">
          <div class="mk3__tnav"></div>
          <div class="mk3__tcard"></div>
          <div class="mk3__tcard mk3__tcard--sm"></div>
        </div>
      </div>
      <div class="mk3__phone2">
        <div class="mk3__p2nav"></div>
        <div class="mk3__p2card"></div>
        <div class="mk3__p2card mk3__p2card--sm"></div>
      </div>
    </div>
  </div>
</section>
