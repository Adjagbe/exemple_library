<div class="car2">
  <div class="car2__header"><h2>Nos fonctionnalités clés</h2><div class="car2__controls"><button (click)="prev()" [disabled]="current === 0"><i class="bi bi-chevron-left"></i></button><button (click)="next()" [disabled]="current >= cards.length - 3"><i class="bi bi-chevron-right"></i></button></div></div>
  <div class="car2__track">
    <div *ngFor="let c of visible" class="car2__card">
      <div class="car2__icon" [style.background]="c.color"><i class="bi" [ngClass]="c.icon"></i></div>
      <h3>{{ c.title }}</h3>
      <p>{{ c.desc }}</p>
    </div>
  </div>
</div>
