<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Consent 1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; min-height: 100vh; }
.demo-content { padding: 4rem 2rem; text-align: center; color: #6b7280; }
.cc1 { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); width: min(760px, calc(100vw - 2rem)); background: #1e293b; border-radius: 1.25rem; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1.25rem; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
.cc1__icon { font-size: 1.75rem; flex-shrink: 0; color: white; }
.cc1__text { flex: 1; font-size: .85rem; color: rgba(255,255,255,.8); line-height: 1.6; }
.cc1__text a { color: #818cf8; text-decoration: none; }
.cc1__btns { display: flex; gap: .75rem; flex-shrink: 0; }
.cc1__accept { padding: .75rem 1.5rem; background: #4f46e5; color: #fff; border: none; border-radius: .75rem; font-weight: 700; font-size: .875rem; cursor: pointer; white-space: nowrap; }
.cc1__refuse { padding: .75rem 1.5rem; background: rgba(255,255,255,.1); color: rgba(255,255,255,.8); border: 1px solid rgba(255,255,255,.2); border-radius: .75rem; font-weight: 600; font-size: .875rem; cursor: pointer; white-space: nowrap; }
.cc1__accept:hover { background: #4338ca; }
.cc1__refuse:hover { background: rgba(255,255,255,.15); }
</style>
</head>
<body>
<div class="demo-content">
  <h2>Page de démonstration</h2>
  <p>Le bandeau cookie apparaît en bas de page.</p>
</div>
<div class="cc1" id="cc1">
 <i class="bi bi-cookie cc1__icon"></i>
  <div class="cc1__text">
    Nous utilisons des cookies pour améliorer votre expérience et analyser notre trafic. Consultez notre <a href="#">politique de confidentialité</a>.
  </div>
  <div class="cc1__btns">
    <button class="cc1__accept" onclick="hideCC()">Tout accepter</button>
    <button class="cc1__refuse" onclick="hideCC()">Refuser</button>
  </div>
</div>
<script>
function hideCC() { document.getElementById('cc1').style.display = 'none'; }
</script>
</body>
</html>
