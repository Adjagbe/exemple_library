<div *ngIf="visible" class="cc1">
  <i class="bi bi-cookie cc1__icon"></i>
  <p>Nous utilisons des cookies pour améliorer votre expérience. En continuant, vous acceptez notre <a href="#">politique de cookies</a>.</p>
  <div class="cc1__btns">
    <button class="cc1__accept" (click)="acceptAll()">Tout accepter</button>
    <button class="cc1__decline" (click)="decline()">Refuser</button>
  </div>
</div>
