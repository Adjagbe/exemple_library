<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call To Action 2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.cta2 { background: #0f172a; padding: 5rem 2rem; }
.cta2__inner { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
.cta2__left h2 { font-size: 2.25rem; font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 1rem; }
.cta2__left p { color: #94a3b8; line-height: 1.75; margin-bottom: 2rem; }
.cta2__checklist { list-style: none; display: flex; flex-direction: column; gap: .75rem; }
.cta2__checklist li { display: flex; align-items: center; gap: .75rem; font-size: .9rem; color: #e2e8f0; }
.cta2__checklist li i { color: #10b981; font-size: 1rem; }
.cta2__right { display: flex; flex-direction: column; gap: 1rem; }
.cta2__input { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: .875rem; padding: .875rem 1.125rem; font-size: .9rem; color: #fff; outline: none; }
.cta2__input::placeholder { color: #64748b; }
.cta2__btn { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border: none; padding: .875rem; border-radius: .875rem; font-size: .95rem; font-weight: 700; cursor: pointer; }
.cta2__note { font-size: .75rem; color: #64748b; text-align: center; }
.cta2__note a { color: #818cf8; text-decoration: none; }
</style>
</head>
<body>
<div class="cta2">
  <div class="cta2__inner">
    <div class="cta2__left">
      <h2>Commencez dès aujourd'hui</h2>
      <p>D14 jours d'essai gratuit. Pas de carte bancaire. Annulation à tout moment.</p>
      <ul class="cta2__checklist">
        <li><i class="bi bi-check-circle-fill"></i> Onboarding en 5 minutes</li>
        <li><i class="bi bi-check-circle-fill"></i> Intégration avec vos outils existants</li>
        <li><i class="bi bi-check-circle-fill"></i> Support 24/7 inclus</li>
      </ul>
    </div>
    <div class="cta2__right">
      <input class="cta2__input" type="email" placeholder="Votre email professionnel">
      <button class="cta2__btn">Démarrer l'essai gratuit</button>
      <div class="cta2__note">En vous inscrivant, vous acceptez nos <a href="#">CGU</a> et notre <a href="#">Politique de confidentialité</a>.</div>
    </div>
  </div>
</div>
</body>
</html>
