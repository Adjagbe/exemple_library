<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter 1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.nl1 { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 5rem 2rem; text-align: center; }
.nl1__inner { max-width: 600px; margin: 0 auto; }
.nl1__badge { display: inline-flex; align-items: center; gap: .5rem; background: rgba(255,255,255,.15); color: #fff; font-size: .78rem; font-weight: 600; padding: .375rem 1rem; border-radius: 9999px; margin-bottom: 1.75rem; }
.nl1 h2 { font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 1rem; }
.nl1 p { color: rgba(255,255,255,.8); line-height: 1.75; margin-bottom: 2rem; }
.nl1__form { display: flex; gap: .75rem; }
.nl1__input { flex: 1; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); border-radius: .875rem; padding: .875rem 1.125rem; font-size: .9rem; color: #fff; outline: none; }
.nl1__input::placeholder { color: rgba(255,255,255,.6); }
.nl1__btn { background: #fff; color: #4f46e5; border: none; padding: .875rem 1.75rem; border-radius: .875rem; font-size: .875rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
.nl1__thanks { background: rgba(255,255,255,.15); border-radius: 1rem; padding: 1.25rem 2rem; display: flex; align-items: center; gap: .875rem; justify-content: center; }
.nl1__thanks i { font-size: 1.5rem; color: #fff; }
.nl1__thanks span { color: #fff; font-weight: 600; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="nl1">
  <div class="nl1__inner">
    <div class="nl1__badge"><i class="bi bi-envelope-heart-fill"></i> Newsletter</div>
    <h2>Restez informé des dernières nouveautés</h2>
    <p>Recevez chaque semaine nos meilleurs articles, tutoriels et actualités directement dans votre boîte mail.</p>
    <div class="nl1__form" id="form">
      <input class="nl1__input" type="email" id="email" placeholder="Votre adresse email">
      <button class="nl1__btn" onclick="subscribe()">S'abonner</button>
    </div>
    <div class="nl1__thanks hidden" id="thanks">
      <i class="bi bi-check-circle-fill"></i>
      <span>Merci ! Vous êtes maintenant abonné(e) à notre newsletter.</span>
    </div>
  </div>
</div>
<script>
function subscribe() {
  const email = document.getElementById('email').value;
  if (!email) return;
  document.getElementById('form').classList.add('hidden');
  document.getElementById('thanks').classList.remove('hidden');
}
</script>
</body>
</html>
