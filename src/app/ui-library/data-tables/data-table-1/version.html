<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Data Table 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8fafc;padding:3rem 2rem}
.dt1{background:#fff;border-radius:1.25rem;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;max-width:960px;margin:0 auto}
.dt1__toolbar{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 1.5rem;border-bottom:1px solid #f1f5f9;gap:1rem;flex-wrap:wrap}
.dt1__title{font-size:1rem;font-weight:800;color:#1e293b}
.dt1__search{padding:.6rem 1rem;border:1.5px solid #e2e8f0;border-radius:.75rem;font-size:.875rem;font-family:inherit;color:#1e293b;outline:none;width:200px;transition:border-color .2s}
.dt1__search:focus{border-color:#6366f1}
table{width:100%;border-collapse:collapse}
thead th{padding:.875rem 1.25rem;font-size:.75rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#94a3b8;text-align:left;background:#f8fafc;border-bottom:1px solid #f1f5f9;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:#6366f1}
tbody tr{border-bottom:1px solid #f8fafc;transition:background .15s}
tbody tr:hover{background:#fafbfe}
tbody td{padding:.875rem 1.25rem;font-size:.875rem;color:#374151}
.dt1__name{display:flex;align-items:center;gap:.75rem}
.dt1__av{width:2rem;height:2rem;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:.6875rem;font-weight:800;color:#fff;flex-shrink:0}
.dt1__fullname{font-weight:600;color:#1e293b}
.dt1__email{font-size:.75rem;color:#94a3b8}
.badge{display:inline-block;font-size:.6875rem;font-weight:700;padding:.2rem .6rem;border-radius:999px}
.badge-active{background:#f0fdf4;color:#16a34a}
.badge-pending{background:#fffbeb;color:#b45309}
.badge-inactive{background:#f1f5f9;color:#64748b}
.dt1__footer{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-top:1px solid #f1f5f9;font-size:.8125rem;color:#94a3b8;flex-wrap:wrap;gap:.5rem}
.dt1__pages{display:flex;gap:.25rem}
.dt1__page{width:2rem;height:2rem;border:none;border-radius:.5rem;background:transparent;font-size:.8125rem;font-weight:600;color:#94a3b8;cursor:pointer}
.dt1__page.active{background:#eef2ff;color:#4f46e5}
</style></head>
<body>
<div class="dt1">
  <div class="dt1__toolbar">
    <div class="dt1__title">Team members</div>
    <input class="dt1__search" placeholder="🔍  Search..." oninput="window.dt1Filter(this.value)">
  </div>
  <table>
    <thead><tr><th onclick="window.dt1Sort('name')">Name ↕</th><th>Email</th><th onclick="window.dt1Sort('role')">Role ↕</th><th onclick="window.dt1Sort('status')">Status ↕</th><th>Joined</th></tr></thead>
    <tbody id="dt1body"></tbody>
  </table>
  <div class="dt1__footer"><span id="dt1info"></span><div class="dt1__pages" id="dt1pages"></div></div>
</div>
<script>(function(){
  var data=[
    {name:'Jane Doe',initials:'JD',email:'jane@co.com',role:'Admin',status:'active',joined:'Jan 2023'},
    {name:'Alex Liu',initials:'AL',email:'alex@co.com',role:'Developer',status:'active',joined:'Mar 2023'},
    {name:'Tom Kim',initials:'TK',email:'tom@co.com',role:'Designer',status:'pending',joined:'May 2023'},
    {name:'Sara Renz',initials:'SR',email:'sara@co.com',role:'Developer',status:'active',joined:'Jun 2023'},
    {name:'Mia Park',initials:'MP',email:'mia@co.com',role:'Marketing',status:'inactive',joined:'Aug 2023'},
    {name:'Chris Day',initials:'CD',email:'chris@co.com',role:'Developer',status:'active',joined:'Sep 2023'}
  ];
  var filtered=data.slice(), sortKey='', sortAsc=true, page=1, perPage=5;
  function render(){
    var body=document.getElementById('dt1body');
    var start=(page-1)*perPage, end=start+perPage, rows=filtered.slice(start,end);
    body.innerHTML=rows.map(function(r){
      return '<tr><td><div class="dt1__name"><div class="dt1__av">'+r.initials+'</div><div><div class="dt1__fullname">'+r.name+'</div><div class="dt1__email">'+r.email+'</div></div></div></td>'
        +'<td>'+r.email+'</td><td>'+r.role+'</td>'
        +'<td><span class="badge badge-'+r.status+'">'+r.status+'</span></td>'
        +'<td>'+r.joined+'</td></tr>';
    }).join('');
    document.getElementById('dt1info').textContent='Showing '+(start+1)+'-'+Math.min(end,filtered.length)+' of '+filtered.length+' members';
    var pages=document.getElementById('dt1pages'); pages.innerHTML='';
    var total=Math.ceil(filtered.length/perPage);
    for(var i=1;i<=total;i++){var b=document.createElement('button');b.className='dt1__page'+(i===page?' active':'');b.textContent=i;(function(pg){b.onclick=function(){page=pg;render();};})(i);pages.appendChild(b);}
  }
  window.dt1Filter=function(q){filtered=data.filter(function(r){return r.name.toLowerCase().includes(q.toLowerCase())||r.role.toLowerCase().includes(q.toLowerCase());});page=1;render();};
  window.dt1Sort=function(k){if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=true;}filtered.sort(function(a,b){return sortAsc?a[k].localeCompare(b[k]):b[k].localeCompare(a[k]);});render();};
  render();
})()</script>
</body></html>
