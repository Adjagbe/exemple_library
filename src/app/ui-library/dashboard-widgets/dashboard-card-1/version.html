<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard Card 1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8fafc;padding:2rem}
.dc1{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;max-width:900px;margin:0 auto}
@media(max-width:700px){.dc1{grid-template-columns:repeat(2,1fr)}}
.dc1__card{background:#fff;border:1px solid #e5e7eb;border-radius:1.25rem;padding:1.5rem}
.dc1__top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem}
.dc1__icon{width:44px;height:44px;border-radius:.875rem;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.dc1__badge{font-size:.75rem;font-weight:700;padding:.2rem .625rem;border-radius:999px}
.dc1__badge.up{background:#d1fae5;color:#065f46}
.dc1__badge.down{background:#fee2e2;color:#991b1b}
.dc1__val{font-size:1.625rem;font-weight:900;color:#0f172a;margin-bottom:.25rem}
.dc1__lbl{font-size:.75rem;color:#9ca3af;font-weight:500;margin-bottom:1rem}
.dc1__bars{display:flex;align-items:flex-end;gap:3px;height:32px}
.dc1__bar{flex:1;border-radius:3px;min-height:4px;opacity:.6}
</style></head>
<body>
<div class="dc1" id="dc1grid"></div>
<script>(function(){
  var kpis=[
    {label:'Total Revenue',value:'$84.2K',change:'+12.5%',up:true,icon:'💰',color:'#6366f1',bars:[40,55,45,70,60,80,75,90]},
    {label:'Active Users',value:'12,430',change:'+8.1%',up:true,icon:'👥',color:'#10b981',bars:[60,50,70,65,80,75,85,90]},
    {label:'New Orders',value:'3,210',change:'-2.3%',up:false,icon:'📦',color:'#f59e0b',bars:[90,80,70,75,65,60,55,50]},
    {label:'Conversion',value:'4.78%',change:'+0.5%',up:true,icon:'📊',color:'#8b5cf6',bars:[45,50,55,48,60,65,70,75]},
  ];
  var g=document.getElementById('dc1grid');
  kpis.forEach(function(k){
    var bars=k.bars.map(function(h){return '<div class="dc1__bar" style="height:'+h+'%;background:'+k.color+'"></div>';}).join('');
    var el=document.createElement('div');
    el.className='dc1__card';
    el.innerHTML='<div class="dc1__top"><div class="dc1__icon" style="background:'+k.color+'1a">'+k.icon+'</div><span class="dc1__badge '+(k.up?'up':'down')+'">'+k.change+'</span></div><div class="dc1__val">'+k.value+'</div><div class="dc1__lbl">'+k.label+'</div><div class="dc1__bars">'+bars+'</div>';
    g.appendChild(el);
  });
})()</script>
</body></html>
