<div class="dc2">
  <div class="dc2__hd">
    <div>
      <h3 class="dc2__title">Monthly Revenue</h3>
      <p class="dc2__sub">January – August 2025</p>
    </div>
    <div class="dc2__total">€84,210 <span class="dc2__up">▲ 14%</span></div>
  </div>
  <div class="dc2__chart">
    <div class="dc2__bar-wrap" *ngFor="let b of bars">
      <div class="dc2__bar" [style.height]="b.val + '%'" title="{{ b.val }}k"></div>
      <span class="dc2__month">{{ b.month }}</span>
    </div>
  </div>
</div>
