<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Upload 2 – Dark Avatar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:3rem 2rem}
.up2{width:100%;max-width:460px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:1.5rem;padding:2.5rem}
.up2__title{font-size:1.125rem;font-weight:800;color:#f1f5f9;margin-bottom:.375rem}
.up2__sub{font-size:.875rem;color:#64748b;margin-bottom:2rem;line-height:1.5}
.up2__avatar-row{display:flex;align-items:center;gap:1.25rem;margin-bottom:2rem}
.up2__av{width:5rem;height:5rem;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;cursor:pointer;position:relative}
.up2__av img{width:100%;height:100%;object-fit:cover;display:none}
.up2__av-actions{display:flex;flex-direction:column;gap:.5rem}
.up2__btn-change{padding:.55rem 1.125rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-weight:700;font-size:.8125rem;border:none;border-radius:.75rem;cursor:pointer;transition:opacity .2s}
.up2__btn-change:hover{opacity:.85}
.up2__btn-rm{padding:.55rem 1.125rem;background:rgba(255,255,255,.05);color:#94a3b8;font-weight:600;font-size:.8125rem;border:1px solid rgba(255,255,255,.08);border-radius:.75rem;cursor:pointer;transition:all .2s}
.up2__btn-rm:hover{background:rgba(239,68,68,.1);color:#f87171;border-color:rgba(239,68,68,.3)}
.up2__zone{border:2px dashed rgba(255,255,255,.1);border-radius:1rem;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02)}
.up2__zone:hover,.up2__zone.drag{border-color:#6366f1;background:rgba(99,102,241,.06)}
.up2__zone-ico{font-size:2rem;margin-bottom:.75rem}
.up2__zone-title{font-size:.875rem;font-weight:600;color:#e2e8f0;margin-bottom:.25rem}
.up2__zone-sub{font-size:.75rem;color:#475569}
input[type=file]{display:none}
.up2__hint{font-size:.75rem;color:#475569;margin-top:.875rem;text-align:center}
</style></head>
<body>
<div class="up2">
  <div class="up2__title">Profile photo</div>
  <p class="up2__sub">Upload a clear photo so your teammates can recognize you.</p>
  <div class="up2__avatar-row">
    <div class="up2__av" id="up2av" onclick="document.getElementById('up2input').click()">
      <span id="up2initials">JD</span>
      <img id="up2img" alt="avatar">
    </div>
    <div class="up2__av-actions">
      <button class="up2__btn-change" onclick="document.getElementById('up2input').click()">Upload photo</button>
      <button class="up2__btn-rm" onclick="window.up2Remove()">Remove</button>
    </div>
  </div>
  <div class="up2__zone" id="up2zone" onclick="document.getElementById('up2input').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="window.up2Drop(event)">
    <div class="up2__zone-ico">📎</div>
    <div class="up2__zone-title">Click to upload or drag & drop</div>
    <div class="up2__zone-sub">PNG, JPG up to 5 MB</div>
  </div>
  <input type="file" id="up2input" accept="image/*" onchange="window.up2Load(this.files[0])">
  <div class="up2__hint">Recommended: 400×400px, square format</div>
</div>
<script>(function(){
  window.up2Load = function(file){
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      var img = document.getElementById('up2img');
      img.src = e.target.result; img.style.display = 'block';
      document.getElementById('up2initials').style.display = 'none';
    };
    reader.readAsDataURL(file);
  };
  window.up2Remove = function(){
    var img=document.getElementById('up2img'); img.src=''; img.style.display='none';
    document.getElementById('up2initials').style.display='';
    document.getElementById('up2input').value='';
  };
  window.up2Drop = function(e){e.preventDefault();document.getElementById('up2zone').classList.remove('drag');if(e.dataTransfer.files[0]) up2Load(e.dataTransfer.files[0]);};
})()</script>
</body></html>
