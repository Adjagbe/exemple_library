<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Alert - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #111827; line-height: 1.6; }
    .error-showcase { max-width: 800px; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .alerts-container { display: flex; flex-direction: column; gap: 1rem; }
    .alert { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem 1.25rem; border-radius: 0.75rem; border: 1px solid transparent; }
    .alert--error { background: #fef2f2; border-color: #fecaca; }
    .alert-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #fee2e2; border-radius: 0.5rem; color: #ef4444; font-size: 1.25rem; flex-shrink: 0; }
    .alert-content { flex: 1; }
    .alert-title { display: block; font-size: 0.95rem; font-weight: 600; color: #991b1b; margin-bottom: 0.25rem; }
    .alert-message { font-size: 0.875rem; color: #b91c1c; margin: 0; }
    .alert-action { margin-top: 0.75rem; padding: 0.5rem 1rem; background: #ef4444; border: none; border-radius: 0.375rem; color: white; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
    .alert-action:hover { background: #dc2626; }
    .alert-close { padding: 0.25rem; background: none; border: none; color: #f87171; cursor: pointer; border-radius: 0.25rem; }
    .alert-close:hover { background: #fee2e2; color: #ef4444; }
  </style>
</head>
<body>
  <div class="error-showcase">
    <h2 class="section-title">Alert Boxes</h2>
    <div class="alerts-container" id="alertsContainer"></div>
  </div>
  <script>
    (function(){
      var alerts = [
        { id:'a1', title:'Erreur d\'authentification', message:'Votre mot de passe est incorrect. Il vous reste 3 tentatives.', icon:'bi-shield-exclamation', actionLabel:'Réinitialiser le mot de passe' },
        { id:'a2', title:'Quota dépassé', message:'Vous avez dépassé votre quota de stockage. Veuillez mettre à niveau votre plan.', icon:'bi-hdd-fill', actionLabel:'Mettre à niveau' },
        { id:'a3', title:'Maintenance prévue', message:'Une maintenance est prévue le 15 janvier de 2h à 4h.', icon:'bi-tools' }
      ];
      var container = document.getElementById('alertsContainer');
      function render(){
        container.innerHTML = '';
        alerts.forEach(function(a){
          var el = document.createElement('div');
          el.className = 'alert alert--error';
          el.innerHTML = '<div class="alert-icon"><i class="bi ' + (a.icon || 'bi-exclamation-triangle') + '"></i></div>' +
            '<div class="alert-content"><strong class="alert-title">' + a.title + '</strong><p class="alert-message">' + a.message + '</p>' +
            (a.actionLabel ? '<button class="alert-action">' + a.actionLabel + '</button>' : '') + '</div>' +
            '<button class="alert-close" data-id="' + a.id + '"><i class="bi bi-x-lg"></i></button>';
          container.appendChild(el);
        });
        container.querySelectorAll('.alert-close').forEach(function(btn){
          btn.onclick = function(){ var id = this.getAttribute('data-id'); alerts = alerts.filter(function(a){ return a.id !== id; }); render(); };
        });
      }
      render();
    })();
  </script>
</body>
</html>
