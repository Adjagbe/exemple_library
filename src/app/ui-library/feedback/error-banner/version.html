<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Banner - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #111827; line-height: 1.6; }
    .error-showcase { max-width: 800px; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .error-banner { display: flex; align-items: flex-start; gap: 1rem; padding: 1.25rem 1.5rem; background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); border-radius: 1rem; border: 1px solid #fca5a5; }
    .banner-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: #ef4444; border-radius: 50%; color: white; font-size: 1.5rem; flex-shrink: 0; }
    .banner-content { flex: 1; }
    .banner-title { display: block; font-size: 1rem; font-weight: 700; color: #991b1b; margin-bottom: 0.25rem; }
    .banner-message { font-size: 0.9rem; color: #b91c1c; margin: 0 0 0.5rem 0; }
    .banner-code { display: inline-block; padding: 0.125rem 0.5rem; background: rgba(239,68,68,0.1); border-radius: 0.25rem; font-size: 0.75rem; color: #991b1b; }
    .banner-action { padding: 0.625rem 1rem; background: #ef4444; border: none; border-radius: 0.5rem; color: white; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; white-space: nowrap; }
    .banner-action:hover { background: #dc2626; }
    @media (max-width: 640px) { .error-banner { flex-direction: column; } .banner-action { width: 100%; text-align: center; } }
  </style>
</head>
<body>
  <div class="error-showcase">
    <h2 class="section-title">Banner d'Erreur</h2>
    <div class="error-banner">
      <div class="banner-icon"><i class="bi bi-x-circle-fill"></i></div>
      <div class="banner-content">
        <strong class="banner-title">Erreur critique du serveur</strong>
        <p class="banner-message">Le serveur a rencontré une erreur interne. Notre équipe a été notifiée et travaille sur une résolution.</p>
        <code class="banner-code">Error 500: Internal Server Error</code>
      </div>
      <button class="banner-action">Réessayer</button>
    </div>
  </div>
</body>
</html>
