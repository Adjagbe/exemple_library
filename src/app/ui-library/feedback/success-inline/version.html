<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success Inline - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #111827; line-height: 1.6; }
    .success-showcase { max-width: 800px; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .inline-messages { display: flex; flex-direction: column; gap: 0.75rem; }
    .inline-success { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 0.5rem; font-size: 0.9rem; color: #16a34a; }
    .inline-success i { flex-shrink: 0; }
    .inline-title { font-weight: 600; }
  </style>
</head>
<body>
  <div class="success-showcase">
    <h2 class="section-title">Messages Inline</h2>
    <div class="inline-messages">
      <div class="inline-success">
        <i class="bi bi-check-circle"></i>
        <span class="inline-title">Enregistré</span>
        <span>Vos modifications ont été sauvegardées.</span>
      </div>
      <div class="inline-success">
        <i class="bi bi-shield-check"></i>
        <span class="inline-title">Vérifié</span>
        <span>Votre adresse email a été confirmée.</span>
      </div>
      <div class="inline-success">
        <i class="bi bi-check-circle"></i>
        <span>Synchronisation terminée avec succès.</span>
      </div>
    </div>
  </div>
</body>
</html>
