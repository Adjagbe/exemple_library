<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success Card - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #111827; line-height: 1.6; }
    .success-showcase { max-width: 800px; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .success-card { text-align: center; padding: 2.5rem; background: white; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .card-icon { width: 80px; height: 80px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; color: white; font-size: 2.5rem; }
    .card-title { font-size: 1.5rem; font-weight: 700; color: #111827; margin: 0 0 0.5rem 0; }
    .card-message { font-size: 1rem; color: #6b7280; margin: 0 0 1.5rem 0; }
    .card-details { display: flex; justify-content: center; gap: 2rem; padding: 1.25rem 0; border-top: 1px solid #f3f4f6; border-bottom: 1px solid #f3f4f6; margin-bottom: 1.5rem; }
    .detail { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
    .detail-label { font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
    .detail-value { font-size: 0.95rem; font-weight: 600; color: #111827; }
    .card-actions { display: flex; justify-content: center; gap: 0.75rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .btn--primary { background: linear-gradient(135deg, #10b981, #059669); color: white; } .btn--primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
    .btn--outline { background: white; border: 2px solid #e5e7eb; color: #374151; } .btn--outline:hover { border-color: #10b981; color: #10b981; }
    @media (max-width: 640px) { .card-details { flex-direction: column; gap: 1rem; } .card-actions { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="success-showcase">
    <h2 class="section-title">Success Card</h2>
    <div class="success-card">
      <div class="card-icon"><i class="bi bi-check-lg"></i></div>
      <h3 class="card-title">Commande confirmée</h3>
      <p class="card-message">Merci pour votre achat ! Votre commande sera expédiée dans les 24 heures.</p>
      <div class="card-details">
        <div class="detail"><span class="detail-label">Numéro de commande</span><span class="detail-value">#ORD-2024-12345</span></div>
        <div class="detail"><span class="detail-label">Montant</span><span class="detail-value">149,99 €</span></div>
      </div>
      <div class="card-actions">
        <button class="btn btn--primary">Suivre la commande</button>
        <button class="btn btn--outline">Télécharger le reçu</button>
      </div>
    </div>
  </div>
</body>
</html>
