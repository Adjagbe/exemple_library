<div class="success-showcase">
  <h2 class="section-title">Success Card</h2>
  <div class="success-card">
    <div class="card-icon">
      <i class="bi bi-check-lg"></i>
    </div>
    <h3 class="card-title">Commande confirmée</h3>
    <p class="card-message">Merci pour votre achat ! Votre commande sera expédiée dans les 24 heures.</p>
    <div class="card-details">
      <div class="detail">
        <span class="detail-label">Numéro de commande</span>
        <span class="detail-value">#ORD-2024-12345</span>
      </div>
      <div class="detail">
        <span class="detail-label">Montant</span>
        <span class="detail-value">149,99 €</span>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn btn--primary">Suivre la commande</button>
      <button class="btn btn--outline">Télécharger le reçu</button>
    </div>
  </div>
</div>
