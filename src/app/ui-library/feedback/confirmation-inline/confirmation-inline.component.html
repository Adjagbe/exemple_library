<div class="confirmation-showcase">
  <h2 class="section-title">Confirmation Inline</h2>
  <div class="inline-confirmations">
    <div class="inline-confirm">
      <span>Supprimer ce fichier ?</span>
      <div class="inline-actions">
        <button class="btn-inline btn-inline--cancel">Non</button>
        <button class="btn-inline btn-inline--danger">Oui, supprimer</button>
      </div>
    </div>
    <div class="inline-confirm inline-confirm--warning">
      <i class="bi bi-exclamation-triangle"></i>
      <span>Cette action va modifier 12 éléments</span>
      <div class="inline-actions">
        <button class="btn-inline btn-inline--cancel">Annuler</button>
        <button class="btn-inline btn-inline--warning">Continuer</button>
      </div>
    </div>
  </div>
</div>
