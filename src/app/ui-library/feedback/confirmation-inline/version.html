<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmation Inline - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #111827; line-height: 1.6; }
    .confirmation-showcase { max-width: 900px; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .inline-confirmations { display: flex; flex-direction: column; gap: 1rem; }
    .inline-confirm { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.75rem; }
    .inline-confirm > span { flex: 1; font-size: 0.95rem; color: #374151; }
    .inline-confirm > i { font-size: 1.25rem; color: #f59e0b; }
    .inline-confirm--warning { background: #fffbeb; border-color: #fde68a; }
    .inline-actions { display: flex; gap: 0.5rem; }
    .btn-inline { padding: 0.5rem 1rem; border: none; border-radius: 0.375rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .btn-inline--cancel { background: white; border: 1px solid #e5e7eb; color: #6b7280; } .btn-inline--cancel:hover { background: #f3f4f6; }
    .btn-inline--danger { background: #ef4444; color: white; } .btn-inline--danger:hover { background: #dc2626; }
    .btn-inline--warning { background: #f59e0b; color: white; } .btn-inline--warning:hover { background: #d97706; }
    @media (max-width: 640px) { .inline-confirm { flex-direction: column; text-align: center; } .inline-actions { width: 100%; justify-content: center; } }
  </style>
</head>
<body>
  <div class="confirmation-showcase">
    <h2 class="section-title">Confirmation Inline</h2>
    <div class="inline-confirmations">
      <div class="inline-confirm">
        <span>Supprimer ce fichier ?</span>
        <div class="inline-actions">
          <button class="btn-inline btn-inline--cancel">Non</button>
          <button class="btn-inline btn-inline--danger">Oui, supprimer</button>
        </div>
      </div>
      <div class="inline-confirm inline-confirm--warning">
        <i class="bi bi-exclamation-triangle"></i>
        <span>Cette action va modifier 12 éléments</span>
        <div class="inline-actions">
          <button class="btn-inline btn-inline--cancel">Annuler</button>
          <button class="btn-inline btn-inline--warning">Continuer</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
