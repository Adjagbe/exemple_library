<div class="error-showcase">
  <h2 class="section-title">Messages Inline</h2>
  <div class="form-demo">
    <div class="form-group has-error">
      <label>Email</label>
      <input type="email" value="invalid-email" class="input-error">
      <div class="inline-error">
        <i class="bi bi-exclamation-circle"></i>
        <span>L'adresse email n'est pas valide.</span>
      </div>
    </div>
    <div class="form-group has-error">
      <label>Mot de passe</label>
      <input type="password" class="input-error">
      <div class="inline-error">
        <i class="bi bi-exclamation-circle"></i>
        <span>Ce champ est requis</span>
      </div>
    </div>
  </div>
</div>
