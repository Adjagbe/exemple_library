<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page 404 - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════ */
    /* PAGE 404 COMPONENT - Premium UI Library                         */
    /* ═══════════════════════════════════════════════════════════════ */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
    }

    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }

    .error-content { text-align: center; max-width: 600px; }

    /* ─────────────────────────────────────────────────────────────────
       ILLUSTRATION
       ───────────────────────────────────────────────────────────────── */
    .error-illustration { position: relative; margin-bottom: 2rem; }
    .error-code { display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .digit { font-size: 8rem; font-weight: 800; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
    .digit.zero { width: 120px; height: 120px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; -webkit-text-fill-color: white; }
    .digit.zero i { font-size: 3.5rem; color: white; animation: pulse 2s ease-in-out infinite; }
    .floating-elements { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
    .floating-icon { position: absolute; font-size: 1.5rem; color: #a5b4fc; animation: float 3s ease-in-out infinite; }
    .floating-icon.icon-1 { top: 0; left: 10%; animation-delay: 0s; }
    .floating-icon.icon-2 { top: 20%; right: 5%; animation-delay: 0.5s; }
    .floating-icon.icon-3 { bottom: 10%; left: 15%; animation-delay: 1s; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    /* ─────────────────────────────────────────────────────────────────
       MESSAGE
       ───────────────────────────────────────────────────────────────── */
    .error-message { margin-bottom: 2rem; }
    .error-message h1 { font-size: 2rem; font-weight: 700; color: #111827; margin: 0 0 0.75rem 0; }
    .error-message p { font-size: 1.1rem; color: #6b7280; line-height: 1.6; margin: 0; }

    /* ─────────────────────────────────────────────────────────────────
       SEARCH
       ───────────────────────────────────────────────────────────────── */
    .error-search { margin-bottom: 2rem; }
    .search-box { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: white; border: 2px solid #e5e7eb; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
    .search-box:focus-within { border-color: #4f46e5; box-shadow: 0 4px 20px rgba(79, 70, 229, 0.15); }
    .search-box > i { color: #9ca3af; font-size: 1.1rem; }
    .search-box input { flex: 1; border: none; background: none; font-size: 1rem; color: #374151; }
    .search-box input::placeholder { color: #9ca3af; }
    .search-box input:focus { outline: none; }
    .search-box .search-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border: none; border-radius: 0.625rem; color: white; cursor: pointer; transition: all 0.2s ease; }
    .search-box .search-btn:hover { transform: scale(1.05); }

    /* ─────────────────────────────────────────────────────────────────
       ACTIONS
       ───────────────────────────────────────────────────────────────── */
    .error-actions { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2.5rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.875rem 1.5rem; border-radius: 0.625rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .btn--primary { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border: none; color: white; }
    .btn--primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
    .btn--outline { background: white; border: 2px solid #e5e7eb; color: #374151; }
    .btn--outline:hover { border-color: #4f46e5; color: #4f46e5; }

    /* ─────────────────────────────────────────────────────────────────
       POPULAR LINKS
       ───────────────────────────────────────────────────────────────── */
    .popular-links .links-title { font-size: 0.875rem; color: #9ca3af; margin: 0 0 1rem 0; }
    .links-list { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
    .link-item { display: flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; background: white; border: 1px solid #e5e7eb; border-radius: 9999px; font-size: 0.875rem; color: #6b7280; text-decoration: none; transition: all 0.2s ease; }
    .link-item:hover { border-color: #4f46e5; color: #4f46e5; background: #f5f3ff; }

    /* ─────────────────────────────────────────────────────────────────
       RESPONSIVE
       ───────────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .digit { font-size: 5rem; }
      .digit.zero { width: 80px; height: 80px; }
      .digit.zero i { font-size: 2.5rem; }
      .error-message h1 { font-size: 1.5rem; }
      .error-actions { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="error-page error-404">
  <div class="error-content">
    <!-- Illustration -->
    <div class="error-illustration">
      <div class="error-code">
        <span class="digit">4</span>
        <span class="digit zero">
          <i class="bi bi-search"></i>
        </span>
        <span class="digit">4</span>
      </div>
      <div class="floating-elements">
        <i class="bi bi-file-earmark floating-icon icon-1"></i>
        <i class="bi bi-folder floating-icon icon-2"></i>
        <i class="bi bi-question-circle floating-icon icon-3"></i>
      </div>
    </div>

    <!-- Message -->
    <div class="error-message">
      <h1>Page introuvable</h1>
      <p>Oups ! La page que vous recherchez semble avoir disparu dans le cyberespace. Elle a peut-être été déplacée ou supprimée.</p>
    </div>

    <!-- Search -->
    <div class="error-search">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" id="searchInput" placeholder="Rechercher sur le site...">
        <button class="search-btn" onclick="onSearch()">
          <i class="bi bi-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- Actions -->
    <div class="error-actions">
      <button class="btn btn--primary" onclick="alert('Retour à l\'accueil')">
        <i class="bi bi-house"></i>
        Retour à l'accueil
      </button>
      <button class="btn btn--outline" onclick="window.history.back()">
        <i class="bi bi-arrow-left"></i>
        Page précédente
      </button>
    </div>

    <!-- Popular Links -->
    <div class="popular-links">
      <p class="links-title">Liens utiles :</p>
      <div class="links-list">
        <a href="#" class="link-item"><i class="bi bi-house"></i> Accueil</a>
        <a href="#" class="link-item"><i class="bi bi-grid"></i> Tableau de bord</a>
        <a href="#" class="link-item"><i class="bi bi-box"></i> Produits</a>
        <a href="#" class="link-item"><i class="bi bi-headset"></i> Support</a>
      </div>
    </div>
  </div>
</div>

<script>
  function onSearch() {
    const query = document.getElementById('searchInput').value;
    if (query) {
      alert(`Recherche: ${query}`);
    }
  }

  document.getElementById('searchInput').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') onSearch();
  });
</script>

</body>
</html>
