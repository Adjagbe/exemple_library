<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success Toast - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #111827; line-height: 1.6; }
    .success-showcase { max-width: 800px; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .toast-container { display: flex; flex-direction: column; gap: 0.75rem; }
    .toast { display: flex; align-items: flex-start; gap: 0.75rem; padding: 1rem; background: white; border-radius: 0.75rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-left: 4px solid transparent; animation: slideIn 0.3s ease; }
    .toast--success { border-left-color: #10b981; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .toast-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: #d1fae5; border-radius: 50%; color: #10b981; font-size: 1.1rem; flex-shrink: 0; }
    .toast-content { flex: 1; }
    .toast-title { display: block; font-size: 0.95rem; font-weight: 600; color: #111827; margin-bottom: 0.125rem; }
    .toast-message { font-size: 0.875rem; color: #6b7280; margin: 0; }
    .toast-close { padding: 0.25rem; background: none; border: none; color: #9ca3af; cursor: pointer; border-radius: 0.25rem; } .toast-close:hover { background: #f3f4f6; color: #6b7280; }
  </style>
</head>
<body>
  <div class="success-showcase">
    <h2 class="section-title">Toast Notifications</h2>
    <div class="toast-container" id="toastContainer"></div>
  </div>
  <script>
    (function(){
      var toasts = [
        { id:'t1', title:'Profil mis à jour', message:'Vos informations personnelles ont été enregistrées avec succès.', icon:'bi-person-check', dismissible:true },
        { id:'t2', title:'Fichier uploadé', message:'Le document "rapport.pdf" a été uploadé avec succès.', icon:'bi-cloud-check', dismissible:true },
        { id:'t3', title:'Email envoyé', message:'Votre message a été envoyé à tous les destinataires.', icon:'bi-envelope-check', dismissible:false }
      ];
      var container = document.getElementById('toastContainer');
      function render(){
        container.innerHTML = '';
        toasts.forEach(function(t){
          var el = document.createElement('div');
          el.className = 'toast toast--success';
          el.innerHTML = '<div class="toast-icon"><i class="bi ' + (t.icon || 'bi-check-circle-fill') + '"></i></div>' +
            '<div class="toast-content"><strong class="toast-title">' + t.title + '</strong><p class="toast-message">' + t.message + '</p></div>' +
            (t.dismissible ? '<button class="toast-close" data-id="' + t.id + '"><i class="bi bi-x-lg"></i></button>' : '');
          container.appendChild(el);
        });
        container.querySelectorAll('.toast-close').forEach(function(btn){
          btn.onclick = function(){ var id = this.getAttribute('data-id'); toasts = toasts.filter(function(t){ return t.id !== id; }); render(); };
        });
      }
      render();
    })();
  </script>
</body>
</html>
