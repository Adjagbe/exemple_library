<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success Banner - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #111827; line-height: 1.6; }
    .success-showcase { max-width: 800px; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .success-banner { display: flex; align-items: flex-start; gap: 1rem; padding: 1.25rem 1.5rem; background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); border-radius: 1rem; border: 1px solid #6ee7b7; }
    .banner-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: #10b981; border-radius: 50%; color: white; font-size: 1.5rem; flex-shrink: 0; }
    .banner-content { flex: 1; }
    .banner-title { display: block; font-size: 1rem; font-weight: 700; color: #065f46; margin-bottom: 0.25rem; }
    .banner-message { font-size: 0.9rem; color: #047857; margin: 0; }
    .banner-action { padding: 0.625rem 1rem; background: #10b981; border: none; border-radius: 0.5rem; color: white; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; white-space: nowrap; display: inline-flex; align-items: center; gap: 0.5rem; }
    .banner-action:hover { background: #059669; }
    @media (max-width: 640px) { .success-banner { flex-direction: column; } .banner-action { width: 100%; text-align: center; justify-content: center; } }
  </style>
</head>
<body>
  <div class="success-showcase">
    <h2 class="section-title">Banner de Succès</h2>
    <div class="success-banner">
      <div class="banner-icon"><i class="bi bi-check-circle-fill"></i></div>
      <div class="banner-content">
        <strong class="banner-title">Commande traitée avec succès</strong>
        <p class="banner-message">Votre commande #12345 a été confirmée et sera expédiée dans les 24 heures.</p>
      </div>
      <button class="banner-action">Voir la commande <i class="bi bi-arrow-right"></i></button>
    </div>
  </div>
</body>
</html>
