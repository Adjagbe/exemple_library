<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Profile - Premium UI Library</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #111827; line-height: 1.6; }
    .skeleton-showcase { max-width: 900px; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .toggle-control { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .btn { padding: 0.75rem 1.5rem; background: #4f46e5; color: white; border: none; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; } .btn:hover { background: #4338ca; }
    .btn--primary { background: #4f46e5; color: white; } .btn--secondary { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 0.375rem; }
    .skeleton--avatar-lg { height: 100px; width: 100px; border-radius: 50%; } .skeleton--title { height: 24px; width: 60%; } .skeleton--text { height: 14px; width: 100%; } .skeleton--short { width: 40%; } .skeleton--stat { height: 14px; width: 80px; } .skeleton--btn { height: 40px; width: 100px; border-radius: 0.375rem; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .profile-skeleton, .profile-real { padding: 2rem; background: white; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .profile-header { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; align-items: center; }
    .profile-info { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    .profile-info h3 { margin: 0; } .profile-info p { margin: 0; color: #6b7280; }
    .profile-stats { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; padding: 1rem 0; border-top: 1px solid #f3f4f6; border-bottom: 1px solid #f3f4f6; }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: #111827; } .stat-label { font-size: 0.75rem; color: #6b7280; }
    .profile-actions { display: flex; gap: 0.75rem; }
    .avatar-lg { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; background: #4f46e5; border-radius: 50%; color: white; font-size: 2.5rem; font-weight: 700; }
    .hidden { display: none; }
    @media (max-width: 640px) { .profile-header { flex-direction: column; text-align: center; } .profile-stats { justify-content: center; } .profile-actions { justify-content: center; } }
  </style>
</head>
<body>
  <div class="skeleton-showcase">
    <h2 class="section-title">Profil</h2>
    <div class="toggle-control">
      <button class="btn" id="toggleBtn">Afficher le contenu</button>
    </div>
    <div id="skelView" class="profile-skeleton">
      <div class="profile-header">
        <div class="skeleton skeleton--avatar-lg"></div>
        <div class="profile-info">
          <div class="skeleton skeleton--title"></div>
          <div class="skeleton skeleton--text skeleton--short"></div>
          <div class="profile-stats">
            <div class="skeleton skeleton--stat"></div>
            <div class="skeleton skeleton--stat"></div>
            <div class="skeleton skeleton--stat"></div>
          </div>
        </div>
      </div>
      <div class="profile-actions">
        <div class="skeleton skeleton--btn"></div>
        <div class="skeleton skeleton--btn"></div>
      </div>
    </div>
    <div id="realView" class="profile-real hidden">
      <div class="profile-header">
        <div class="avatar-lg">JD</div>
        <div class="profile-info">
          <h3>Jean Dupont</h3>
          <p>Développeur Full Stack</p>
          <div class="profile-stats">
            <div class="stat"><span class="stat-value">42</span><span class="stat-label">Projets</span></div>
            <div class="stat"><span class="stat-value">128</span><span class="stat-label">Followers</span></div>
            <div class="stat"><span class="stat-value">56</span><span class="stat-label">Following</span></div>
          </div>
        </div>
      </div>
      <div class="profile-actions">
        <button class="btn btn--primary">Suivre</button>
        <button class="btn btn--secondary">Message</button>
      </div>
    </div>
  </div>
  <script>
    (function(){
      var isLoading = true;
      var btn = document.getElementById('toggleBtn');
      btn.onclick = function(){
        isLoading = !isLoading;
        document.getElementById('skelView').className = isLoading ? 'profile-skeleton' : 'profile-skeleton hidden';
        document.getElementById('realView').className = isLoading ? 'profile-real hidden' : 'profile-real';
        btn.textContent = isLoading ? 'Afficher le contenu' : 'Afficher les skeletons';
      };
    })();
  </script>
</body>
</html>
