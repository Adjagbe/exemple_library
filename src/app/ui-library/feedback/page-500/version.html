<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erreur 500 - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════ */
    /* PAGE 500 COMPONENT - Premium UI Library                         */
    /* ═══════════════════════════════════════════════════════════════ */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
    }

    .error-page.error-500 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
    }

    .error-content { text-align: center; max-width: 550px; }

    /* ─────────────────────────────────────────────────────────────────
       ILLUSTRATION
       ───────────────────────────────────────────────────────────────── */
    .error-illustration { margin-bottom: 2rem; }
    .server-icon { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 120px; height: 120px; background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border-radius: 1.5rem; margin-bottom: 1rem; }
    .server-icon i { font-size: 3.5rem; color: white; animation: shake 0.5s ease-in-out infinite; }
    .error-spark { position: absolute; width: 8px; height: 8px; background: #fbbf24; border-radius: 50%; animation: spark 1s ease-in-out infinite; }
    .error-spark.spark-1 { top: 10px; right: 15px; animation-delay: 0s; }
    .error-spark.spark-2 { top: 25px; right: 5px; animation-delay: 0.3s; }
    .error-spark.spark-3 { top: 5px; right: 30px; animation-delay: 0.6s; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
    @keyframes spark { 0%, 100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } }
    .error-code { font-size: 5rem; font-weight: 800; color: #dc2626; line-height: 1; }

    /* ─────────────────────────────────────────────────────────────────
       MESSAGE
       ───────────────────────────────────────────────────────────────── */
    .error-message { margin-bottom: 1.5rem; }
    .error-message h1 { font-size: 2rem; font-weight: 700; color: #111827; margin: 0 0 0.75rem 0; }
    .error-message p { font-size: 1rem; color: #6b7280; line-height: 1.6; margin: 0; }

    /* ─────────────────────────────────────────────────────────────────
       ERROR DETAILS
       ───────────────────────────────────────────────────────────────── */
    .error-details { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin-bottom: 2rem; padding: 1rem; background: white; border-radius: 0.75rem; border: 1px solid #fecaca; }
    .detail-item { display: flex; flex-direction: column; gap: 0.25rem; padding: 0 1rem; }
    .detail-item:not(:last-child) { border-right: 1px solid #fee2e2; }
    .detail-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; }
    .detail-value { font-size: 0.8rem; font-family: monospace; color: #dc2626; background: #fef2f2; padding: 0.25rem 0.5rem; border-radius: 0.25rem; }

    /* ─────────────────────────────────────────────────────────────────
       ACTIONS
       ───────────────────────────────────────────────────────────────── */
    .error-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.25rem; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .btn--primary { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); border: none; color: white; }
    .btn--primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
    .btn--outline { background: white; border: 2px solid #e5e7eb; color: #374151; }
    .btn--outline:hover { border-color: #dc2626; color: #dc2626; }
    .btn--ghost { background: none; border: none; color: #6b7280; }
    .btn--ghost:hover { color: #dc2626; background: #fef2f2; }

    /* ─────────────────────────────────────────────────────────────────
       STATUS
       ───────────────────────────────────────────────────────────────── */
    .status-info { display: flex; align-items: center; justify-content: center; gap: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #fecaca; }
    .status-indicator { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #6b7280; }
    .status-dot { width: 8px; height: 8px; background: #f59e0b; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .status-link { display: flex; align-items: center; gap: 0.375rem; font-size: 0.85rem; color: #4f46e5; text-decoration: none; }
    .status-link:hover { text-decoration: underline; }

    /* ─────────────────────────────────────────────────────────────────
       RESPONSIVE
       ───────────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .error-code { font-size: 3.5rem; }
      .server-icon { width: 100px; height: 100px; }
      .server-icon i { font-size: 2.5rem; }
      .error-details { flex-direction: column; }
      .detail-item { border-right: none !important; padding: 0.5rem 0; }
      .detail-item:not(:last-child) { border-bottom: 1px solid #fee2e2; }
      .status-info { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>

<div class="error-page error-500">
  <div class="error-content">
    <!-- Illustration -->
    <div class="error-illustration">
      <div class="server-icon">
        <i class="bi bi-hdd-stack"></i>
        <div class="error-spark spark-1"></div>
        <div class="error-spark spark-2"></div>
        <div class="error-spark spark-3"></div>
      </div>
      <div class="error-code">500</div>
    </div>

    <!-- Message -->
    <div class="error-message">
      <h1>Erreur serveur</h1>
      <p>Quelque chose s'est mal passé de notre côté. Nos équipes techniques ont été notifiées et travaillent à résoudre le problème.</p>
    </div>

    <!-- Error Details -->
    <div class="error-details">
      <div class="detail-item">
        <span class="detail-label">ID de l'erreur</span>
        <code class="detail-value" id="errorId">ERR-XXXXXXXX</code>
      </div>
      <div class="detail-item">
        <span class="detail-label">Timestamp</span>
        <code class="detail-value" id="timestamp"></code>
      </div>
    </div>

    <!-- Actions -->
    <div class="error-actions">
      <button class="btn btn--primary" onclick="window.location.reload()">
        <i class="bi bi-arrow-clockwise"></i>
        Réessayer
      </button>
      <button class="btn btn--outline" onclick="alert('Retour à l\'accueil')">
        <i class="bi bi-house"></i>
        Accueil
      </button>
      <button class="btn btn--ghost" onclick="reportIssue()">
        <i class="bi bi-flag"></i>
        Signaler
      </button>
    </div>

    <!-- Status -->
    <div class="status-info">
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span>Vérification du statut des services...</span>
      </div>
      <a href="#" class="status-link">
        <i class="bi bi-bar-chart"></i>
        Page de statut
      </a>
    </div>
  </div>
</div>

<script>
  // Generate error ID and timestamp
  document.getElementById('errorId').textContent = 'ERR-' + Math.random().toString(36).substring(2, 10).toUpperCase();
  document.getElementById('timestamp').textContent = new Date().toISOString();

  function reportIssue() {
    const errorId = document.getElementById('errorId').textContent;
    alert(`Erreur signalée: ${errorId}`);
  }
</script>

</body>
</html>
