<div class="datepicker-showcase">
  <section class="showcase-section">
    <h3 class="section-title">Date Range Picker</h3>
    <div class="selected-value">
      Range: {{ startDate ? formatDate(startDate) : 'Start' }} - {{ endDate ? formatDate(endDate) : 'End' }}
    </div>
    <div class="form-group">
      <label class="form-label">Select Date Range</label>
      <div class="datepicker">
        <div class="datepicker-input" [class.open]="isRangeCalendarOpen" (click)="isRangeCalendarOpen = !isRangeCalendarOpen; $event.stopPropagation()">
          <i class="bi bi-calendar-range"></i>
          <span>{{ startDate ? formatDate(startDate) + ' - ' + (endDate ? formatDate(endDate) : '...') : 'Select range' }}</span>
          <button class="clear-btn" *ngIf="startDate" (click)="clearRange(); $event.stopPropagation()">
            <i class="bi bi-x"></i>
          </button>
        </div>
        <div class="datepicker-dropdown range-dropdown" [class.open]="isRangeCalendarOpen" (click)="$event.stopPropagation()">
          <div class="preset-ranges">
            <button class="preset-btn" *ngFor="let preset of presetRanges" (click)="applyPresetRange(preset)">{{ preset.label }}</button>
          </div>
          <div class="range-calendar">
            <div class="calendar-header">
              <button class="nav-btn" (click)="previousRangeMonth()"><i class="bi bi-chevron-left"></i></button>
              <span class="month-year">{{ getMonthYear(rangeCurrentMonth) }}</span>
              <button class="nav-btn" (click)="nextRangeMonth()"><i class="bi bi-chevron-right"></i></button>
            </div>
            <div class="calendar-grid">
              <div class="weekday" *ngFor="let day of weekDays">{{ day }}</div>
              <ng-container *ngFor="let day of getRangeCalendarDays()">
                <div class="calendar-day" *ngIf="day"
                  [class.today]="isToday(day)"
                  [class.range-start]="isRangeStart(day)"
                  [class.range-end]="isRangeEnd(day)"
                  [class.in-range]="isInRange(day)"
                  (click)="selectRangeDate(day)">{{ day.getDate() }}</div>
                <div class="calendar-day empty" *ngIf="!day"></div>
              </ng-container>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
