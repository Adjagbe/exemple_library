<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════ */
    /* SELECT / COMBOBOX COMPONENT - Premium UI Library                */
    /* ═══════════════════════════════════════════════════════════════ */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f8fafc;
      line-height: 1.5;
    }

    .select-showcase {
      max-width: 600px;
      margin: 2rem auto;
      padding: 1.5rem;
    }

    .showcase-section {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #111827;
      margin: 0 0 1.25rem 0;
    }

    .selected-value {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: #6b7280;
    }

    .selected-value strong {
      color: #4f46e5;
    }

    /* ─────────────────────────────────────────────────────────────────
       FORM GROUP
       ───────────────────────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    /* ─────────────────────────────────────────────────────────────────
       NATIVE SELECT
       ───────────────────────────────────────────────────────────────── */
    .form-select {
      width: 100%;
      padding: 0.75rem 2.5rem 0.75rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      color: #374151;
      background: white url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e") right 0.75rem center/1.25em 1.25em no-repeat;
      appearance: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-select:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .form-select:disabled {
      background-color: #f9fafb;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .form-select--sm {
      padding: 0.5rem 2rem 0.5rem 0.75rem;
      font-size: 0.8rem;
    }

    .form-select--lg {
      padding: 1rem 3rem 1rem 1.25rem;
      font-size: 1rem;
    }

    .form-select--error {
      border-color: #dc2626;
    }

    .form-select--error:focus {
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }

    .form-select--success {
      border-color: #10b981;
    }

    .form-select--success:focus {
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    /* ─────────────────────────────────────────────────────────────────
       CUSTOM SELECT
       ───────────────────────────────────────────────────────────────── */
    .custom-select {
      position: relative;
    }

    .select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.75rem 1rem;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      color: #374151;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .select-trigger:hover {
      border-color: #d1d5db;
    }

    .custom-select.open .select-trigger {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .trigger-content {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
    }

    .placeholder {
      color: #9ca3af;
    }

    .trigger-arrow {
      font-size: 0.875rem;
      color: #6b7280;
      transition: transform 0.2s ease;
    }

    .custom-select.open .trigger-arrow {
      transform: rotate(180deg);
    }

    .option-icon {
      font-size: 1.25rem;
    }

    .option-group-badge {
      padding: 0.125rem 0.5rem;
      background: #f3f4f6;
      border-radius: 50px;
      font-size: 0.7rem;
      color: #6b7280;
      margin-left: auto;
    }

    /* ─────────────────────────────────────────────────────────────────
       DROPDOWN
       ───────────────────────────────────────────────────────────────── */
    .select-dropdown {
      position: absolute;
      top: calc(100% + 0.5rem);
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.2s ease;
    }

    .custom-select.open .select-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-search {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #e5e7eb;
    }

    .dropdown-search i {
      color: #9ca3af;
    }

    .dropdown-search input {
      flex: 1;
      border: none;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }

    .dropdown-search input::placeholder {
      color: #9ca3af;
    }

    .dropdown-options {
      max-height: 250px;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .dropdown-options.grouped {
      padding: 0;
    }

    .dropdown-option {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .dropdown-option:hover {
      background: #f3f4f6;
    }

    .dropdown-option.selected {
      background: #eff6ff;
      color: #4f46e5;
    }

    .dropdown-option .bi-check {
      margin-left: auto;
      color: #4f46e5;
    }

    .no-results {
      padding: 1rem;
      text-align: center;
      color: #9ca3af;
      font-size: 0.875rem;
    }

    /* ─────────────────────────────────────────────────────────────────
       GROUPED OPTIONS
       ───────────────────────────────────────────────────────────────── */
    .option-group:not(:last-child) {
      border-bottom: 1px solid #e5e7eb;
    }

    .group-header {
      padding: 0.75rem 1rem 0.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
    }

    /* ─────────────────────────────────────────────────────────────────
       MULTI-SELECT
       ───────────────────────────────────────────────────────────────── */
    .multi-select .select-trigger {
      flex-wrap: wrap;
      gap: 0.5rem;
      min-height: 46px;
    }

    .multi-values {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      flex: 1;
    }

    .multi-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.5rem;
      background: #eff6ff;
      border-radius: 0.375rem;
      font-size: 0.8rem;
      color: #4f46e5;
    }

    .multi-tag .bi-x {
      cursor: pointer;
      font-size: 1rem;
    }

    .multi-tag .bi-x:hover {
      color: #dc2626;
    }

    .option-checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid #d1d5db;
      border-radius: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .dropdown-option.selected .option-checkbox {
      background: #4f46e5;
      border-color: #4f46e5;
    }

    .dropdown-option.selected .option-checkbox i {
      color: white;
      font-size: 0.75rem;
    }

    /* ─────────────────────────────────────────────────────────────────
       EXAMPLES GRID
       ───────────────────────────────────────────────────────────────── */
    .size-examples,
    .state-examples {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }

    /* ─────────────────────────────────────────────────────────────────
       MESSAGES
       ───────────────────────────────────────────────────────────────── */
    .error-message,
    .success-message {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }

    .error-message i,
    .success-message i {
      font-size: 0.875rem;
    }

    .error-message {
      color: #dc2626;
    }

    .success-message {
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="select-showcase">
    <!-- Basic Select -->
    <section class="showcase-section">
      <h2 class="section-title">Basic Select</h2>
      <div class="form-group">
        <label class="form-label">Choose an option</label>
        <select class="form-select" id="basicSelect" onchange="updateBasicValue()">
          <option value="" disabled selected>Select an option...</option>
          <option value="option1">Option 1</option>
          <option value="option2">Option 2</option>
          <option value="option3">Option 3</option>
          <option value="option4" disabled>Option 4 (Disabled)</option>
          <option value="option5">Option 5</option>
        </select>
      </div>
      <p class="selected-value" id="basicSelectedText" style="display: none;">
        Selected: <strong id="basicSelectedValue"></strong>
      </p>
    </section>

    <!-- Searchable Select -->
    <section class="showcase-section">
      <h2 class="section-title">Searchable Select</h2>
      <div class="form-group">
        <label class="form-label">Select your country</label>
        <div class="custom-select" id="searchSelect">
          <button class="select-trigger" onclick="toggleSearch()">
            <span class="trigger-content" id="searchTriggerContent">
              <i class="bi bi-globe"></i>
              <span class="placeholder">Select a country...</span>
            </span>
            <i class="bi bi-chevron-down trigger-arrow"></i>
          </button>
          
          <div class="select-dropdown">
            <div class="dropdown-search">
              <i class="bi bi-search"></i>
              <input type="text" placeholder="Search countries..." id="searchInput" oninput="filterCountries()" onclick="event.stopPropagation()">
            </div>
            <div class="dropdown-options" id="countryOptions"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Multi-Select -->
    <section class="showcase-section">
      <h2 class="section-title">Multi-Select</h2>
      <div class="form-group">
        <label class="form-label">Select technologies</label>
        <div class="custom-select multi-select" id="multiSelect">
          <button class="select-trigger" onclick="toggleMulti()">
            <div class="multi-values" id="multiTags"></div>
            <span class="placeholder" id="multiPlaceholder">Select technologies...</span>
            <i class="bi bi-chevron-down trigger-arrow"></i>
          </button>
          
          <div class="select-dropdown">
            <div class="dropdown-options" id="techOptions"></div>
          </div>
        </div>
      </div>
      <p class="selected-value" id="multiSelectedText" style="display: none;">
        Selected: <strong id="multiSelectedValue"></strong>
      </p>
    </section>

    <!-- Grouped Select -->
    <section class="showcase-section">
      <h2 class="section-title">Grouped Select</h2>
      <div class="form-group">
        <label class="form-label">Select an application</label>
        <div class="custom-select" id="groupedSelect">
          <button class="select-trigger" onclick="toggleGrouped()">
            <span class="trigger-content" id="groupedTriggerContent">
              <span class="placeholder">Select an application...</span>
            </span>
            <i class="bi bi-chevron-down trigger-arrow"></i>
          </button>
          
          <div class="select-dropdown">
            <div class="dropdown-options grouped" id="groupedOptions"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Select Sizes -->
    <section class="showcase-section">
      <h2 class="section-title">Sizes</h2>
      <div class="size-examples">
        <div class="form-group">
          <label class="form-label">Small</label>
          <select class="form-select form-select--sm">
            <option>Small select</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Medium (Default)</label>
          <select class="form-select">
            <option>Medium select</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Large</label>
          <select class="form-select form-select--lg">
            <option>Large select</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Select States -->
    <section class="showcase-section">
      <h2 class="section-title">States</h2>
      <div class="state-examples">
        <div class="form-group">
          <label class="form-label">Normal</label>
          <select class="form-select">
            <option>Normal state</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Disabled</label>
          <select class="form-select" disabled>
            <option>Disabled state</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Error</label>
          <select class="form-select form-select--error">
            <option>Error state</option>
          </select>
          <span class="error-message"><i class="bi bi-exclamation-circle"></i> This field is required</span>
        </div>
        <div class="form-group">
          <label class="form-label">Success</label>
          <select class="form-select form-select--success">
            <option>Valid selection</option>
          </select>
          <span class="success-message"><i class="bi bi-check-circle"></i> Looks good!</span>
        </div>
      </div>
    </section>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // SELECT COMPONENT - Premium UI Library
    // ═══════════════════════════════════════════════════════════════

    // Data
    const countries = [
      { value: 'us', label: 'United States', icon: '🇺🇸' },
      { value: 'uk', label: 'United Kingdom', icon: '🇬🇧' },
      { value: 'ca', label: 'Canada', icon: '🇨🇦' },
      { value: 'au', label: 'Australia', icon: '🇦🇺' },
      { value: 'de', label: 'Germany', icon: '🇩🇪' },
      { value: 'fr', label: 'France', icon: '🇫🇷' },
      { value: 'jp', label: 'Japan', icon: '🇯🇵' },
      { value: 'br', label: 'Brazil', icon: '🇧🇷' },
      { value: 'in', label: 'India', icon: '🇮🇳' },
      { value: 'mx', label: 'Mexico', icon: '🇲🇽' }
    ];

    const technologies = [
      { value: 'angular', label: 'Angular', icon: 'bi-code-slash' },
      { value: 'react', label: 'React', icon: 'bi-code-slash' },
      { value: 'vue', label: 'Vue.js', icon: 'bi-code-slash' },
      { value: 'typescript', label: 'TypeScript', icon: 'bi-braces' },
      { value: 'nodejs', label: 'Node.js', icon: 'bi-server' },
      { value: 'python', label: 'Python', icon: 'bi-terminal' },
      { value: 'docker', label: 'Docker', icon: 'bi-box' },
      { value: 'kubernetes', label: 'Kubernetes', icon: 'bi-diagram-3' }
    ];

    const groupedOptions = [
      { value: 'chrome', label: 'Chrome', group: 'Browsers' },
      { value: 'firefox', label: 'Firefox', group: 'Browsers' },
      { value: 'safari', label: 'Safari', group: 'Browsers' },
      { value: 'vscode', label: 'VS Code', group: 'Editors' },
      { value: 'sublime', label: 'Sublime Text', group: 'Editors' },
      { value: 'vim', label: 'Vim', group: 'Editors' },
      { value: 'slack', label: 'Slack', group: 'Communication' },
      { value: 'discord', label: 'Discord', group: 'Communication' }
    ];

    // State
    let searchValue = '';
    let multiValue = ['react', 'typescript'];
    let groupedValue = '';

    // ─────────────────────────────────────────────────────────────────
    // BASIC SELECT
    // ─────────────────────────────────────────────────────────────────
    function updateBasicValue() {
      const select = document.getElementById('basicSelect');
      const text = document.getElementById('basicSelectedText');
      const value = document.getElementById('basicSelectedValue');
      
      if (select.value) {
        text.style.display = 'block';
        value.textContent = select.value;
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // SEARCHABLE SELECT
    // ─────────────────────────────────────────────────────────────────
    function toggleSearch() {
      closeAllDropdowns();
      document.getElementById('searchSelect').classList.toggle('open');
      filterCountries();
    }

    function filterCountries() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = countries.filter(c => c.label.toLowerCase().includes(query));
      
      const container = document.getElementById('countryOptions');
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results">No countries found</div>';
      } else {
        container.innerHTML = filtered.map(country => `
          <div class="dropdown-option ${searchValue === country.value ? 'selected' : ''}" 
               onclick="selectCountry('${country.value}')">
            <span class="option-icon">${country.icon}</span>
            <span>${country.label}</span>
            ${searchValue === country.value ? '<i class="bi bi-check"></i>' : ''}
          </div>
        `).join('');
      }
    }

    function selectCountry(value) {
      searchValue = value;
      const country = countries.find(c => c.value === value);
      
      document.getElementById('searchTriggerContent').innerHTML = `
        <span class="option-icon">${country.icon}</span>
        <span>${country.label}</span>
      `;
      
      document.getElementById('searchSelect').classList.remove('open');
      document.getElementById('searchInput').value = '';
    }

    // ─────────────────────────────────────────────────────────────────
    // MULTI-SELECT
    // ─────────────────────────────────────────────────────────────────
    function toggleMulti() {
      closeAllDropdowns();
      document.getElementById('multiSelect').classList.toggle('open');
    }

    function renderMultiOptions() {
      const container = document.getElementById('techOptions');
      container.innerHTML = technologies.map(tech => `
        <div class="dropdown-option ${multiValue.includes(tech.value) ? 'selected' : ''}" 
             onclick="toggleMultiOption('${tech.value}'); event.stopPropagation()">
          <span class="option-checkbox">
            ${multiValue.includes(tech.value) ? '<i class="bi bi-check"></i>' : ''}
          </span>
          <i class="bi ${tech.icon}"></i>
          <span>${tech.label}</span>
        </div>
      `).join('');
    }

    function renderMultiTags() {
      const tagsContainer = document.getElementById('multiTags');
      const placeholder = document.getElementById('multiPlaceholder');
      const text = document.getElementById('multiSelectedText');
      const value = document.getElementById('multiSelectedValue');
      
      if (multiValue.length > 0) {
        const selected = technologies.filter(t => multiValue.includes(t.value));
        tagsContainer.innerHTML = selected.map(tech => `
          <span class="multi-tag">
            ${tech.label}
            <i class="bi bi-x" onclick="removeMultiOption('${tech.value}', event)"></i>
          </span>
        `).join('');
        placeholder.style.display = 'none';
        text.style.display = 'block';
        value.textContent = multiValue.join(', ');
      } else {
        tagsContainer.innerHTML = '';
        placeholder.style.display = 'inline';
        text.style.display = 'none';
      }
    }

    function toggleMultiOption(val) {
      const index = multiValue.indexOf(val);
      if (index > -1) {
        multiValue.splice(index, 1);
      } else {
        multiValue.push(val);
      }
      renderMultiOptions();
      renderMultiTags();
    }

    function removeMultiOption(val, event) {
      event.stopPropagation();
      const index = multiValue.indexOf(val);
      if (index > -1) {
        multiValue.splice(index, 1);
      }
      renderMultiOptions();
      renderMultiTags();
    }

    // ─────────────────────────────────────────────────────────────────
    // GROUPED SELECT
    // ─────────────────────────────────────────────────────────────────
    function toggleGrouped() {
      closeAllDropdowns();
      document.getElementById('groupedSelect').classList.toggle('open');
    }

    function renderGroupedOptions() {
      const groups = [...new Set(groupedOptions.map(o => o.group))];
      const container = document.getElementById('groupedOptions');
      
      container.innerHTML = groups.map(group => `
        <div class="option-group">
          <div class="group-header">${group}</div>
          ${groupedOptions.filter(o => o.group === group).map(option => `
            <div class="dropdown-option ${groupedValue === option.value ? 'selected' : ''}" 
                 onclick="selectGroupedOption('${option.value}')">
              <span>${option.label}</span>
              ${groupedValue === option.value ? '<i class="bi bi-check"></i>' : ''}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function selectGroupedOption(value) {
      groupedValue = value;
      const option = groupedOptions.find(o => o.value === value);
      
      document.getElementById('groupedTriggerContent').innerHTML = `
        <span>${option.label}</span>
        <span class="option-group-badge">${option.group}</span>
      `;
      
      document.getElementById('groupedSelect').classList.remove('open');
      renderGroupedOptions();
    }

    // ─────────────────────────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────────────────────────
    function closeAllDropdowns() {
      document.querySelectorAll('.custom-select').forEach(el => el.classList.remove('open'));
    }

    document.addEventListener('click', function(event) {
      const selects = document.querySelectorAll('.custom-select');
      selects.forEach(select => {
        if (!select.contains(event.target)) {
          select.classList.remove('open');
        }
      });
    });

    // ─────────────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      filterCountries();
      renderMultiOptions();
      renderMultiTags();
      renderGroupedOptions();
    });
  </script>
</body>
</html>
