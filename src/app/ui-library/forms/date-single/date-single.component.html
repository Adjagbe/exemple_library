<div class="datepicker-showcase">
  <section class="showcase-section">
    <h3 class="section-title">Single Date Picker</h3>
    <div class="selected-value">Selected: {{ selectedDate ? formatDate(selectedDate) : 'None' }}</div>
    <div class="form-group">
      <label class="form-label">Select Date</label>
      <div class="datepicker">
        <div class="datepicker-input" [class.open]="isCalendarOpen" (click)="isCalendarOpen = !isCalendarOpen; $event.stopPropagation()">
          <i class="bi bi-calendar3"></i>
          <span>{{ selectedDate ? formatDate(selectedDate) : 'Pick a date' }}</span>
          <button class="clear-btn" *ngIf="selectedDate" (click)="clearDate(); $event.stopPropagation()">
            <i class="bi bi-x"></i>
          </button>
        </div>
        <div class="datepicker-dropdown" [class.open]="isCalendarOpen" (click)="$event.stopPropagation()">
          <div class="calendar-header">
            <button class="nav-btn" (click)="previousMonth()"><i class="bi bi-chevron-left"></i></button>
            <span class="month-year">{{ getMonthYear(currentMonth) }}</span>
            <button class="nav-btn" (click)="nextMonth()"><i class="bi bi-chevron-right"></i></button>
          </div>
          <div class="calendar-grid">
            <div class="weekday" *ngFor="let day of weekDays">{{ day }}</div>
            <ng-container *ngFor="let day of getCalendarDays()">
              <div class="calendar-day" *ngIf="day" [class.today]="isToday(day)" [class.selected]="isSelected(day)" (click)="selectDate(day)">{{ day.getDate() }}</div>
              <div class="calendar-day empty" *ngIf="!day"></div>
            </ng-container>
          </div>
          <div class="calendar-footer">
            <button class="today-btn" (click)="selectToday()">Today</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
