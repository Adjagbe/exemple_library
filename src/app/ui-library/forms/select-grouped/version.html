<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grouped Select - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #f8fafc; line-height: 1.5; }
    .select-showcase { max-width: 600px; margin: 2rem auto; padding: 1.5rem; }
    .showcase-section { background: white; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .section-title { font-size: 1.1rem; font-weight: 600; color: #111827; margin: 0 0 1.25rem 0; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem; }
    .custom-select { position: relative; }
    .select-trigger { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0.75rem 1rem; background: white; border: 2px solid #e5e7eb; border-radius: 0.5rem; font-size: 0.9rem; color: #374151; cursor: pointer; transition: all 0.2s ease; text-align: left; }
    .select-trigger:hover { border-color: #d1d5db; }
    .custom-select.open .select-trigger { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .trigger-content { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 0; }
    .placeholder { color: #9ca3af; }
    .option-group-badge { padding: 0.125rem 0.5rem; background: #f3f4f6; border-radius: 50px; font-size: 0.7rem; color: #6b7280; margin-left: auto; }
    .trigger-arrow { font-size: 0.875rem; color: #6b7280; transition: transform 0.2s ease; }
    .custom-select.open .trigger-arrow { transform: rotate(180deg); }
    .select-dropdown { position: absolute; top: calc(100% + 0.5rem); left: 0; right: 0; background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 1000; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease; }
    .custom-select.open .select-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
    .dropdown-options { max-height: 250px; overflow-y: auto; padding: 0.5rem; }
    .dropdown-options.grouped { padding: 0; }
    .dropdown-option { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.5rem; cursor: pointer; transition: all 0.15s ease; }
    .dropdown-option:hover { background: #f3f4f6; }
    .dropdown-option.selected { background: #eff6ff; color: #4f46e5; }
    .dropdown-option .bi-check { margin-left: auto; color: #4f46e5; }
    .option-group:not(:last-child) { border-bottom: 1px solid #e5e7eb; }
    .group-header { padding: 0.75rem 1rem 0.5rem; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="select-showcase">
    <section class="showcase-section">
      <h2 class="section-title">Grouped Select</h2>
      <div class="form-group">
        <label class="form-label">Select an application</label>
        <div class="custom-select" id="groupedSelect">
          <button class="select-trigger" id="groupedTrigger">
            <span class="trigger-content" id="groupedTriggerContent">
              <span class="placeholder">Select an application...</span>
            </span>
            <i class="bi bi-chevron-down trigger-arrow"></i>
          </button>
          <div class="select-dropdown">
            <div class="dropdown-options grouped" id="groupedOptions"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function() {
      const options = [
        { value: 'chrome', label: 'Chrome', group: 'Browsers' },
        { value: 'firefox', label: 'Firefox', group: 'Browsers' },
        { value: 'safari', label: 'Safari', group: 'Browsers' },
        { value: 'vscode', label: 'VS Code', group: 'Editors' },
        { value: 'sublime', label: 'Sublime Text', group: 'Editors' },
        { value: 'atom', label: 'Atom', group: 'Editors' },
        { value: 'slack', label: 'Slack', group: 'Communication' },
        { value: 'discord', label: 'Discord', group: 'Communication' }
      ];
      let selected = '';
      let open = false;
      const el = document.getElementById('groupedSelect');
      const trigger = document.getElementById('groupedTrigger');
      const triggerContent = document.getElementById('groupedTriggerContent');
      const optionsEl = document.getElementById('groupedOptions');

      function getGroups() {
        return [...new Set(options.map(o => o.group))];
      }

      function render() {
        optionsEl.innerHTML = getGroups().map(group => `
          <div class="option-group">
            <div class="group-header">${group}</div>
            ${options.filter(o => o.group === group).map(o => `
              <div class="dropdown-option ${selected === o.value ? 'selected' : ''}" data-value="${o.value}">
                <span>${o.label}</span>
                ${selected === o.value ? '<i class="bi bi-check"></i>' : ''}
              </div>
            `).join('')}
          </div>
        `).join('');

        if (selected) {
          const o = options.find(x => x.value === selected);
          triggerContent.innerHTML = `<span>${o.label}</span><span class="option-group-badge">${o.group}</span>`;
        } else {
          triggerContent.innerHTML = '<span class="placeholder">Select an application...</span>';
        }
      }

      trigger.addEventListener('click', function() {
        open = !open;
        el.classList.toggle('open', open);
      });

      optionsEl.addEventListener('click', function(e) {
        const opt = e.target.closest('.dropdown-option');
        if (!opt) return;
        selected = opt.dataset.value;
        open = false;
        el.classList.remove('open');
        render();
      });

      document.addEventListener('click', function(e) {
        if (!el.contains(e.target)) { open = false; el.classList.remove('open'); }
      });

      render();
    })();
  </script>
</body>
</html>
