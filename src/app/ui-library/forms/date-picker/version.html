<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Picker - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════ */
    /* DATE PICKER COMPONENT - Premium UI Library                      */
    /* ═══════════════════════════════════════════════════════════════ */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f8fafc;
      line-height: 1.5;
    }

    .datepicker-showcase {
      max-width: 600px;
      margin: 2rem auto;
      padding: 1.5rem;
    }

    .showcase-section {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #111827;
      margin: 0 0 1.25rem 0;
    }

    .selected-value {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: #6b7280;
    }

    .selected-value strong {
      color: #4f46e5;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    /* ─────────────────────────────────────────────────────────────────
       DATEPICKER INPUT
       ───────────────────────────────────────────────────────────────── */
    .datepicker {
      position: relative;
    }

    .datepicker-input {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .datepicker-input:hover {
      border-color: #d1d5db;
    }

    .datepicker.open .datepicker-input {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .datepicker-input i:first-child {
      color: #6b7280;
    }

    .datepicker-input .placeholder {
      color: #9ca3af;
    }

    .clear-btn {
      margin-left: auto;
      padding: 0.25rem;
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      border-radius: 0.25rem;
      line-height: 1;
    }

    .clear-btn:hover {
      background: #f3f4f6;
      color: #dc2626;
    }

    /* ─────────────────────────────────────────────────────────────────
       DROPDOWN
       ───────────────────────────────────────────────────────────────── */
    .datepicker-dropdown {
      position: absolute;
      top: calc(100% + 0.5rem);
      left: 0;
      width: 300px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.2s ease;
    }

    .datepicker.open .datepicker-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .range-dropdown {
      width: auto;
      min-width: 350px;
      display: flex;
    }

    /* ─────────────────────────────────────────────────────────────────
       CALENDAR
       ───────────────────────────────────────────────────────────────── */
    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      border-bottom: 1px solid #f3f4f6;
    }

    .nav-btn {
      padding: 0.5rem;
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      border-radius: 0.375rem;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background: #f3f4f6;
      color: #374151;
    }

    .month-year {
      font-weight: 600;
      color: #111827;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.25rem;
      padding: 0.75rem;
    }

    .weekday {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
    }

    .calendar-day {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      font-size: 0.875rem;
      color: #374151;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .calendar-day:hover:not(.empty) {
      background: #f3f4f6;
    }

    .calendar-day.empty {
      cursor: default;
    }

    .calendar-day.today {
      font-weight: 600;
      color: #4f46e5;
      background: #eff6ff;
    }

    .calendar-day.selected {
      background: #4f46e5;
      color: white;
      font-weight: 600;
    }

    .calendar-day.selected:hover {
      background: #4338ca;
    }

    .calendar-day.range-start,
    .calendar-day.range-end {
      background: #4f46e5;
      color: white;
      font-weight: 600;
    }

    .calendar-day.range-start {
      border-radius: 0.375rem 0 0 0.375rem;
    }

    .calendar-day.range-end {
      border-radius: 0 0.375rem 0.375rem 0;
    }

    .calendar-day.in-range {
      background: #eff6ff;
      color: #4f46e5;
      border-radius: 0;
    }

    .calendar-footer {
      padding: 0.75rem 1rem;
      border-top: 1px solid #f3f4f6;
      display: flex;
      justify-content: center;
    }

    .today-btn {
      padding: 0.5rem 1rem;
      background: none;
      border: 1px solid #e5e7eb;
      border-radius: 0.375rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #4f46e5;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .today-btn:hover {
      background: #eff6ff;
      border-color: #4f46e5;
    }

    /* ─────────────────────────────────────────────────────────────────
       PRESET RANGES
       ───────────────────────────────────────────────────────────────── */
    .preset-ranges {
      display: flex;
      flex-direction: column;
      padding: 0.5rem;
      border-right: 1px solid #e5e7eb;
      min-width: 140px;
    }

    .preset-btn {
      padding: 0.625rem 1rem;
      background: none;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.8rem;
      color: #4b5563;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .preset-btn:hover {
      background: #f3f4f6;
      color: #4f46e5;
    }

    .range-calendar {
      flex: 1;
    }

    /* ─────────────────────────────────────────────────────────────────
       NATIVE INPUTS
       ───────────────────────────────────────────────────────────────── */
    .native-inputs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      color: #374151;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    @media (max-width: 480px) {
      .native-inputs {
        grid-template-columns: 1fr;
      }
      .range-dropdown {
        flex-direction: column;
        min-width: 300px;
      }
      .preset-ranges {
        flex-direction: row;
        flex-wrap: wrap;
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
      }
    }
  </style>
</head>
<body>
  <div class="datepicker-showcase">
    <!-- Single Date Picker -->
    <section class="showcase-section">
      <h2 class="section-title">Single Date Picker</h2>
      <div class="form-group">
        <label class="form-label">Select a date</label>
        <div class="datepicker" id="singlePicker">
          <div class="datepicker-input" onclick="toggleSingleCalendar()">
            <i class="bi bi-calendar3"></i>
            <span id="singleDateDisplay" class="placeholder">Pick a date...</span>
            <button class="clear-btn" id="singleClearBtn" style="display: none;" onclick="clearSingleDate(event)">
              <i class="bi bi-x"></i>
            </button>
          </div>

          <div class="datepicker-dropdown">
            <div class="calendar-header">
              <button class="nav-btn" onclick="previousMonth(event)">
                <i class="bi bi-chevron-left"></i>
              </button>
              <span class="month-year" id="singleMonthYear"></span>
              <button class="nav-btn" onclick="nextMonth(event)">
                <i class="bi bi-chevron-right"></i>
              </button>
            </div>

            <div class="calendar-grid" id="singleCalendarGrid"></div>

            <div class="calendar-footer">
              <button class="today-btn" onclick="selectToday(event)">Today</button>
            </div>
          </div>
        </div>
      </div>
      <p class="selected-value" id="singleSelectedText" style="display: none;">
        Selected: <strong id="singleSelectedValue"></strong>
      </p>
    </section>

    <!-- Date Range Picker -->
    <section class="showcase-section">
      <h2 class="section-title">Date Range Picker</h2>
      <div class="form-group">
        <label class="form-label">Select date range</label>
        <div class="datepicker" id="rangePicker">
          <div class="datepicker-input" onclick="toggleRangeCalendar()">
            <i class="bi bi-calendar-range"></i>
            <span id="rangeDateDisplay" class="placeholder">Pick a date range...</span>
            <button class="clear-btn" id="rangeClearBtn" style="display: none;" onclick="clearRange(event)">
              <i class="bi bi-x"></i>
            </button>
          </div>

          <div class="datepicker-dropdown range-dropdown">
            <div class="preset-ranges">
              <button class="preset-btn" onclick="applyPreset('today', event)">Today</button>
              <button class="preset-btn" onclick="applyPreset('yesterday', event)">Yesterday</button>
              <button class="preset-btn" onclick="applyPreset('last7days', event)">Last 7 days</button>
              <button class="preset-btn" onclick="applyPreset('last30days', event)">Last 30 days</button>
              <button class="preset-btn" onclick="applyPreset('thisMonth', event)">This month</button>
              <button class="preset-btn" onclick="applyPreset('lastMonth', event)">Last month</button>
            </div>

            <div class="range-calendar">
              <div class="calendar-header">
                <button class="nav-btn" onclick="previousRangeMonth(event)">
                  <i class="bi bi-chevron-left"></i>
                </button>
                <span class="month-year" id="rangeMonthYear"></span>
                <button class="nav-btn" onclick="nextRangeMonth(event)">
                  <i class="bi bi-chevron-right"></i>
                </button>
              </div>

              <div class="calendar-grid" id="rangeCalendarGrid"></div>
            </div>
          </div>
        </div>
      </div>
      <p class="selected-value" id="rangeSelectedText" style="display: none;">
        Range: <strong id="rangeSelectedValue"></strong>
      </p>
    </section>

    <!-- Native Date Inputs -->
    <section class="showcase-section">
      <h2 class="section-title">Native Date Inputs</h2>
      <div class="native-inputs">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Time</label>
          <input type="time" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Date & Time</label>
          <input type="datetime-local" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Month</label>
          <input type="month" class="form-input">
        </div>
      </div>
    </section>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // DATE PICKER COMPONENT - Premium UI Library
    // ═══════════════════════════════════════════════════════════════

    const weekDays = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
    
    // Single Date Picker State
    let selectedDate = null;
    let currentMonth = new Date();
    let isSingleCalendarOpen = false;

    // Range Picker State
    let startDate = null;
    let endDate = null;
    let rangeCurrentMonth = new Date();
    let isRangeCalendarOpen = false;
    let selectingEnd = false;

    // ─────────────────────────────────────────────────────────────────
    // HELPER FUNCTIONS
    // ─────────────────────────────────────────────────────────────────
    function formatDate(date) {
      if (!date) return '';
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getMonthYear(date) {
      return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function isSameDay(date1, date2) {
      return date1.getDate() === date2.getDate() &&
             date1.getMonth() === date2.getMonth() &&
             date1.getFullYear() === date2.getFullYear();
    }

    function isToday(date) {
      return isSameDay(date, new Date());
    }

    // ─────────────────────────────────────────────────────────────────
    // SINGLE CALENDAR
    // ─────────────────────────────────────────────────────────────────
    function getCalendarDays(monthDate) {
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const days = [];

      for (let i = 0; i < firstDay.getDay(); i++) {
        days.push(null);
      }

      for (let i = 1; i <= lastDay.getDate(); i++) {
        days.push(new Date(year, month, i));
      }

      return days;
    }

    function renderSingleCalendar() {
      const grid = document.getElementById('singleCalendarGrid');
      const days = getCalendarDays(currentMonth);
      
      document.getElementById('singleMonthYear').textContent = getMonthYear(currentMonth);
      
      grid.innerHTML = weekDays.map(day => `<div class="weekday">${day}</div>`).join('') +
        days.map(day => {
          if (!day) return '<div class="calendar-day empty"></div>';
          
          const classes = ['calendar-day'];
          if (isToday(day)) classes.push('today');
          if (selectedDate && isSameDay(day, selectedDate)) classes.push('selected');
          
          return `<div class="${classes.join(' ')}" onclick="selectDate(new Date(${day.getTime()}), event)">${day.getDate()}</div>`;
        }).join('');
    }

    function toggleSingleCalendar() {
      isSingleCalendarOpen = !isSingleCalendarOpen;
      document.getElementById('singlePicker').classList.toggle('open', isSingleCalendarOpen);
      
      if (isSingleCalendarOpen) {
        isRangeCalendarOpen = false;
        document.getElementById('rangePicker').classList.remove('open');
        renderSingleCalendar();
      }
    }

    function previousMonth(event) {
      event.stopPropagation();
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
      renderSingleCalendar();
    }

    function nextMonth(event) {
      event.stopPropagation();
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
      renderSingleCalendar();
    }

    function selectDate(date, event) {
      if (event) event.stopPropagation();
      selectedDate = date;
      isSingleCalendarOpen = false;
      document.getElementById('singlePicker').classList.remove('open');
      updateSingleDisplay();
    }

    function selectToday(event) {
      event.stopPropagation();
      selectDate(new Date(), event);
    }

    function clearSingleDate(event) {
      event.stopPropagation();
      selectedDate = null;
      updateSingleDisplay();
    }

    function updateSingleDisplay() {
      const display = document.getElementById('singleDateDisplay');
      const clearBtn = document.getElementById('singleClearBtn');
      const selectedText = document.getElementById('singleSelectedText');
      const selectedValue = document.getElementById('singleSelectedValue');
      
      if (selectedDate) {
        display.textContent = formatDate(selectedDate);
        display.classList.remove('placeholder');
        clearBtn.style.display = 'block';
        selectedText.style.display = 'block';
        selectedValue.textContent = formatDate(selectedDate);
      } else {
        display.textContent = 'Pick a date...';
        display.classList.add('placeholder');
        clearBtn.style.display = 'none';
        selectedText.style.display = 'none';
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // RANGE CALENDAR
    // ─────────────────────────────────────────────────────────────────
    function renderRangeCalendar() {
      const grid = document.getElementById('rangeCalendarGrid');
      const days = getCalendarDays(rangeCurrentMonth);
      
      document.getElementById('rangeMonthYear').textContent = getMonthYear(rangeCurrentMonth);
      
      grid.innerHTML = weekDays.map(day => `<div class="weekday">${day}</div>`).join('') +
        days.map(day => {
          if (!day) return '<div class="calendar-day empty"></div>';
          
          const classes = ['calendar-day'];
          if (isToday(day)) classes.push('today');
          if (startDate && isSameDay(day, startDate)) classes.push('range-start');
          if (endDate && isSameDay(day, endDate)) classes.push('range-end');
          if (startDate && endDate && day > startDate && day < endDate) classes.push('in-range');
          
          return `<div class="${classes.join(' ')}" onclick="selectRangeDate(new Date(${day.getTime()}), event)">${day.getDate()}</div>`;
        }).join('');
    }

    function toggleRangeCalendar() {
      isRangeCalendarOpen = !isRangeCalendarOpen;
      document.getElementById('rangePicker').classList.toggle('open', isRangeCalendarOpen);
      
      if (isRangeCalendarOpen) {
        isSingleCalendarOpen = false;
        document.getElementById('singlePicker').classList.remove('open');
        renderRangeCalendar();
      }
    }

    function previousRangeMonth(event) {
      event.stopPropagation();
      rangeCurrentMonth = new Date(rangeCurrentMonth.getFullYear(), rangeCurrentMonth.getMonth() - 1, 1);
      renderRangeCalendar();
    }

    function nextRangeMonth(event) {
      event.stopPropagation();
      rangeCurrentMonth = new Date(rangeCurrentMonth.getFullYear(), rangeCurrentMonth.getMonth() + 1, 1);
      renderRangeCalendar();
    }

    function selectRangeDate(date, event) {
      event.stopPropagation();
      
      if (!selectingEnd || !startDate) {
        startDate = date;
        endDate = null;
        selectingEnd = true;
      } else {
        if (date < startDate) {
          endDate = startDate;
          startDate = date;
        } else {
          endDate = date;
        }
        selectingEnd = false;
      }
      
      updateRangeDisplay();
      renderRangeCalendar();
    }

    function applyPreset(preset, event) {
      event.stopPropagation();
      const now = new Date();
      
      switch (preset) {
        case 'today':
          startDate = new Date(now);
          endDate = new Date(now);
          break;
        case 'yesterday':
          const yesterday = new Date(now);
          yesterday.setDate(yesterday.getDate() - 1);
          startDate = yesterday;
          endDate = new Date(yesterday);
          break;
        case 'last7days':
          endDate = new Date(now);
          startDate = new Date(now);
          startDate.setDate(startDate.getDate() - 6);
          break;
        case 'last30days':
          endDate = new Date(now);
          startDate = new Date(now);
          startDate.setDate(startDate.getDate() - 29);
          break;
        case 'thisMonth':
          startDate = new Date(now.getFullYear(), now.getMonth(), 1);
          endDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
          break;
        case 'lastMonth':
          startDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
          endDate = new Date(now.getFullYear(), now.getMonth(), 0);
          break;
      }
      
      isRangeCalendarOpen = false;
      document.getElementById('rangePicker').classList.remove('open');
      updateRangeDisplay();
    }

    function clearRange(event) {
      event.stopPropagation();
      startDate = null;
      endDate = null;
      selectingEnd = false;
      updateRangeDisplay();
    }

    function updateRangeDisplay() {
      const display = document.getElementById('rangeDateDisplay');
      const clearBtn = document.getElementById('rangeClearBtn');
      const selectedText = document.getElementById('rangeSelectedText');
      const selectedValue = document.getElementById('rangeSelectedValue');
      
      if (startDate) {
        if (endDate) {
          display.textContent = `${formatDate(startDate)} - ${formatDate(endDate)}`;
        } else {
          display.textContent = `${formatDate(startDate)} - Select end date`;
        }
        display.classList.remove('placeholder');
        clearBtn.style.display = 'block';
        selectedText.style.display = 'block';
        selectedValue.textContent = endDate ? `${formatDate(startDate)} to ${formatDate(endDate)}` : formatDate(startDate);
      } else {
        display.textContent = 'Pick a date range...';
        display.classList.add('placeholder');
        clearBtn.style.display = 'none';
        selectedText.style.display = 'none';
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // CLICK OUTSIDE
    // ─────────────────────────────────────────────────────────────────
    document.addEventListener('click', function(event) {
      const singlePicker = document.getElementById('singlePicker');
      const rangePicker = document.getElementById('rangePicker');
      
      if (!singlePicker.contains(event.target)) {
        isSingleCalendarOpen = false;
        singlePicker.classList.remove('open');
      }
      
      if (!rangePicker.contains(event.target)) {
        isRangeCalendarOpen = false;
        rangePicker.classList.remove('open');
      }
    });

    // ─────────────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      renderSingleCalendar();
      renderRangeCalendar();
    });
  </script>
</body>
</html>
