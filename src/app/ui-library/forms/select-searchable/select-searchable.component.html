<div class="select-showcase">
  <section class="showcase-section">
    <h2 class="section-title">Searchable Select</h2>
    <div class="form-group">
      <label class="form-label">Select your country</label>
      <div class="custom-select" [class.open]="searchOpen">
        <button class="select-trigger" (click)="searchOpen = !searchOpen">
          <span class="trigger-content" *ngIf="!searchValue">
            <i class="bi bi-globe"></i>
            <span class="placeholder">Select a country...</span>
          </span>
          <span class="trigger-content" *ngIf="searchValue">
            <span class="option-icon">{{ getSelectedCountry()?.icon }}</span>
            <span>{{ getSelectedCountry()?.label }}</span>
          </span>
          <i class="bi bi-chevron-down trigger-arrow"></i>
        </button>
        <div class="select-dropdown">
          <div class="dropdown-search">
            <i class="bi bi-search"></i>
            <input type="text" placeholder="Search countries..." [(ngModel)]="searchQuery" (click)="$event.stopPropagation()">
          </div>
          <div class="dropdown-options">
            <div *ngFor="let country of getFilteredCountries()" class="dropdown-option" [class.selected]="searchValue === country.value" (click)="selectCountry(country)">
              <span class="option-icon">{{ country.icon }}</span>
              <span>{{ country.label }}</span>
              <i *ngIf="searchValue === country.value" class="bi bi-check"></i>
            </div>
            <div class="no-results" *ngIf="getFilteredCountries().length === 0">No countries found</div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
