<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Searchable Select - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #f8fafc; line-height: 1.5; }
    .select-showcase { max-width: 600px; margin: 2rem auto; padding: 1.5rem; }
    .showcase-section { background: white; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .section-title { font-size: 1.1rem; font-weight: 600; color: #111827; margin: 0 0 1.25rem 0; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem; }
    .custom-select { position: relative; }
    .select-trigger { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0.75rem 1rem; background: white; border: 2px solid #e5e7eb; border-radius: 0.5rem; font-size: 0.9rem; color: #374151; cursor: pointer; transition: all 0.2s ease; text-align: left; }
    .select-trigger:hover { border-color: #d1d5db; }
    .custom-select.open .select-trigger { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .trigger-content { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 0; }
    .placeholder { color: #9ca3af; }
    .option-icon { font-size: 1.25rem; }
    .trigger-arrow { font-size: 0.875rem; color: #6b7280; transition: transform 0.2s ease; }
    .custom-select.open .trigger-arrow { transform: rotate(180deg); }
    .select-dropdown { position: absolute; top: calc(100% + 0.5rem); left: 0; right: 0; background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 1000; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease; }
    .custom-select.open .select-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
    .dropdown-search { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; border-bottom: 1px solid #e5e7eb; }
    .dropdown-search i { color: #9ca3af; }
    .dropdown-search input { flex: 1; border: none; font-size: 0.9rem; outline: none; }
    .dropdown-search input::placeholder { color: #9ca3af; }
    .dropdown-options { max-height: 250px; overflow-y: auto; padding: 0.5rem; }
    .dropdown-option { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.5rem; cursor: pointer; transition: all 0.15s ease; }
    .dropdown-option:hover { background: #f3f4f6; }
    .dropdown-option.selected { background: #eff6ff; color: #4f46e5; }
    .dropdown-option .bi-check { margin-left: auto; color: #4f46e5; }
    .no-results { padding: 1rem; text-align: center; color: #9ca3af; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="select-showcase">
    <section class="showcase-section">
      <h2 class="section-title">Searchable Select</h2>
      <div class="form-group">
        <label class="form-label">Select your country</label>
        <div class="custom-select" id="searchSelect">
          <button class="select-trigger" id="searchTrigger">
            <span class="trigger-content" id="searchTriggerContent">
              <i class="bi bi-globe"></i>
              <span class="placeholder">Select a country...</span>
            </span>
            <i class="bi bi-chevron-down trigger-arrow"></i>
          </button>
          <div class="select-dropdown">
            <div class="dropdown-search">
              <i class="bi bi-search"></i>
              <input type="text" placeholder="Search countries..." id="searchInput">
            </div>
            <div class="dropdown-options" id="searchOptions"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function() {
      const countries = [
        { value: 'fr', label: 'France', icon: '🇫🇷' },
        { value: 'us', label: 'United States', icon: '🇺🇸' },
        { value: 'uk', label: 'United Kingdom', icon: '🇬🇧' },
        { value: 'de', label: 'Germany', icon: '🇩🇪' },
        { value: 'jp', label: 'Japan', icon: '🇯🇵' },
        { value: 'ca', label: 'Canada', icon: '🇨🇦' },
        { value: 'au', label: 'Australia', icon: '🇦🇺' },
        { value: 'br', label: 'Brazil', icon: '🇧🇷' },
        { value: 'in', label: 'India', icon: '🇮🇳' },
        { value: 'es', label: 'Spain', icon: '🇪🇸' }
      ];
      let selected = '';
      let open = false;
      const el = document.getElementById('searchSelect');
      const trigger = document.getElementById('searchTrigger');
      const triggerContent = document.getElementById('searchTriggerContent');
      const optionsEl = document.getElementById('searchOptions');
      const searchInput = document.getElementById('searchInput');

      function getFiltered() {
        const q = searchInput.value.toLowerCase();
        return countries.filter(c => c.label.toLowerCase().includes(q));
      }

      function render() {
        const filtered = getFiltered();
        optionsEl.innerHTML = filtered.length > 0 ? filtered.map(c => `
          <div class="dropdown-option ${selected === c.value ? 'selected' : ''}" data-value="${c.value}">
            <span class="option-icon">${c.icon}</span>
            <span>${c.label}</span>
            ${selected === c.value ? '<i class="bi bi-check"></i>' : ''}
          </div>
        `).join('') : '<div class="no-results">No countries found</div>';

        if (selected) {
          const c = countries.find(x => x.value === selected);
          triggerContent.innerHTML = `<span class="option-icon">${c.icon}</span><span>${c.label}</span>`;
        } else {
          triggerContent.innerHTML = '<i class="bi bi-globe"></i><span class="placeholder">Select a country...</span>';
        }
      }

      trigger.addEventListener('click', function() {
        open = !open;
        el.classList.toggle('open', open);
        if (open) searchInput.focus();
      });

      searchInput.addEventListener('click', function(e) { e.stopPropagation(); });
      searchInput.addEventListener('input', render);

      optionsEl.addEventListener('click', function(e) {
        const opt = e.target.closest('.dropdown-option');
        if (!opt) return;
        selected = opt.dataset.value;
        open = false;
        el.classList.remove('open');
        searchInput.value = '';
        render();
      });

      document.addEventListener('click', function(e) {
        if (!el.contains(e.target)) { open = false; el.classList.remove('open'); }
      });

      render();
    })();
  </script>
</body>
</html>
