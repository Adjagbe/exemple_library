<div class="checkbox-showcase">
  <section class="showcase-section">
    <h3 class="section-title">Sizes</h3>
    <div class="checkbox-sizes">
      <label class="checkbox-label checkbox--sm">
        <input type="checkbox" checked>
        <span class="checkbox-custom"><i class="bi bi-check"></i></span>
        <span class="checkbox-text">Small</span>
      </label>
      <label class="checkbox-label checkbox--md">
        <input type="checkbox" checked>
        <span class="checkbox-custom"><i class="bi bi-check"></i></span>
        <span class="checkbox-text">Medium</span>
      </label>
      <label class="checkbox-label checkbox--lg">
        <input type="checkbox" checked>
        <span class="checkbox-custom"><i class="bi bi-check"></i></span>
        <span class="checkbox-text">Large</span>
      </label>
    </div>
  </section>
</div>
