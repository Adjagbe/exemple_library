<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Textarea - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════ */
    /* TEXTAREA COMPONENT - Premium UI Library                         */
    /* ═══════════════════════════════════════════════════════════════ */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f8fafc;
      line-height: 1.5;
    }

    .textarea-container {
      max-width: 700px;
      margin: 2rem auto;
      padding: 1.5rem;
    }

    /* ─────────────────────────────────────────────────────────────────
       COMMENT FORM
       ───────────────────────────────────────────────────────────────── */
    .comment-form {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      margin-bottom: 2rem;
    }

    .form-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .form-title {
      font-weight: 600;
      color: #111827;
    }

    /* ─────────────────────────────────────────────────────────────────
       TEXTAREA WRAPPER
       ───────────────────────────────────────────────────────────────── */
    .textarea-wrapper {
      border: 2px solid #e5e7eb;
      border-radius: 0.75rem;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .textarea-wrapper.focused {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .textarea-wrapper.error {
      border-color: #dc2626;
    }

    .textarea-wrapper.error.focused {
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }

    .textarea-wrapper.disabled {
      opacity: 0.6;
      background: #f9fafb;
    }

    .textarea-label {
      display: block;
      padding: 0.75rem 1rem 0;
      font-size: 0.8rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .textarea-label.required::after {
      content: ' *';
      color: #dc2626;
    }

    .textarea-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      font-size: 0.95rem;
      font-family: inherit;
      line-height: 1.6;
      color: #111827;
      background: transparent;
      resize: vertical;
    }

    .textarea-input:focus {
      outline: none;
    }

    .textarea-input::placeholder {
      color: #9ca3af;
    }

    .textarea-input:disabled {
      cursor: not-allowed;
    }

    /* ─────────────────────────────────────────────────────────────────
       FOOTER
       ───────────────────────────────────────────────────────────────── */
    .textarea-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
    }

    .footer-left {
      display: flex;
      gap: 0.25rem;
    }

    .format-btn {
      padding: 0.5rem;
      background: none;
      border: none;
      color: #6b7280;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .format-btn:hover {
      background: #e5e7eb;
      color: #374151;
    }

    .format-btn i {
      font-size: 1rem;
    }

    .char-count {
      font-size: 0.8rem;
      color: #9ca3af;
      transition: color 0.2s ease;
    }

    .char-count.warning {
      color: #f59e0b;
    }

    .char-count.error {
      color: #dc2626;
      font-weight: 600;
    }

    /* ─────────────────────────────────────────────────────────────────
       MESSAGES
       ───────────────────────────────────────────────────────────────── */
    .form-messages {
      min-height: 1.5rem;
      padding: 0.5rem 0;
    }

    .hint,
    .error-message {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.8rem;
    }

    .hint i,
    .error-message i {
      font-size: 0.875rem;
    }

    .hint {
      color: #6b7280;
    }

    .error-message {
      color: #dc2626;
    }

    /* ─────────────────────────────────────────────────────────────────
       ACTIONS
       ───────────────────────────────────────────────────────────────── */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn--primary {
      background: #4f46e5;
      color: white;
      border: none;
    }

    .btn--primary:hover:not(:disabled) {
      background: #4338ca;
    }

    .btn--secondary {
      background: white;
      color: #374151;
      border: 1px solid #e5e7eb;
    }

    .btn--secondary:hover:not(:disabled) {
      background: #f9fafb;
    }

    /* ─────────────────────────────────────────────────────────────────
       COMMENTS LIST
       ───────────────────────────────────────────────────────────────── */
    .comments-list {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .comments-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #111827;
      margin: 0 0 1.5rem 0;
    }

    .comments-title i {
      color: #4f46e5;
    }

    .comment {
      display: flex;
      gap: 1rem;
      padding: 1.25rem 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .comment:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .comment:first-of-type {
      padding-top: 0;
    }

    .comment-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .comment-content {
      flex: 1;
      min-width: 0;
    }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .comment-author {
      font-weight: 600;
      color: #111827;
    }

    .comment-date {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .comment-text {
      font-size: 0.9rem;
      color: #4b5563;
      line-height: 1.6;
      margin: 0 0 0.75rem 0;
    }

    .comment-actions {
      display: flex;
      gap: 1rem;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.5rem;
      background: none;
      border: none;
      font-size: 0.8rem;
      color: #6b7280;
      cursor: pointer;
      border-radius: 0.25rem;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      background: #f3f4f6;
      color: #4f46e5;
    }

    .action-btn i {
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="textarea-container">
    <!-- Comment Form -->
    <div class="comment-form">
      <div class="form-header">
        <img src="https://placehold.co/40x40/f59e0b/ffffff?text=YO" alt="Your avatar" class="user-avatar">
        <span class="form-title">Add a comment</span>
      </div>

      <div class="textarea-wrapper" id="textareaWrapper">
        <label class="textarea-label required">Comment</label>
        <textarea 
          class="textarea-input" 
          id="commentInput"
          placeholder="Write your comment here..."
          rows="4"
          oninput="onInput()"
          onfocus="onFocus()"
          onblur="onBlur()"></textarea>
        
        <div class="textarea-footer">
          <div class="footer-left">
            <button class="format-btn" title="Bold">
              <i class="bi bi-type-bold"></i>
            </button>
            <button class="format-btn" title="Italic">
              <i class="bi bi-type-italic"></i>
            </button>
            <button class="format-btn" title="Add Link">
              <i class="bi bi-link-45deg"></i>
            </button>
            <button class="format-btn" title="Add Image">
              <i class="bi bi-image"></i>
            </button>
            <button class="format-btn" title="Add Emoji">
              <i class="bi bi-emoji-smile"></i>
            </button>
          </div>
          <div class="footer-right">
            <span class="char-count" id="charCount">0 / 500</span>
          </div>
        </div>
      </div>

      <div class="form-messages" id="formMessages">
        <span class="hint">
          <i class="bi bi-info-circle"></i>
          Be respectful and constructive in your comments
        </span>
      </div>

      <div class="form-actions">
        <button class="btn btn--secondary" onclick="cancelComment()">
          Cancel
        </button>
        <button class="btn btn--primary" id="submitBtn" onclick="submitComment()" disabled>
          <i class="bi bi-send"></i>
          Post Comment
        </button>
      </div>
    </div>

    <!-- Comments List -->
    <div class="comments-list">
      <h3 class="comments-title">
        <i class="bi bi-chat-left-text"></i>
        Comments (<span id="commentCount">2</span>)
      </h3>
      <div id="commentsList"></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // TEXTAREA COMPONENT - Premium UI Library
    // ═══════════════════════════════════════════════════════════════

    const maxLength = 500;
    let isTouched = false;

    const comments = [
      {
        id: '1',
        author: 'Sarah Johnson',
        avatar: 'https://placehold.co/40x40/4f46e5/ffffff?text=SJ',
        date: '2 hours ago',
        content: 'This is an excellent product! The quality exceeded my expectations and the delivery was super fast. Highly recommended!',
        likes: 12
      },
      {
        id: '2',
        author: 'Michael Chen',
        avatar: 'https://placehold.co/40x40/10b981/ffffff?text=MC',
        date: '5 hours ago',
        content: 'Great value for money. The customer service was also very helpful when I had questions.',
        likes: 8
      }
    ];

    // ─────────────────────────────────────────────────────────────────
    // RENDER
    // ─────────────────────────────────────────────────────────────────
    function renderComments() {
      const list = document.getElementById('commentsList');
      list.innerHTML = comments.map(comment => `
        <div class="comment">
          <img src="${comment.avatar}" alt="${comment.author}" class="comment-avatar">
          <div class="comment-content">
            <div class="comment-header">
              <span class="comment-author">${comment.author}</span>
              <span class="comment-date">${comment.date}</span>
            </div>
            <p class="comment-text">${comment.content}</p>
            <div class="comment-actions">
              <button class="action-btn" onclick="likeComment('${comment.id}')">
                <i class="bi bi-heart"></i>
                <span id="likes-${comment.id}">${comment.likes}</span>
              </button>
              <button class="action-btn">
                <i class="bi bi-reply"></i>
                Reply
              </button>
              <button class="action-btn">
                <i class="bi bi-flag"></i>
                Report
              </button>
            </div>
          </div>
        </div>
      `).join('');

      document.getElementById('commentCount').textContent = comments.length;
    }

    function updateCharCount() {
      const input = document.getElementById('commentInput');
      const count = input.value.length;
      const charCount = document.getElementById('charCount');
      
      charCount.textContent = `${count} / ${maxLength}`;
      charCount.classList.remove('warning', 'error');
      
      if (count > maxLength) {
        charCount.classList.add('error');
      } else if (count > maxLength * 0.8) {
        charCount.classList.add('warning');
      }
    }

    function updateValidation() {
      const input = document.getElementById('commentInput');
      const wrapper = document.getElementById('textareaWrapper');
      const messages = document.getElementById('formMessages');
      const submitBtn = document.getElementById('submitBtn');
      const value = input.value;
      const count = value.length;
      
      const isOverLimit = count > maxLength;
      const isEmpty = !value.trim();
      const hasError = (isOverLimit || (isTouched && isEmpty));
      
      wrapper.classList.toggle('error', hasError);
      
      if (!isTouched) {
        messages.innerHTML = `
          <span class="hint">
            <i class="bi bi-info-circle"></i>
            Be respectful and constructive in your comments
          </span>
        `;
      } else if (isOverLimit) {
        messages.innerHTML = `
          <span class="error-message">
            <i class="bi bi-exclamation-circle"></i>
            Character limit exceeded
          </span>
        `;
      } else if (isEmpty) {
        messages.innerHTML = `
          <span class="error-message">
            <i class="bi bi-exclamation-circle"></i>
            This field is required
          </span>
        `;
      } else {
        messages.innerHTML = '';
      }

      submitBtn.disabled = isEmpty || isOverLimit;
    }

    // ─────────────────────────────────────────────────────────────────
    // HANDLERS
    // ─────────────────────────────────────────────────────────────────
    function onInput() {
      updateCharCount();
      updateValidation();
    }

    function onFocus() {
      document.getElementById('textareaWrapper').classList.add('focused');
    }

    function onBlur() {
      document.getElementById('textareaWrapper').classList.remove('focused');
      isTouched = true;
      updateValidation();
    }

    function cancelComment() {
      document.getElementById('commentInput').value = '';
      isTouched = false;
      updateCharCount();
      updateValidation();
    }

    function submitComment() {
      const input = document.getElementById('commentInput');
      const value = input.value.trim();
      
      if (!value || value.length > maxLength) return;

      comments.unshift({
        id: Date.now().toString(),
        author: 'You',
        avatar: 'https://placehold.co/40x40/f59e0b/ffffff?text=YO',
        date: 'Just now',
        content: value,
        likes: 0
      });

      input.value = '';
      isTouched = false;
      updateCharCount();
      updateValidation();
      renderComments();
    }

    function likeComment(id) {
      const comment = comments.find(c => c.id === id);
      if (comment) {
        comment.likes++;
        document.getElementById(`likes-${id}`).textContent = comment.likes;
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      renderComments();
      updateCharCount();
    });
  </script>
</body>
</html>
