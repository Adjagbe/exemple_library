<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Select - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #f8fafc; line-height: 1.5; }
    .select-showcase { max-width: 600px; margin: 2rem auto; padding: 1.5rem; }
    .showcase-section { background: white; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .section-title { font-size: 1.1rem; font-weight: 600; color: #111827; margin: 0 0 1.25rem 0; }
    .selected-value { margin-top: 1rem; font-size: 0.875rem; color: #6b7280; }
    .selected-value strong { color: #4f46e5; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem; }
    .custom-select { position: relative; }
    .select-trigger { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0.75rem 1rem; background: white; border: 2px solid #e5e7eb; border-radius: 0.5rem; font-size: 0.9rem; color: #374151; cursor: pointer; transition: all 0.2s ease; text-align: left; }
    .select-trigger:hover { border-color: #d1d5db; }
    .custom-select.open .select-trigger { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .placeholder { color: #9ca3af; }
    .trigger-arrow { font-size: 0.875rem; color: #6b7280; transition: transform 0.2s ease; }
    .custom-select.open .trigger-arrow { transform: rotate(180deg); }
    .select-dropdown { position: absolute; top: calc(100% + 0.5rem); left: 0; right: 0; background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 1000; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease; }
    .custom-select.open .select-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
    .dropdown-options { max-height: 250px; overflow-y: auto; padding: 0.5rem; }
    .dropdown-option { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.5rem; cursor: pointer; transition: all 0.15s ease; }
    .dropdown-option:hover { background: #f3f4f6; }
    .dropdown-option.selected { background: #eff6ff; color: #4f46e5; }
    .dropdown-option .bi-check { margin-left: auto; color: #4f46e5; }
    .multi-select .select-trigger { flex-wrap: wrap; gap: 0.5rem; min-height: 46px; }
    .multi-values { display: flex; flex-wrap: wrap; gap: 0.375rem; flex: 1; }
    .multi-tag { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.25rem 0.5rem; background: #eff6ff; border-radius: 0.375rem; font-size: 0.8rem; color: #4f46e5; }
    .multi-tag .bi-x { cursor: pointer; font-size: 1rem; }
    .multi-tag .bi-x:hover { color: #dc2626; }
    .option-checkbox { width: 18px; height: 18px; border: 2px solid #d1d5db; border-radius: 0.25rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
    .dropdown-option.selected .option-checkbox { background: #4f46e5; border-color: #4f46e5; }
    .dropdown-option.selected .option-checkbox i { color: white; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="select-showcase">
    <section class="showcase-section">
      <h2 class="section-title">Multi-Select</h2>
      <div class="form-group">
        <label class="form-label">Select technologies</label>
        <div class="custom-select multi-select" id="multiSelect">
          <button class="select-trigger" id="multiTrigger">
            <div class="multi-values" id="multiValues"></div>
            <span class="placeholder" id="multiPlaceholder">Select technologies...</span>
            <i class="bi bi-chevron-down trigger-arrow"></i>
          </button>
          <div class="select-dropdown">
            <div class="dropdown-options" id="multiOptions"></div>
          </div>
        </div>
      </div>
      <p class="selected-value" id="multiSelectedValue" style="display:none">
        Selected: <strong id="multiSelectedText"></strong>
      </p>
    </section>
  </div>

  <script>
    (function() {
      const technologies = [
        { value: 'angular', label: 'Angular', icon: 'bi-code-slash' },
        { value: 'react', label: 'React', icon: 'bi-code-slash' },
        { value: 'vue', label: 'Vue.js', icon: 'bi-code-slash' },
        { value: 'typescript', label: 'TypeScript', icon: 'bi-braces' },
        { value: 'nodejs', label: 'Node.js', icon: 'bi-server' },
        { value: 'python', label: 'Python', icon: 'bi-terminal' },
        { value: 'docker', label: 'Docker', icon: 'bi-box' },
        { value: 'kubernetes', label: 'Kubernetes', icon: 'bi-diagram-3' }
      ];
      let selected = ['react', 'typescript'];
      let open = false;
      const el = document.getElementById('multiSelect');
      const trigger = document.getElementById('multiTrigger');
      const optionsEl = document.getElementById('multiOptions');
      const valuesEl = document.getElementById('multiValues');
      const placeholderEl = document.getElementById('multiPlaceholder');
      const selectedValueEl = document.getElementById('multiSelectedValue');
      const selectedTextEl = document.getElementById('multiSelectedText');

      function render() {
        optionsEl.innerHTML = technologies.map(t => `
          <div class="dropdown-option ${selected.includes(t.value) ? 'selected' : ''}" data-value="${t.value}">
            <span class="option-checkbox">${selected.includes(t.value) ? '<i class="bi bi-check"></i>' : ''}</span>
            <i class="bi ${t.icon}"></i>
            <span>${t.label}</span>
          </div>
        `).join('');
        valuesEl.innerHTML = selected.map(v => {
          const t = technologies.find(x => x.value === v);
          return `<span class="multi-tag">${t.label}<i class="bi bi-x" data-remove="${v}"></i></span>`;
        }).join('');
        placeholderEl.style.display = selected.length > 0 ? 'none' : '';
        if (selected.length > 0) {
          selectedValueEl.style.display = '';
          selectedTextEl.textContent = selected.join(', ');
        } else {
          selectedValueEl.style.display = 'none';
        }
      }

      trigger.addEventListener('click', function(e) {
        open = !open;
        el.classList.toggle('open', open);
      });

      optionsEl.addEventListener('click', function(e) {
        e.stopPropagation();
        const opt = e.target.closest('.dropdown-option');
        if (!opt) return;
        const val = opt.dataset.value;
        const idx = selected.indexOf(val);
        if (idx > -1) selected.splice(idx, 1); else selected.push(val);
        render();
      });

      valuesEl.addEventListener('click', function(e) {
        const rm = e.target.closest('[data-remove]');
        if (!rm) return;
        e.stopPropagation();
        const val = rm.dataset.remove;
        const idx = selected.indexOf(val);
        if (idx > -1) selected.splice(idx, 1);
        render();
      });

      document.addEventListener('click', function(e) {
        if (!el.contains(e.target)) { open = false; el.classList.remove('open'); }
      });

      render();
    })();
  </script>
</body>
</html>
