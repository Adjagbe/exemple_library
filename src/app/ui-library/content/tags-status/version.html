<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tags - Tags de statut</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .tags-showcase { max-width: 900px; width: 100%; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.625rem; }
    .tag { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; transition: all 0.2s; }
    .tag--status { border: 1px solid; padding: 0.375rem 0.875rem; border-radius: 2rem; }
    .tag-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  </style>
</head>
<body>
  <div class="tags-showcase">
    <div class="tags-row">
      <span class="tag tag--status" style="background-color: #f59e0b20; color: #f59e0b; border-color: #f59e0b;">
        <span class="tag-dot" style="background-color: #f59e0b;"></span> En cours
      </span>
      <span class="tag tag--status" style="background-color: #10b98120; color: #10b981; border-color: #10b981;">
        <span class="tag-dot" style="background-color: #10b981;"></span> Terminé
      </span>
      <span class="tag tag--status" style="background-color: #6b728020; color: #6b7280; border-color: #6b7280;">
        <span class="tag-dot" style="background-color: #6b7280;"></span> En attente
      </span>
      <span class="tag tag--status" style="background-color: #ef444420; color: #ef4444; border-color: #ef4444;">
        <span class="tag-dot" style="background-color: #ef4444;"></span> Urgent
      </span>
      <span class="tag tag--status" style="background-color: #4f46e520; color: #4f46e5; border-color: #4f46e5;">
        <span class="tag-dot" style="background-color: #4f46e5;"></span> Nouveau
      </span>
    </div>
  </div>
</body>
</html>
