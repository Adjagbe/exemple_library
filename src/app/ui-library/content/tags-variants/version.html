<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tags - Variantes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .tags-showcase { max-width: 900px; width: 100%; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.625rem; }
    .tag { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; transition: all 0.2s; }
    .tags-variants { display: flex; flex-direction: column; gap: 1.5rem; }
    .variant-group h4 { margin: 0 0 0.75rem 0; font-size: 0.9rem; color: #6b7280; font-weight: 500; }
    /* Filled */
    .tag--filled.tag--primary { background: #4f46e5; color: white; }
    .tag--filled.tag--success { background: #10b981; color: white; }
    .tag--filled.tag--warning { background: #f59e0b; color: white; }
    .tag--filled.tag--danger { background: #ef4444; color: white; }
    .tag--filled.tag--info { background: #06b6d4; color: white; }
    /* Outlined */
    .tag--outlined { background: transparent; border: 1.5px solid; }
    .tag--outlined.tag--primary { border-color: #4f46e5; color: #4f46e5; }
    .tag--outlined.tag--success { border-color: #10b981; color: #10b981; }
    .tag--outlined.tag--warning { border-color: #f59e0b; color: #f59e0b; }
    .tag--outlined.tag--danger { border-color: #ef4444; color: #ef4444; }
    .tag--outlined.tag--info { border-color: #06b6d4; color: #06b6d4; }
    /* Soft */
    .tag--soft.tag--primary { background: rgba(79,70,229,0.1); color: #4f46e5; }
    .tag--soft.tag--success { background: rgba(16,185,129,0.1); color: #10b981; }
    .tag--soft.tag--warning { background: rgba(245,158,11,0.1); color: #f59e0b; }
    .tag--soft.tag--danger { background: rgba(239,68,68,0.1); color: #ef4444; }
    .tag--soft.tag--info { background: rgba(6,182,212,0.1); color: #06b6d4; }
  </style>
</head>
<body>
  <div class="tags-showcase">
 
    <div class="tags-variants">
      <div class="variant-group">
        <h4>Filled</h4>
        <div class="tags-row">
          <span class="tag tag--filled tag--primary">Primary</span>
          <span class="tag tag--filled tag--success">Success</span>
          <span class="tag tag--filled tag--warning">Warning</span>
          <span class="tag tag--filled tag--danger">Danger</span>
          <span class="tag tag--filled tag--info">Info</span>
        </div>
      </div>
      <div class="variant-group">
        <h4>Outlined</h4>
        <div class="tags-row">
          <span class="tag tag--outlined tag--primary">Primary</span>
          <span class="tag tag--outlined tag--success">Success</span>
          <span class="tag tag--outlined tag--warning">Warning</span>
          <span class="tag tag--outlined tag--danger">Danger</span>
          <span class="tag tag--outlined tag--info">Info</span>
        </div>
      </div>
      <div class="variant-group">
        <h4>Soft</h4>
        <div class="tags-row">
          <span class="tag tag--soft tag--primary">Primary</span>
          <span class="tag tag--soft tag--success">Success</span>
          <span class="tag tag--soft tag--warning">Warning</span>
          <span class="tag tag--soft tag--danger">Danger</span>
          <span class="tag tag--soft tag--info">Info</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
