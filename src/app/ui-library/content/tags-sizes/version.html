<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tags - Tailles de tags</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .tags-showcase { max-width: 900px; width: 100%; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.625rem; }
    .tags-row--sizes { align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 0.375rem; border-radius: 0.375rem; font-weight: 500; transition: all 0.2s; }
    .tag--xs { padding: 0.1875rem 0.5rem; font-size: 0.6875rem; background: #e5e7eb; color: #374151; }
    .tag--sm { padding: 0.25rem 0.625rem; font-size: 0.75rem; background: #e5e7eb; color: #374151; }
    .tag--md { padding: 0.375rem 0.75rem; font-size: 0.8125rem; background: #e5e7eb; color: #374151; }
    .tag--lg { padding: 0.5rem 1rem; font-size: 0.9375rem; background: #e5e7eb; color: #374151; }
    .tag--xl { padding: 0.625rem 1.25rem; font-size: 1rem; background: #e5e7eb; color: #374151; }
  </style>
</head>
<body>
  <div class="tags-showcase">
    <h2 class="section-title">Tailles de tags</h2>
    <div class="tags-row tags-row--sizes">
      <span class="tag tag--xs">Extra Small</span>
      <span class="tag tag--sm">Small</span>
      <span class="tag tag--md">Medium</span>
      <span class="tag tag--lg">Large</span>
      <span class="tag tag--xl">Extra Large</span>
    </div>
  </div>
</body>
</html>
