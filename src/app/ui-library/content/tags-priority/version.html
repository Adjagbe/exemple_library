<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tags - Tags de priorité</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .tags-showcase { max-width: 900px; width: 100%; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.625rem; }
    .tag { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; transition: all 0.2s; }
    .tag--priority { padding: 0.375rem 0.875rem; border-radius: 0.375rem; }
    .tag--priority i { font-size: 0.7rem; }
  </style>
</head>
<body>
  <div class="tags-showcase">
    <div class="tags-row">
      <span class="tag tag--priority" style="background-color: #dc2626; color: #ffffff;">
        <i class="bi bi-flag-fill"></i> Critique
      </span>
      <span class="tag tag--priority" style="background-color: #f97316; color: #ffffff;">
        <i class="bi bi-flag-fill"></i> Haute
      </span>
      <span class="tag tag--priority" style="background-color: #eab308; color: #1f2937;">
        <i class="bi bi-flag-fill"></i> Moyenne
      </span>
      <span class="tag tag--priority" style="background-color: #22c55e; color: #ffffff;">
        <i class="bi bi-flag-fill"></i> Basse
      </span>
    </div>
  </div>
</body>
</html>
