<div class="tags-showcase">
  <h2 class="section-title">Tags avec icônes</h2>
  <div class="tags-row">
    <span class="tag tag--filled tag--primary">
      <i class="bi bi-star-fill"></i> Featured
    </span>
    <span class="tag tag--filled tag--success">
      <i class="bi bi-check-circle-fill"></i> Verified
    </span>
    <span class="tag tag--filled tag--warning">
      <i class="bi bi-clock-fill"></i> Pending
    </span>
    <span class="tag tag--filled tag--danger">
      <i class="bi bi-exclamation-circle-fill"></i> Error
    </span>
    <span class="tag tag--filled tag--info">
      <i class="bi bi-info-circle-fill"></i> Info
    </span>
  </div>
</div>
