<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tags - Tags interactifs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .tags-showcase { max-width: 900px; width: 100%; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.625rem; }
    .tag { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; transition: all 0.2s; }
    .tag--interactive { background: #f3f4f6; color: #374151; cursor: pointer; }
    .tag--interactive:hover { background: #e5e7eb; }
    .tag-action { display: flex; align-items: center; justify-content: center; width: 18px; height: 18px; background: transparent; border: none; border-radius: 50%; cursor: pointer; opacity: 0.6; transition: all 0.2s; }
    .tag-action:hover { opacity: 1; background: rgba(0,0,0,0.1); }
    .tag-action i { font-size: 0.7rem; }
    .tag--add { border: 2px dashed #d1d5db; background: transparent; color: #6b7280; cursor: pointer; }
    .tag--add:hover { border-color: #4f46e5; color: #4f46e5; background: rgba(79,70,229,0.05); }
  </style>
</head>
<body>
  <div class="tags-showcase">
    <div class="tags-row">
      <span class="tag tag--interactive">
        JavaScript
        <button class="tag-action"><i class="bi bi-pencil"></i></button>
      </span>
      <span class="tag tag--interactive">
        TypeScript
        <button class="tag-action"><i class="bi bi-x-lg"></i></button>
      </span>
      <span class="tag tag--interactive tag--add">
        <i class="bi bi-plus-lg"></i> Ajouter
      </span>
    </div>
  </div>
</body>
</html>
