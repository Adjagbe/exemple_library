<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistics - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════ */
    /* STATISTICS COMPONENT - Premium UI Library                       */
    /* ═══════════════════════════════════════════════════════════════ */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f8fafc;
      line-height: 1.5;
    }

    .statistics-page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem;
      min-height: 100vh;
      background: #f8fafc;
    }

    /* ─────────────────────────────────────────────────────────────────
       HEADER
       ───────────────────────────────────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-content h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: #111827;
      margin: 0 0 0.25rem 0;
    }

    .header-content p {
      color: #6b7280;
      margin: 0;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .period-select {
      padding: 0.625rem 2.5rem 0.625rem 1rem;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      color: #374151;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 0.75rem center;
      background-size: 1.25em;
    }

    .period-select:focus {
      outline: none;
      border-color: #4f46e5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn--outline {
      background: white;
      border: 2px solid #e5e7eb;
      color: #374151;
    }

    .btn--outline:hover {
      border-color: #4f46e5;
      color: #4f46e5;
    }

    /* ─────────────────────────────────────────────────────────────────
       STATS GRID
       ───────────────────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .stat-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #f3f4f6;
    }

    .card-header h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #111827;
      margin: 0;
    }

    .card-subtitle {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .see-all {
      font-size: 0.8rem;
      color: #4f46e5;
      text-decoration: none;
    }

    .see-all:hover {
      text-decoration: underline;
    }

    /* ─────────────────────────────────────────────────────────────────
       DONUT CHART
       ───────────────────────────────────────────────────────────────── */
    .donut-container {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 1.5rem;
    }

    .donut-chart {
      position: relative;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .donut-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .donut-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: #111827;
    }

    .donut-label {
      font-size: 0.8rem;
      color: #6b7280;
    }

    .donut-legend {
      flex: 1;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .legend-label {
      flex: 1;
      font-size: 0.875rem;
      color: #374151;
    }

    .legend-value {
      font-size: 0.875rem;
      font-weight: 600;
      color: #111827;
    }

    /* ─────────────────────────────────────────────────────────────────
       BAR CHART
       ───────────────────────────────────────────────────────────────── */
    .bar-chart-container {
      padding: 1.5rem;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      height: 200px;
      gap: 0.5rem;
    }

    .bar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
    }

    .bar-wrapper {
      flex: 1;
      display: flex;
      align-items: flex-end;
      width: 100%;
    }

    .bar {
      width: 100%;
      max-width: 50px;
      margin: 0 auto;
      background: linear-gradient(180deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 6px 6px 0 0;
      transition: height 0.3s ease;
      position: relative;
      cursor: pointer;
    }

    .bar:hover {
      opacity: 0.9;
    }

    .bar-value {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 600;
      color: #4f46e5;
      white-space: nowrap;
    }

    .bar-label {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #6b7280;
    }

    /* ─────────────────────────────────────────────────────────────────
       COMPARISON
       ───────────────────────────────────────────────────────────────── */
    .comparison-card {
      grid-column: span 1;
    }

    .comparison-list {
      padding: 1rem 1.5rem;
    }

    .comparison-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 1rem;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .comparison-item:last-child {
      border-bottom: none;
    }

    .comparison-info {
      display: flex;
      flex-direction: column;
    }

    .comparison-label {
      font-size: 0.8rem;
      color: #6b7280;
    }

    .comparison-current {
      font-size: 1.25rem;
      font-weight: 700;
      color: #111827;
    }

    .comparison-change {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .comparison-change.positive {
      background: #ecfdf5;
      color: #10b981;
    }

    .comparison-change.negative {
      background: #fee2e2;
      color: #ef4444;
    }

    .comparison-change.neutral {
      background: #f3f4f6;
      color: #6b7280;
    }

    .comparison-bar {
      grid-column: span 3;
    }

    .progress-track {
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-current {
      height: 100%;
      background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 3px;
    }

    /* ─────────────────────────────────────────────────────────────────
       PRODUCTS TABLE
       ───────────────────────────────────────────────────────────────── */
    .products-card {
      grid-column: span 2;
    }

    .products-table {
      overflow-x: auto;
    }

    .products-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .products-table thead th {
      padding: 1rem 1.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: left;
      background: #f9fafb;
    }

    .products-table thead th.text-right {
      text-align: right;
    }

    .products-table tbody tr:not(:last-child) td {
      border-bottom: 1px solid #f3f4f6;
    }

    .products-table tbody tr:hover {
      background: #f9fafb;
    }

    .products-table tbody td {
      padding: 1rem 1.5rem;
      font-size: 0.875rem;
      color: #374151;
    }

    .products-table tbody td.text-right {
      text-align: right;
    }

    .products-table tbody td.font-semibold {
      font-weight: 600;
      color: #111827;
    }

    .product-name {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .product-rank {
      font-size: 0.75rem;
      font-weight: 600;
      color: #9ca3af;
    }

    .growth-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.125rem;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .growth-badge.positive {
      background: #ecfdf5;
      color: #10b981;
    }

    .growth-badge.negative {
      background: #fee2e2;
      color: #ef4444;
    }

    /* ─────────────────────────────────────────────────────────────────
       GEOGRAPHIC
       ───────────────────────────────────────────────────────────────── */
    .geo-card {
      grid-column: span 1;
    }

    .geo-list {
      padding: 1.5rem;
    }

    .geo-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .geo-item:last-child {
      margin-bottom: 0;
    }

    .geo-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100px;
    }

    .geo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .geo-name {
      font-size: 0.85rem;
      color: #374151;
    }

    .geo-bar {
      flex: 1;
      height: 8px;
      background: #f3f4f6;
      border-radius: 4px;
      overflow: hidden;
    }

    .geo-progress {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .geo-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: #111827;
      width: 40px;
      text-align: right;
    }

    /* ─────────────────────────────────────────────────────────────────
       RESPONSIVE
       ───────────────────────────────────────────────────────────────── */
    @media (max-width: 1200px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .products-card,
      .comparison-card,
      .geo-card {
        grid-column: span 1;
      }
    }

    @media (max-width: 768px) {
      .statistics-page {
        padding: 1rem;
      }

      .page-header {
        flex-direction: column;
        align-items: stretch;
      }

      .donut-container {
        flex-direction: column;
      }

      .comparison-item {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }

      .comparison-bar {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="statistics-page">
    <!-- Header -->
    <div class="page-header">
      <div class="header-content">
        <h1>Statistiques</h1>
        <p>Analyse détaillée de vos performances</p>
      </div>
      <div class="header-actions">
        <select id="periodSelect" class="period-select">
          <option value="7days">7 jours</option>
          <option value="30days" selected>30 jours</option>
          <option value="90days">90 jours</option>
          <option value="year">1 an</option>
        </select>
        <button class="btn btn--outline">
          <i class="bi bi-download"></i>
          Exporter
        </button>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <!-- Donut Chart -->
      <div class="stat-card">
        <div class="card-header">
          <h3>Revenus par source</h3>
        </div>
        <div class="donut-container">
          <div class="donut-chart" id="donutChart">
            <div class="donut-center">
              <span class="donut-value" id="donutValue">94 450 €</span>
              <span class="donut-label">Total</span>
            </div>
          </div>
          <div class="donut-legend" id="donutLegend"></div>
        </div>
      </div>

      <!-- Bar Chart -->
      <div class="stat-card">
        <div class="card-header">
          <h3>Évolution mensuelle</h3>
          <span class="card-subtitle">Chiffre d'affaires</span>
        </div>
        <div class="bar-chart-container">
          <div class="bar-chart" id="barChart"></div>
        </div>
      </div>

      <!-- Comparison Stats -->
      <div class="stat-card comparison-card">
        <div class="card-header">
          <h3>Comparaison période</h3>
          <span class="card-subtitle">vs période précédente</span>
        </div>
        <div class="comparison-list" id="comparisonList"></div>
      </div>

      <!-- Geographic Distribution -->
      <div class="stat-card geo-card">
        <div class="card-header">
          <h3>Distribution géographique</h3>
        </div>
        <div class="geo-list" id="geoList"></div>
      </div>

      <!-- Top Products -->
      <div class="stat-card products-card">
        <div class="card-header">
          <h3>Top Produits</h3>
          <a href="#" class="see-all">Voir tout</a>
        </div>
        <div class="products-table">
          <table>
            <thead>
              <tr>
                <th>Produit</th>
                <th class="text-right">Ventes</th>
                <th class="text-right">Revenus</th>
                <th class="text-right">Croissance</th>
              </tr>
            </thead>
            <tbody id="productsTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // STATISTICS COMPONENT - Premium UI Library
    // ═══════════════════════════════════════════════════════════════

    // ─────────────────────────────────────────────────────────────────
    // DONUT CHART DATA
    // ─────────────────────────────────────────────────────────────────
    const revenueBySource = [
      { label: 'Direct', value: 42500, color: '#4f46e5', percentage: 45 },
      { label: 'Affiliés', value: 28300, color: '#10b981', percentage: 30 },
      { label: 'Publicité', value: 14200, color: '#f59e0b', percentage: 15 },
      { label: 'Autres', value: 9450, color: '#6b7280', percentage: 10 }
    ];

    // ─────────────────────────────────────────────────────────────────
    // BAR CHART DATA
    // ─────────────────────────────────────────────────────────────────
    const monthlyTrend = [
      { period: 'Jan', value: 12500 },
      { period: 'Fév', value: 18200 },
      { period: 'Mar', value: 15800 },
      { period: 'Avr', value: 22400 },
      { period: 'Mai', value: 19600 },
      { period: 'Jun', value: 28500 }
    ];

    // ─────────────────────────────────────────────────────────────────
    // COMPARISON DATA
    // ─────────────────────────────────────────────────────────────────
    const comparisons = [
      { label: 'Visiteurs uniques', current: 45280, previous: 38450, change: 17.76 },
      { label: 'Pages vues', current: 128450, previous: 115200, change: 11.50 },
      { label: 'Temps moyen', current: 3.42, previous: 3.15, change: 8.57 },
      { label: 'Taux de rebond', current: 32.5, previous: 38.2, change: -14.92 }
    ];

    // ─────────────────────────────────────────────────────────────────
    // TOP PRODUCTS DATA
    // ─────────────────────────────────────────────────────────────────
    const topProducts = [
      { name: 'MacBook Pro 16"', sales: 245, revenue: 612255, growth: 12.5 },
      { name: 'iPhone 15 Pro', sales: 432, revenue: 518400, growth: 8.2 },
      { name: 'iPad Pro 12.9"', sales: 189, revenue: 207711, growth: -3.4 },
      { name: 'AirPods Pro', sales: 567, revenue: 158760, growth: 24.8 },
      { name: 'Apple Watch', sales: 298, revenue: 119200, growth: 5.7 }
    ];

    // ─────────────────────────────────────────────────────────────────
    // GEOGRAPHIC DATA
    // ─────────────────────────────────────────────────────────────────
    const regionData = [
      { name: 'France', value: 42, color: '#4f46e5' },
      { name: 'Belgique', value: 18, color: '#10b981' },
      { name: 'Suisse', value: 15, color: '#f59e0b' },
      { name: 'Canada', value: 12, color: '#0ea5e9' },
      { name: 'Autres', value: 13, color: '#6b7280' }
    ];

    // ─────────────────────────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────────────────────────
    function formatCurrency(value) {
      return new Intl.NumberFormat('fr-FR', { 
        style: 'currency', 
        currency: 'EUR',
        maximumFractionDigits: 0 
      }).format(value);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat('fr-FR').format(value);
    }

    function getBarHeight(value) {
      const max = Math.max(...monthlyTrend.map(t => t.value));
      return (value / max) * 100;
    }

    function getDonutSegments() {
      let offset = 0;
      return revenueBySource.map(item => {
        const segment = `${item.color} ${offset}% ${offset + (item.percentage || 0)}%`;
        offset += item.percentage || 0;
        return segment;
      }).join(', ');
    }

    function getTotalRevenue() {
      return revenueBySource.reduce((sum, item) => sum + item.value, 0);
    }

    function getComparisonClass(change) {
      if (change > 0) return 'positive';
      if (change < 0) return 'negative';
      return 'neutral';
    }

    function getComparisonIcon(change) {
      if (change > 0) return 'bi-arrow-up-short';
      if (change < 0) return 'bi-arrow-down-short';
      return 'bi-dash';
    }

    // ─────────────────────────────────────────────────────────────────
    // RENDER DONUT CHART
    // ─────────────────────────────────────────────────────────────────
    function renderDonutChart() {
      const chart = document.getElementById('donutChart');
      chart.style.background = `conic-gradient(${getDonutSegments()})`;
      
      document.getElementById('donutValue').textContent = formatCurrency(getTotalRevenue());
      
      const legend = document.getElementById('donutLegend');
      legend.innerHTML = revenueBySource.map(item => `
        <div class="legend-item">
          <span class="legend-dot" style="background: ${item.color}"></span>
          <span class="legend-label">${item.label}</span>
          <span class="legend-value">${item.percentage}%</span>
        </div>
      `).join('');
    }

    // ─────────────────────────────────────────────────────────────────
    // RENDER BAR CHART
    // ─────────────────────────────────────────────────────────────────
    function renderBarChart() {
      const container = document.getElementById('barChart');
      container.innerHTML = monthlyTrend.map(item => `
        <div class="bar-item">
          <div class="bar-wrapper">
            <div 
              class="bar" 
              style="height: ${getBarHeight(item.value)}%"
              title="${formatCurrency(item.value)}"
            >
              <span class="bar-value">${Math.round(item.value / 1000)}k</span>
            </div>
          </div>
          <span class="bar-label">${item.period}</span>
        </div>
      `).join('');
    }

    // ─────────────────────────────────────────────────────────────────
    // RENDER COMPARISONS
    // ─────────────────────────────────────────────────────────────────
    function renderComparisons() {
      const container = document.getElementById('comparisonList');
      container.innerHTML = comparisons.map(item => `
        <div class="comparison-item">
          <div class="comparison-info">
            <span class="comparison-label">${item.label}</span>
            <span class="comparison-current">${formatNumber(item.current)}</span>
          </div>
          <div class="comparison-change ${getComparisonClass(item.change)}">
            <i class="bi ${getComparisonIcon(item.change)}"></i>
            <span>${item.change > 0 ? '+' : ''}${item.change.toFixed(2)}%</span>
          </div>
          <div class="comparison-bar">
            <div class="progress-track">
              <div 
                class="progress-current" 
                style="width: ${(item.current / (item.current + item.previous)) * 100}%"
              ></div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ─────────────────────────────────────────────────────────────────
    // RENDER GEOGRAPHIC
    // ─────────────────────────────────────────────────────────────────
    function renderGeographic() {
      const container = document.getElementById('geoList');
      container.innerHTML = regionData.map(region => `
        <div class="geo-item">
          <div class="geo-info">
            <span class="geo-dot" style="background: ${region.color}"></span>
            <span class="geo-name">${region.name}</span>
          </div>
          <div class="geo-bar">
            <div class="geo-progress" style="width: ${region.value}%; background: ${region.color}"></div>
          </div>
          <span class="geo-value">${region.value}%</span>
        </div>
      `).join('');
    }

    // ─────────────────────────────────────────────────────────────────
    // RENDER PRODUCTS TABLE
    // ─────────────────────────────────────────────────────────────────
    function renderProductsTable() {
      const container = document.getElementById('productsTable');
      container.innerHTML = topProducts.map((product, i) => `
        <tr>
          <td>
            <div class="product-name">
              <span class="product-rank">#${i + 1}</span>
              ${product.name}
            </div>
          </td>
          <td class="text-right">${product.sales}</td>
          <td class="text-right font-semibold">${formatCurrency(product.revenue)}</td>
          <td class="text-right">
            <span class="growth-badge ${product.growth >= 0 ? 'positive' : 'negative'}">
              <i class="bi ${product.growth >= 0 ? 'bi-arrow-up-short' : 'bi-arrow-down-short'}"></i>
              ${product.growth > 0 ? '+' : ''}${product.growth}%
            </span>
          </td>
        </tr>
      `).join('');
    }

    // ─────────────────────────────────────────────────────────────────
    // EVENT LISTENERS
    // ─────────────────────────────────────────────────────────────────
    document.getElementById('periodSelect').addEventListener('change', function(e) {
      console.log('Period changed:', e.target.value);
    });

    // ─────────────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      renderDonutChart();
      renderBarChart();
      renderComparisons();
      renderGeographic();
      renderProductsTable();
    });
  </script>
</body>
</html>
