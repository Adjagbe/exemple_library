<div class="kpi-showcase">
  <h1 class="page-title">Cartes avec mini graphiques</h1>
  <p class="page-subtitle">Indicateurs clés avec courbes de tendance intégrées</p>

  <div class="kpi-grid">
    <div *ngFor="let kpi of sparklineKPIs" class="kpi-card kpi-card--sparkline">
      <div class="kpi-card__header">
        <span class="kpi-card__title">{{ kpi.title }}</span>
        <div class="kpi-card__change" *ngIf="kpi.change" [ngClass]="getChangeClass(kpi.change.type)">
          <i class="bi" [ngClass]="getChangeIcon(kpi.change.type)"></i>
          <span>{{ kpi.change.value > 0 ? '+' : '' }}{{ kpi.change.value }}%</span>
        </div>
      </div>
      <span class="kpi-card__value">{{ formatValue(kpi) }}</span>
      <div class="kpi-card__sparkline" *ngIf="kpi.sparkline">
        <svg viewBox="0 0 100 40" preserveAspectRatio="none">
          <polyline
            [attr.points]="getSparklinePoints(kpi.sparkline)"
            fill="none"
            [attr.stroke]="getSparklineColor(kpi)"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>
      <span class="kpi-card__period" *ngIf="kpi.change">{{ kpi.change.period }}</span>
    </div>
  </div>
</div>
