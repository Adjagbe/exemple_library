<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Cards Progression - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:#f8fafc;line-height:1.5}

    .kpi-showcase{max-width:1400px;margin:0 auto;padding:2rem}
    .page-title{font-size:2rem;font-weight:700;color:#111827;margin:0 0 .5rem}
    .page-subtitle{color:#6b7280;margin:0 0 2rem}

    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}

    .kpi-card{background:#fff;border-radius:1rem;box-shadow:0 4px 20px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s}
    .kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.1)}

    .kpi-card--progress{padding:1.5rem}

    .kpi-card__row{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}

    .kpi-card__icon--small{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:.75rem;font-size:1.25rem;flex-shrink:0}
    .kpi-card__icon--primary{background:linear-gradient(135deg,#eff6ff,#dbeafe);color:#4f46e5}
    .kpi-card__icon--success{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#10b981}
    .kpi-card__icon--warning{background:linear-gradient(135deg,#fffbeb,#fef3c7);color:#f59e0b}
    .kpi-card__icon--info{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);color:#0ea5e9}

    .kpi-card__info{flex:1;display:flex;flex-direction:column}
    .kpi-card__info .kpi-card__title{display:block;margin-bottom:.125rem}
    .kpi-card__info .kpi-card__value{font-size:1.5rem;margin:0}

    .kpi-card__title{font-size:.8rem;font-weight:500;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
    .kpi-card__value{font-size:1.75rem;font-weight:700;color:#111827;line-height:1.2;margin:.25rem 0}

    .kpi-card__progress-container{display:flex;flex-direction:column;gap:.5rem}
    .progress-bar{height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden}
    .progress-fill{height:100%;border-radius:4px;transition:width .5s ease}
    .progress-fill--primary{background:linear-gradient(90deg,#4f46e5,#7c3aed)}
    .progress-fill--success{background:linear-gradient(90deg,#10b981,#34d399)}
    .progress-fill--warning{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
    .progress-fill--info{background:linear-gradient(90deg,#0ea5e9,#38bdf8)}
    .progress-label{font-size:.75rem;color:#6b7280;text-align:right}

    @media(max-width:768px){.kpi-showcase{padding:1rem}.kpi-grid{grid-template-columns:1fr}.kpi-card__value{font-size:1.5rem}}
  </style>
</head>
<body>
<div class="kpi-showcase">
  <h1 class="page-title">Cartes avec progression</h1>
  <p class="page-subtitle">Indicateurs clés avec barres de progression vers les objectifs</p>
  <div class="kpi-grid" id="progressKPIsGrid"></div>
</div>

<script>
(function() {
  var progressKPIs = [
    { id:'goal-revenue', title:'Objectif revenus', value:284750, format:'currency', progress:{value:284750,max:350000,label:'81% atteint'}, icon:'bi-bullseye', iconColor:'primary' },
    { id:'goal-customers', title:'Objectif clients', value:456, format:'number', progress:{value:456,max:500,label:'91% atteint'}, icon:'bi-person-check', iconColor:'success' },
    { id:'tickets', title:'Tickets résolus', value:89, format:'number', progress:{value:89,max:120,label:'74% terminé'}, icon:'bi-ticket-perforated', iconColor:'warning' },
    { id:'tasks', title:'Tâches complétées', value:42, format:'number', progress:{value:42,max:50,label:'84% fait'}, icon:'bi-check2-square', iconColor:'info' }
  ];

  function formatValue(kpi) {
    if (typeof kpi.value === 'string') return kpi.value;
    switch (kpi.format) {
      case 'currency': return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(kpi.value);
      case 'percentage': return kpi.value + '%';
      default: return new Intl.NumberFormat('fr-FR').format(kpi.value);
    }
  }

  function getProgressPercentage(progress) {
    return (progress.value / progress.max) * 100;
  }

  var container = document.getElementById('progressKPIsGrid');
  container.innerHTML = progressKPIs.map(function(kpi) {
    var pct = kpi.progress ? getProgressPercentage(kpi.progress) : 0;
    return '<div class="kpi-card kpi-card--progress">' +
      '<div class="kpi-card__row">' +
        '<div class="kpi-card__icon--small kpi-card__icon--' + kpi.iconColor + '"><i class="bi ' + kpi.icon + '"></i></div>' +
        '<div class="kpi-card__info">' +
          '<span class="kpi-card__title">' + kpi.title + '</span>' +
          '<span class="kpi-card__value">' + formatValue(kpi) + '</span>' +
        '</div>' +
      '</div>' +
      (kpi.progress ? '<div class="kpi-card__progress-container">' +
        '<div class="progress-bar"><div class="progress-fill progress-fill--' + kpi.iconColor + '" style="width:' + pct + '%"></div></div>' +
        '<span class="progress-label">' + kpi.progress.label + '</span>' +
      '</div>' : '') +
    '</div>';
  }).join('');
})();
</script>
</body>
</html>
