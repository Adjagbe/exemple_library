<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>404 Not Found</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center}
.pnf1__inner{max-width:480px}
.pnf1__num{font-size:clamp(6rem,18vw,10rem);font-weight:900;background:linear-gradient(135deg,#e0e7ff,#c7d2fe,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:.5rem}
.pnf1__h1{font-size:clamp(1.5rem,3vw,2rem);font-weight:800;color:#0f172a;margin-bottom:1rem}
.pnf1__desc{color:#6b7280;font-size:.9375rem;line-height:1.7;margin-bottom:2.5rem}
.pnf1__actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.pnf1__home{padding:.875rem 2rem;background:#6366f1;color:#fff;border:none;border-radius:.875rem;font-size:.9375rem;font-weight:700;cursor:pointer;font-family:inherit}
.pnf1__support{padding:.875rem 2rem;background:none;border:2px solid #e5e7eb;color:#374151;border-radius:.875rem;font-size:.9375rem;font-weight:600;cursor:pointer;font-family:inherit}
</style></head>
<body>
<div class="pnf1__inner">
  <div class="pnf1__num">404</div>
  <h1 class="pnf1__h1">Page not found</h1>
  <p class="pnf1__desc">Sorry, we couldn't find the page you're looking for. It may have been moved or deleted.</p>
  <div class="pnf1__actions">
    <button class="pnf1__home">← Back to Home</button>
    <button class="pnf1__support">Contact Support</button>
  </div>
</div>
<script>(function(){})()</script>
</body></html>
