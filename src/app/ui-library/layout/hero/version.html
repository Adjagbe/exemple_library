<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Section - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;min-height:100vh}

    /* HERO */
    .hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;background:linear-gradient(135deg,#f8fafc 0%,#e2e8f0 100%)}
    .hero-container{max-width:1400px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;position:relative;z-index:2}

    /* CONTENT */
    .hero-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:#fff;border:1px solid #e2e8f0;border-radius:50px;font-size:.875rem;font-weight:500;color:#4f46e5;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.05);animation:fadeInUp .6s ease}
    .hero-title{font-size:3.5rem;font-weight:800;line-height:1.1;color:#0f172a;margin:0 0 1.5rem;animation:fadeInUp .6s ease .1s backwards}
    .hero-title .highlight{display:block;background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-subtitle{font-size:1.25rem;line-height:1.7;color:#64748b;margin:0 0 2rem;max-width:540px;animation:fadeInUp .6s ease .2s backwards}
    .hero-actions{display:flex;gap:1rem;animation:fadeInUp .6s ease .3s backwards}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;font-weight:600;border-radius:.75rem;cursor:pointer;transition:all .3s;text-decoration:none}
    .btn--lg{padding:1rem 2rem;font-size:1rem}
    .btn--primary{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);color:#fff;border:none;box-shadow:0 4px 15px rgba(79,70,229,.4)}
    .btn--primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,70,229,.5)}
    .btn--secondary{background:#fff;color:#374151;border:1px solid #e5e7eb}
    .btn--secondary:hover{background:#f9fafb;border-color:#d1d5db}

    /* STATS */
    .hero-stats{display:flex;gap:2.5rem;margin-top:3rem;padding-top:2rem;border-top:1px solid #e2e8f0;animation:fadeInUp .6s ease .4s backwards}
    .stat-item{display:flex;flex-direction:column;gap:.25rem}
    .stat-value{font-size:1.75rem;font-weight:800;color:#0f172a}
    .stat-label{font-size:.875rem;color:#64748b}

    /* VISUAL */
    .hero-visual{position:relative;animation:fadeInRight .8s ease .3s backwards}
    .visual-wrapper{position:relative}
    .hero-image{width:100%;height:auto;border-radius:1.5rem;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
    .visual-decoration{position:absolute;border-radius:50%;z-index:-1}
    .decoration-1{width:300px;height:300px;background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);opacity:.1;top:-50px;right:-50px}
    .decoration-2{width:200px;height:200px;background:#f59e0b;opacity:.1;bottom:-30px;left:-30px}
    .decoration-3{width:100px;height:100px;background:#10b981;opacity:.2;top:50%;left:-50px}

    /* BACKGROUND */
    .hero-bg{position:absolute;inset:0;z-index:1;overflow:hidden}
    .bg-gradient{position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(79,70,229,.05) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(124,58,237,.05) 0%,transparent 50%)}
    .bg-pattern{position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,#e2e8f0 1px,transparent 0);background-size:40px 40px;opacity:.5}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(60px)}
    .blob-1{width:600px;height:600px;background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);opacity:.05;top:-200px;left:-100px;animation:float 20s ease-in-out infinite}
    .blob-2{width:400px;height:400px;background:#f59e0b;opacity:.05;bottom:-100px;right:-100px;animation:float 25s ease-in-out infinite reverse}

    /* ANIMATIONS */
    @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeInRight{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
    @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,30px)}}

    /* RESPONSIVE */
    @media(max-width:1024px){
      .hero-container{grid-template-columns:1fr;text-align:center;gap:3rem}
      .hero-content{order:2}
      .hero-visual{order:1;max-width:500px;margin:0 auto}
      .hero-subtitle{margin:0 auto 2rem}
      .hero-actions{justify-content:center}
      .hero-stats{justify-content:center}
    }
    @media(max-width:768px){
      .hero-title{font-size:2.5rem}
      .hero-subtitle{font-size:1.1rem}
    }
    @media(max-width:480px){
      .hero-title{font-size:2rem}
      .hero-actions{flex-direction:column}
      .hero-stats{gap:1.5rem;flex-wrap:wrap}
      .stat-value{font-size:1.5rem}
    }
  </style>
</head>
<body>
<section class="hero">
  <div class="hero-container">
    <!-- Content -->
    <div class="hero-content">
      
      <h1 class="hero-title">
        Build Amazing Products
        <span class="highlight">Faster Than Ever</span>
      </h1>
      <p class="hero-subtitle">The most powerful UI library for modern web applications. Create stunning interfaces with our premium components.</p>
      <div class="hero-actions">
        <a href="#" class="btn btn--primary btn--lg">Get Started Free <i class="bi bi-arrow-right"></i></a>
        <a href="#" class="btn btn--secondary btn--lg"><i class="bi bi-play-circle"></i> View Demo</a>
      </div>
      <div class="hero-stats">
        <div class="stat-item"><span class="stat-value">10K+</span><span class="stat-label">Happy Users</span></div>
        <div class="stat-item"><span class="stat-value">500+</span><span class="stat-label">Components</span></div>
        <div class="stat-item"><span class="stat-value">99.9%</span><span class="stat-label">Uptime</span></div>
        <div class="stat-item"><span class="stat-value">24/7</span><span class="stat-label">Support</span></div>
      </div>
    </div>

    <!-- Image -->
    <div class="hero-visual">
      <div class="visual-wrapper">
        <img src="https://placehold.co/600x400/4f46e5/ffffff?text=Hero+Image" alt="Hero illustration" class="hero-image">
        <div class="visual-decoration decoration-1"></div>
        <div class="visual-decoration decoration-2"></div>
        <div class="visual-decoration decoration-3"></div>
      </div>
    </div>
  </div>

  <!-- Background Elements -->
  <div class="hero-bg">
    <div class="bg-gradient"></div>
    <div class="bg-pattern"></div>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
  </div>
</section>
</body>
</html>
