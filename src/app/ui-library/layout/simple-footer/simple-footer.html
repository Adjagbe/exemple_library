
<footer class="footer footer--simple">
    <div class="simple-top">
      <div class="logo-row">
        <div class="logo">{{ brandLetter }}</div>
        <span class="brand-name" style="color:#f9fafb">{{ brandName }}</span>
      </div>
      <div class="simple-links">
        <a *ngFor="let link of simpleLinks" [href]="link.href">{{ link.label }}</a>
      </div>
    </div>
    <div class="simple-bottom">
      <span>© 2026 {{ brandName }}. Tous droits réservés.</span>
      <div class="footer-social">
        <a *ngFor="let s of socialLinks.slice(0, 3)" [href]="s.href"><i class="bi" [ngClass]="s.icon"></i></a>
      </div>
    </div>
</footer>
