<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #f9fafb; }

    .checkout-page { min-height: 100vh; background: #f9fafb; padding: 2rem; }
    .order-confirmation { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 4rem); }
    .confirmation-card { background: white; border-radius: 1rem; padding: 3rem; max-width: 500px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .confirmation-card h1 { font-size: 1.75rem; color: #111827; margin: 0 0 0.5rem 0; }
    .confirmation-card .order-number { font-size: 1rem; color: #6b7280; margin: 0 0 1rem 0; }
    .confirmation-card .order-number strong { color: #111827; font-family: monospace; }
    .confirmation-card .confirmation-message { color: #6b7280; margin: 0 0 2rem 0; }
    .confirmation-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; animation: scaleIn 0.4s ease; }
    .confirmation-icon i { font-size: 2.5rem; color: white; }
    @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .confirmation-details { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
    .detail-box { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; background: #f9fafb; border-radius: 0.75rem; text-align: left; }
    .detail-box i { font-size: 1.5rem; color: #4f46e5; }
    .detail-box h4 { font-size: 0.75rem; color: #6b7280; margin: 0 0 0.25rem 0; text-transform: uppercase; letter-spacing: 0.05em; }
    .detail-box p { font-size: 0.9rem; color: #111827; font-weight: 600; margin: 0; }
    .confirmation-actions { display: flex; flex-direction: column; gap: 0.75rem; }

    .checkout-container { max-width: 1200px; margin: 0 auto; }

    /* Progress */
    .checkout-progress { margin-bottom: 2rem; position: relative; }
    .progress-track { position: absolute; top: 20px; left: 60px; right: 60px; height: 3px; background: #e5e7eb; border-radius: 2px; z-index: 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed); border-radius: 2px; transition: width 0.4s ease; }
    .progress-steps { display: flex; justify-content: space-between; position: relative; z-index: 1; }
    .step { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .step-circle { width: 40px; height: 40px; border-radius: 50%; background: white; border: 3px solid #e5e7eb; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #9ca3af; transition: all 0.3s ease; margin-bottom: 0.5rem; }
    .step.active .step-circle { border-color: #4f46e5; background: #4f46e5; color: white; }
    .step.completed .step-circle { border-color: #10b981; background: #10b981; color: white; }
    .step-label { font-size: 0.8rem; font-weight: 500; color: #9ca3af; }
    .step.active .step-label, .step.completed .step-label { color: #111827; }

    /* Content */
    .checkout-content { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; }
    .checkout-main { order: 1; }
    .checkout-sidebar { order: 2; }
    .checkout-step { background: white; border-radius: 0.75rem; padding: 2rem; border: 1px solid #e5e7eb; }
    .step-title { display: flex; align-items: center; gap: 0.75rem; font-size: 1.25rem; font-weight: 600; color: #111827; margin: 0 0 1.5rem 0; }
    .step-title i { color: #4f46e5; }
    .section-title { font-size: 1rem; font-weight: 600; color: #111827; margin: 2rem 0 1rem 0; padding-top: 1.5rem; border-top: 1px solid #e5e7eb; }

    /* Forms */
    .address-form { display: flex; flex-direction: column; gap: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-row--three { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; }
    .form-label { font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem; }
    .form-input, .form-select { padding: 0.75rem 1rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; font-size: 0.9rem; transition: all 0.2s ease; }
    .form-input:focus, .form-select:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .form-input::placeholder { color: #9ca3af; }
    .form-select { cursor: pointer; background: white url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e") right 0.75rem center/1.5em 1.5em no-repeat; appearance: none; }
    .checkbox-label { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; margin: 1rem 0; }
    .checkbox-label input[type="checkbox"] { width: 20px; height: 20px; accent-color: #4f46e5; }
    .checkbox-text { font-size: 0.9rem; color: #374151; }

    /* Shipping Methods */
    .shipping-methods { display: flex; flex-direction: column; gap: 0.75rem; }
    .shipping-option { display: flex; align-items: center; padding: 1rem; border: 2px solid #e5e7eb; border-radius: 0.5rem; cursor: pointer; transition: all 0.2s ease; }
    .shipping-option:hover { border-color: #d1d5db; }
    .shipping-option.selected { border-color: #4f46e5; background: #f5f3ff; }
    .shipping-option input[type="radio"] { display: none; }
    .option-content { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .option-info { display: flex; flex-direction: column; }
    .option-name { font-weight: 600; color: #111827; }
    .option-desc { font-size: 0.8rem; color: #6b7280; }
    .option-price { font-weight: 600; color: #111827; }
    .option-price.free { color: #16a34a; }

    /* Payment */
    .payment-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .payment-option { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1.5rem; border: 2px solid #e5e7eb; border-radius: 0.75rem; cursor: pointer; transition: all 0.2s ease; }
    .payment-option:hover { border-color: #d1d5db; }
    .payment-option.selected { border-color: #4f46e5; background: #f5f3ff; }
    .payment-option input[type="radio"] { display: none; }
    .payment-option .option-icon { width: 48px; height: 48px; background: #f3f4f6; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; }
    .payment-option .option-icon i { font-size: 1.5rem; color: #374151; }
    .payment-option span { font-weight: 500; color: #374151; }

    .saved-cards { margin-bottom: 1.5rem; }
    .cards-title { font-size: 0.9rem; font-weight: 600; color: #374151; margin: 0 0 0.75rem 0; }
    .cards-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .saved-card { display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 2px solid #e5e7eb; border-radius: 0.5rem; cursor: pointer; transition: all 0.2s ease; }
    .saved-card:hover { border-color: #d1d5db; }
    .saved-card.selected { border-color: #4f46e5; background: #f5f3ff; }
    .saved-card i { font-size: 1.25rem; color: #6b7280; }
    .card-info { flex: 1; display: flex; flex-direction: column; }
    .card-brand { font-weight: 600; color: #111827; font-size: 0.9rem; }
    .card-number { font-size: 0.8rem; color: #6b7280; font-family: monospace; }
    .card-expiry { font-size: 0.8rem; color: #6b7280; }
    .selected-icon { color: #4f46e5; }

    .add-new-card { display: flex; align-items: center; gap: 0.5rem; background: none; border: none; color: #4f46e5; font-size: 0.875rem; font-weight: 500; cursor: pointer; padding: 0.5rem 0; margin-top: 0.5rem; }
    .add-new-card:hover { text-decoration: underline; }

    .card-form { display: flex; flex-direction: column; gap: 1rem; }
    .card-input-wrapper { position: relative; }
    .card-input-wrapper .card-number-input { padding-right: 3rem; }
    .card-input-wrapper .card-brand-icon { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); font-size: 1.25rem; color: #9ca3af; }
    .card-input-wrapper .card-brand-icon.visa i { color: #1a1f71; }
    .card-input-wrapper .card-brand-icon.mastercard i { color: #eb001b; }
    .card-input-wrapper .card-brand-icon.amex i { color: #006fcf; }
    .cvv-input-wrapper { position: relative; }
    .cvv-input-wrapper .cvv-help { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: #9ca3af; cursor: help; }

    .paypal-section { padding: 1.5rem; background: #fef9c3; border-radius: 0.5rem; margin-bottom: 1rem; }
    .paypal-info { display: flex; align-items: flex-start; gap: 0.75rem; }
    .paypal-info i { color: #ca8a04; font-size: 1.25rem; margin-top: 0.125rem; }
    .paypal-info p { color: #854d0e; margin: 0; font-size: 0.9rem; }

    /* Review */
    .review-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .review-section { padding: 1rem; background: #f9fafb; border-radius: 0.5rem; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .section-header h4 { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; font-weight: 600; color: #374151; margin: 0; }
    .section-header h4 i { color: #6b7280; }
    .edit-btn { background: none; border: none; color: #4f46e5; font-size: 0.8rem; font-weight: 500; cursor: pointer; }
    .edit-btn:hover { text-decoration: underline; }
    .section-content p { font-size: 0.875rem; color: #111827; margin: 0 0 0.25rem 0; }
    .section-content p.muted, .section-content p.same-address { color: #6b7280; font-style: italic; }
    .payment-review { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: #111827; }
    .payment-review i { font-size: 1.25rem; color: #6b7280; }

    .order-items-review { margin-bottom: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb; }
    .order-items-review h4 { font-size: 0.9rem; font-weight: 600; color: #374151; margin: 0 0 1rem 0; }
    .items-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .review-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: #f9fafb; border-radius: 0.5rem; }
    .review-item img { width: 48px; height: 48px; border-radius: 0.375rem; object-fit: cover; }
    .review-item .item-details { flex: 1; display: flex; flex-direction: column; }
    .review-item .item-name { font-size: 0.875rem; font-weight: 500; color: #111827; }
    .review-item .item-qty { font-size: 0.75rem; color: #6b7280; }
    .review-item .item-price { font-weight: 600; color: #111827; }

    /* Step Actions */
    .step-actions { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb; }

    /* Order Summary Sidebar */
    .order-summary { background: white; border-radius: 0.75rem; padding: 1.5rem; border: 1px solid #e5e7eb; position: sticky; top: 1rem; }
    .summary-title { font-size: 1.125rem; font-weight: 600; color: #111827; margin: 0 0 1.5rem 0; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb; }
    .summary-items { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem; }
    .summary-item { display: flex; align-items: center; gap: 0.75rem; }
    .summary-item .item-image { position: relative; width: 48px; height: 48px; }
    .summary-item .item-image img { width: 100%; height: 100%; border-radius: 0.375rem; object-fit: cover; }
    .summary-item .item-qty-badge { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; background: #4f46e5; color: white; font-size: 0.7rem; font-weight: 600; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .summary-item .item-info { flex: 1; min-width: 0; }
    .summary-item .item-name { font-size: 0.8rem; color: #374151; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .summary-item .item-price { font-size: 0.875rem; font-weight: 600; color: #111827; }

    .summary-coupon { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; background: #f0fdf4; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.875rem; color: #16a34a; }
    .summary-coupon i { font-size: 1rem; }
    .summary-coupon .coupon-discount { margin-left: auto; font-weight: 600; }

    .summary-totals { border-top: 1px solid #e5e7eb; padding-top: 1rem; }
    .total-line { display: flex; justify-content: space-between; padding: 0.5rem 0; font-size: 0.9rem; color: #6b7280; }
    .total-line.discount { color: #16a34a; }
    .total-line.total { padding-top: 1rem; margin-top: 0.5rem; border-top: 1px solid #e5e7eb; font-size: 1.125rem; font-weight: 700; color: #111827; }
    .total-line .free { color: #16a34a; font-weight: 600; }

    .security-badge { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; font-size: 0.8rem; color: #16a34a; }
    .security-badge i { font-size: 1rem; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem 1.5rem; font-size: 0.9rem; font-weight: 600; border: none; border-radius: 0.5rem; cursor: pointer; transition: all 0.2s ease; }
    .btn--primary { background: #4f46e5; color: white; }
    .btn--primary:hover:not(:disabled) { background: #4338ca; }
    .btn--secondary { background: #f3f4f6; color: #374151; }
    .btn--secondary:hover:not(:disabled) { background: #e5e7eb; }
    .btn--lg { padding: 1rem 2rem; font-size: 1rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 1024px) { .checkout-content { grid-template-columns: 1fr; } .checkout-main { order: 2; } .checkout-sidebar { order: 1; } }
    @media (max-width: 768px) {
      .checkout-page { padding: 1rem; }
      .checkout-step { padding: 1.5rem; }
      .progress-track { left: 30px; right: 30px; }
      .step-circle { width: 32px; height: 32px; font-size: 0.8rem; }
      .step-label { font-size: 0.7rem; }
      .confirmation-details { grid-template-columns: 1fr; }
      .payment-methods { grid-template-columns: 1fr; }
      .review-sections { grid-template-columns: 1fr; }
      .step-actions { flex-direction: column-reverse; gap: 0.75rem; }
      .step-actions .btn { width: 100%; }
      .form-row { grid-template-columns: 1fr; }
      .form-row--three { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="checkout-page">
  <!-- Order Confirmation (hidden initially) -->
  <div class="order-confirmation" id="orderConfirmation" style="display:none;">
    <div class="confirmation-card">
      <div class="confirmation-icon"><i class="bi bi-check-circle-fill"></i></div>
      <h1>Order Confirmed!</h1>
      <p class="order-number">Order Number: <strong id="orderNumberDisplay"></strong></p>
      <p class="confirmation-message">Thank you for your purchase! We've sent a confirmation email to <strong id="confirmEmail"></strong></p>
      <div class="confirmation-details">
        <div class="detail-box"><i class="bi bi-truck"></i><div><h4>Estimated Delivery</h4><p>5-7 Business Days</p></div></div>
        <div class="detail-box"><i class="bi bi-geo-alt"></i><div><h4>Shipping To</h4><p id="confirmCity"></p></div></div>
      </div>
      <div class="confirmation-actions">
        <button class="btn btn--primary"><i class="bi bi-receipt"></i> View Order Details</button>
        <button class="btn btn--secondary">Continue Shopping</button>
      </div>
    </div>
  </div>

  <!-- Checkout Process -->
  <div class="checkout-container" id="checkoutContainer">
    <!-- Progress -->
    <div class="checkout-progress">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-steps" id="progressSteps"></div>
    </div>

    <div class="checkout-content">
      <div class="checkout-main" id="checkoutMain"></div>

      <!-- Sidebar -->
      <div class="checkout-sidebar">
        <div class="order-summary">
          <h3 class="summary-title">Order Summary</h3>
          <div class="summary-items" id="summaryItems"></div>
          <div class="summary-coupon" id="summaryCoupon"><i class="bi bi-tag-fill"></i><span id="summaryCouponCode"></span><span class="coupon-discount" id="summaryCouponDiscount"></span></div>
          <div class="summary-totals" id="summaryTotals"></div>
          <div class="security-badge"><i class="bi bi-shield-lock-fill"></i><span>Secure checkout - SSL encrypted</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentStep = 1;
  const totalSteps = 4;
  const stepTitles = ['', 'Shipping', 'Billing', 'Payment', 'Review'];

  const shippingAddress = { firstName:'', lastName:'', email:'', phone:'', address:'', address2:'', city:'', state:'', zipCode:'', country:'US' };
  const billingAddress = { firstName:'', lastName:'', email:'', phone:'', address:'', address2:'', city:'', state:'', zipCode:'', country:'US' };
  let sameAsShipping = true;
  let selectedShipping = 'standard';
  let paymentMethod = 'card';
  const paymentInfo = { cardNumber:'', cardName:'', expiryDate:'', cvv:'', saveCard:false };
  const savedCards = [
    { id:'card1', last4:'4242', brand:'Visa', expiry:'12/25' },
    { id:'card2', last4:'8888', brand:'Mastercard', expiry:'09/24' }
  ];
  let selectedSavedCard = '';
  let isProcessing = false;

  const shippingMethods = [
    { id:'standard', name:'Standard Shipping', description:'5-7 business days', price:5.99 },
    { id:'express', name:'Express Shipping', description:'2-3 business days', price:12.99 },
    { id:'overnight', name:'Overnight Shipping', description:'Next business day', price:24.99 },
    { id:'free', name:'Free Shipping', description:'7-10 business days', price:0 }
  ];

  const cartItems = [
    { id:'1', name:'Premium Wireless Headphones', price:299.99, quantity:1, image:'https://placehold.co/80x80/e5e7eb/64748b?text=Item' },
    { id:'2', name:'Laptop Stand - Silver', price:79.99, quantity:2, image:'https://placehold.co/80x80/e5e7eb/64748b?text=Item' },
    { id:'3', name:'USB-C Hub 7-in-1', price:49.99, quantity:1, image:'https://placehold.co/80x80/e5e7eb/64748b?text=Item' }
  ];

  const couponCode = 'SAVE10';
  const discount = 50.99;
  const countries = [{code:'US',name:'United States'},{code:'CA',name:'Canada'},{code:'GB',name:'United Kingdom'},{code:'FR',name:'France'},{code:'DE',name:'Germany'},{code:'AU',name:'Australia'}];
  const states = [{code:'CA',name:'California'},{code:'NY',name:'New York'},{code:'TX',name:'Texas'},{code:'FL',name:'Florida'},{code:'WA',name:'Washington'}];

  function fmt(n) { return '$' + n.toFixed(2); }
  function getSubtotal() { return cartItems.reduce((s,i) => s + i.price*i.quantity, 0); }
  function getShippingCost() { const m = shippingMethods.find(m => m.id === selectedShipping); return m ? m.price : 0; }
  function getTax() { return (getSubtotal() - discount) * 0.08; }
  function getTotal() { return getSubtotal() - discount + getShippingCost() + getTax(); }

  function renderProgress() {
    const fill = document.getElementById('progressFill');
    fill.style.width = ((currentStep - 1) / (totalSteps - 1) * 100) + '%';
    const el = document.getElementById('progressSteps');
    el.innerHTML = [1,2,3,4].map(s => {
      const cls = s === currentStep ? 'active' : s < currentStep ? 'completed' : '';
      return `<div class="step ${cls}" onclick="goToStep(${s})">
        <div class="step-circle">${s < currentStep ? '<i class="bi bi-check"></i>' : s}</div>
        <span class="step-label">${stepTitles[s]}</span>
      </div>`;
    }).join('');
  }

  function renderSidebar() {
    document.getElementById('summaryItems').innerHTML = cartItems.map(i => `
      <div class="summary-item">
        <div class="item-image"><img src="${i.image}" alt="${i.name}"><span class="item-qty-badge">${i.quantity}</span></div>
        <div class="item-info"><span class="item-name">${i.name}</span></div>
        <span class="item-price">${fmt(i.price*i.quantity)}</span>
      </div>`).join('');

    const couponEl = document.getElementById('summaryCoupon');
    if (couponCode) { couponEl.style.display=''; document.getElementById('summaryCouponCode').textContent=couponCode; document.getElementById('summaryCouponDiscount').textContent='-'+fmt(discount); }
    else couponEl.style.display='none';

    document.getElementById('summaryTotals').innerHTML = `
      <div class="total-line"><span>Subtotal</span><span>${fmt(getSubtotal())}</span></div>
      ${discount > 0 ? `<div class="total-line discount"><span>Discount</span><span>-${fmt(discount)}</span></div>` : ''}
      <div class="total-line"><span>Shipping</span><span ${getShippingCost()===0?'class="free"':''}>${getShippingCost()===0?'FREE':fmt(getShippingCost())}</span></div>
      <div class="total-line"><span>Tax</span><span>${fmt(getTax())}</span></div>
      <div class="total-line total"><span>Total</span><span>${fmt(getTotal())}</span></div>`;
  }

  function renderStep() {
    renderProgress();
    renderSidebar();
    const main = document.getElementById('checkoutMain');

    if (currentStep === 1) {
      main.innerHTML = `<div class="checkout-step">
        <h2 class="step-title"><i class="bi bi-truck"></i> Shipping Information</h2>
        <form class="address-form" onsubmit="return false">
          <div class="form-row"><div class="form-group"><label class="form-label">First Name *</label><input type="text" class="form-input" id="sFirstName" placeholder="John" value="${shippingAddress.firstName}"></div><div class="form-group"><label class="form-label">Last Name *</label><input type="text" class="form-input" id="sLastName" placeholder="Doe" value="${shippingAddress.lastName}"></div></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Email Address *</label><input type="email" class="form-input" id="sEmail" placeholder="john.doe@example.com" value="${shippingAddress.email}"></div><div class="form-group"><label class="form-label">Phone Number</label><input type="tel" class="form-input" id="sPhone" placeholder="+1 (555) 000-0000" value="${shippingAddress.phone}"></div></div>
          <div class="form-group"><label class="form-label">Street Address *</label><input type="text" class="form-input" id="sAddress" placeholder="123 Main Street" value="${shippingAddress.address}"></div>
          <div class="form-group"><label class="form-label">Apartment, suite, etc.</label><input type="text" class="form-input" id="sAddress2" placeholder="Apt 4B" value="${shippingAddress.address2}"></div>
          <div class="form-row form-row--three"><div class="form-group"><label class="form-label">City *</label><input type="text" class="form-input" id="sCity" placeholder="New York" value="${shippingAddress.city}"></div><div class="form-group"><label class="form-label">State *</label><select class="form-select" id="sState"><option value="">Select state</option>${states.map(s=>`<option value="${s.code}" ${shippingAddress.state===s.code?'selected':''}>${s.name}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">ZIP Code *</label><input type="text" class="form-input" id="sZip" placeholder="10001" value="${shippingAddress.zipCode}"></div></div>
          <div class="form-group"><label class="form-label">Country *</label><select class="form-select" id="sCountry">${countries.map(c=>`<option value="${c.code}" ${shippingAddress.country===c.code?'selected':''}>${c.name}</option>`).join('')}</select></div>
        </form>
        <h3 class="section-title">Shipping Method</h3>
        <div class="shipping-methods">${shippingMethods.map(m=>`<label class="shipping-option ${selectedShipping===m.id?'selected':''}" onclick="selectShipping('${m.id}')"><input type="radio" name="shipping" value="${m.id}" ${selectedShipping===m.id?'checked':''}><div class="option-content"><div class="option-info"><span class="option-name">${m.name}</span><span class="option-desc">${m.description}</span></div><span class="option-price ${m.price===0?'free':''}">${m.price===0?'FREE':'$'+m.price.toFixed(2)}</span></div></label>`).join('')}</div>
        <div class="step-actions"><button class="btn btn--secondary" disabled><i class="bi bi-arrow-left"></i> Back</button><button class="btn btn--primary" onclick="saveShipping(); nextStep()">Continue to Billing <i class="bi bi-arrow-right"></i></button></div>
      </div>`;
    } else if (currentStep === 2) {
      main.innerHTML = `<div class="checkout-step">
        <h2 class="step-title"><i class="bi bi-receipt"></i> Billing Information</h2>
        <label class="checkbox-label"><input type="checkbox" id="sameShip" ${sameAsShipping?'checked':''} onchange="sameAsShipping=this.checked; renderStep()"><span class="checkbox-text">Same as shipping address</span></label>
        ${!sameAsShipping ? `<form class="address-form" onsubmit="return false">
          <div class="form-row"><div class="form-group"><label class="form-label">First Name *</label><input type="text" class="form-input" id="bFirstName" placeholder="John" value="${billingAddress.firstName}"></div><div class="form-group"><label class="form-label">Last Name *</label><input type="text" class="form-input" id="bLastName" placeholder="Doe" value="${billingAddress.lastName}"></div></div>
          <div class="form-group"><label class="form-label">Street Address *</label><input type="text" class="form-input" id="bAddress" placeholder="123 Main Street" value="${billingAddress.address}"></div>
          <div class="form-group"><label class="form-label">Apartment, suite, etc.</label><input type="text" class="form-input" id="bAddress2" placeholder="Apt 4B" value="${billingAddress.address2}"></div>
          <div class="form-row form-row--three"><div class="form-group"><label class="form-label">City *</label><input type="text" class="form-input" id="bCity" placeholder="New York" value="${billingAddress.city}"></div><div class="form-group"><label class="form-label">State *</label><select class="form-select" id="bState"><option value="">Select state</option>${states.map(s=>`<option value="${s.code}" ${billingAddress.state===s.code?'selected':''}>${s.name}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">ZIP Code *</label><input type="text" class="form-input" id="bZip" placeholder="10001" value="${billingAddress.zipCode}"></div></div>
          <div class="form-group"><label class="form-label">Country *</label><select class="form-select" id="bCountry">${countries.map(c=>`<option value="${c.code}" ${billingAddress.country===c.code?'selected':''}>${c.name}</option>`).join('')}</select></div>
        </form>` : ''}
        <div class="step-actions"><button class="btn btn--secondary" onclick="prevStep()"><i class="bi bi-arrow-left"></i> Back</button><button class="btn btn--primary" onclick="saveBilling(); nextStep()">Continue to Payment <i class="bi bi-arrow-right"></i></button></div>
      </div>`;
    } else if (currentStep === 3) {
      main.innerHTML = `<div class="checkout-step">
        <h2 class="step-title"><i class="bi bi-credit-card"></i> Payment Method</h2>
        <div class="payment-methods">
          <label class="payment-option ${paymentMethod==='card'?'selected':''}" onclick="paymentMethod='card'; renderStep()"><input type="radio" name="pm" value="card" ${paymentMethod==='card'?'checked':''}><div class="option-icon"><i class="bi bi-credit-card-2-front"></i></div><span>Credit / Debit Card</span></label>
          <label class="payment-option ${paymentMethod==='paypal'?'selected':''}" onclick="paymentMethod='paypal'; renderStep()"><input type="radio" name="pm" value="paypal" ${paymentMethod==='paypal'?'checked':''}><div class="option-icon"><i class="bi bi-paypal"></i></div><span>PayPal</span></label>
        </div>
        ${paymentMethod==='card' && savedCards.length>0 ? `<div class="saved-cards"><h4 class="cards-title">Saved Cards</h4><div class="cards-list">${savedCards.map(c=>`<div class="saved-card ${selectedSavedCard===c.id?'selected':''}" onclick="selectedSavedCard='${c.id}'; renderStep()"><i class="bi bi-credit-card"></i><div class="card-info"><span class="card-brand">${c.brand}</span><span class="card-number">•••• ${c.last4}</span></div><span class="card-expiry">${c.expiry}</span>${selectedSavedCard===c.id?'<i class="bi bi-check-circle-fill selected-icon"></i>':''}</div>`).join('')}</div><button class="add-new-card" onclick="selectedSavedCard=''; renderStep()"><i class="bi bi-plus-circle"></i> Use a new card</button></div>` : ''}
        ${paymentMethod==='card' && !selectedSavedCard ? `<div class="card-form"><div class="form-group"><label class="form-label">Card Number</label><div class="card-input-wrapper"><input type="text" class="form-input card-number-input" id="cardNum" value="${paymentInfo.cardNumber}" placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatCardNum(this)"><div class="card-brand-icon" id="cardBrand"><i class="bi bi-credit-card"></i></div></div></div><div class="form-group"><label class="form-label">Cardholder Name</label><input type="text" class="form-input" id="cardName" value="${paymentInfo.cardName}" placeholder="John Doe"></div><div class="form-row"><div class="form-group"><label class="form-label">Expiry Date</label><input type="text" class="form-input" id="cardExpiry" value="${paymentInfo.expiryDate}" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)"></div><div class="form-group"><label class="form-label">CVV</label><div class="cvv-input-wrapper"><input type="text" class="form-input" id="cardCvv" value="${paymentInfo.cvv}" placeholder="123" maxlength="4"><i class="bi bi-question-circle cvv-help" title="3 or 4 digit security code"></i></div></div></div><label class="checkbox-label"><input type="checkbox" id="saveCard" ${paymentInfo.saveCard?'checked':''}><span class="checkbox-text">Save card for future purchases</span></label></div>` : ''}
        ${paymentMethod==='paypal' ? '<div class="paypal-section"><div class="paypal-info"><i class="bi bi-info-circle"></i><p>You will be redirected to PayPal to complete your payment securely.</p></div></div>' : ''}
        <div class="step-actions"><button class="btn btn--secondary" onclick="savePayment(); prevStep()"><i class="bi bi-arrow-left"></i> Back</button><button class="btn btn--primary" onclick="savePayment(); nextStep()">Review Order <i class="bi bi-arrow-right"></i></button></div>
      </div>`;
    } else if (currentStep === 4) {
      const sm = shippingMethods.find(m => m.id === selectedShipping);
      main.innerHTML = `<div class="checkout-step">
        <h2 class="step-title"><i class="bi bi-clipboard-check"></i> Review Your Order</h2>
        <div class="review-sections">
          <div class="review-section"><div class="section-header"><h4><i class="bi bi-truck"></i> Shipping Address</h4><button class="edit-btn" onclick="goToStep(1)">Edit</button></div><div class="section-content"><p>${shippingAddress.firstName} ${shippingAddress.lastName}</p><p>${shippingAddress.address}</p>${shippingAddress.address2?`<p>${shippingAddress.address2}</p>`:''}<p>${shippingAddress.city}, ${shippingAddress.state} ${shippingAddress.zipCode}</p><p>${shippingAddress.email}</p></div></div>
          <div class="review-section"><div class="section-header"><h4><i class="bi bi-receipt"></i> Billing Address</h4><button class="edit-btn" onclick="goToStep(2)">Edit</button></div><div class="section-content">${sameAsShipping?'<p class="same-address">Same as shipping address</p>':`<p>${billingAddress.firstName} ${billingAddress.lastName}</p><p>${billingAddress.address}</p>${billingAddress.address2?`<p>${billingAddress.address2}</p>`:''}<p>${billingAddress.city}, ${billingAddress.state} ${billingAddress.zipCode}</p>`}</div></div>
          <div class="review-section"><div class="section-header"><h4><i class="bi bi-credit-card"></i> Payment Method</h4><button class="edit-btn" onclick="goToStep(3)">Edit</button></div><div class="section-content">${paymentMethod==='card'?`<div class="payment-review"><i class="bi bi-credit-card-2-front"></i><span>•••• •••• •••• ${paymentInfo.cardNumber.slice(-4)||'****'}</span></div>`:`<div class="payment-review"><i class="bi bi-paypal"></i><span>PayPal</span></div>`}</div></div>
          <div class="review-section"><div class="section-header"><h4><i class="bi bi-box-seam"></i> Shipping Method</h4><button class="edit-btn" onclick="goToStep(1)">Edit</button></div><div class="section-content"><p>${sm?sm.name:''}</p><p class="muted">${sm?sm.description:''}</p></div></div>
        </div>
        <div class="order-items-review"><h4>Order Items (${cartItems.length})</h4><div class="items-list">${cartItems.map(i=>`<div class="review-item"><img src="${i.image}" alt="${i.name}"><div class="item-details"><span class="item-name">${i.name}</span><span class="item-qty">Qty: ${i.quantity}</span></div><span class="item-price">${fmt(i.price*i.quantity)}</span></div>`).join('')}</div></div>
        <div class="step-actions"><button class="btn btn--secondary" onclick="prevStep()"><i class="bi bi-arrow-left"></i> Back</button><button class="btn btn--primary btn--lg" id="placeOrderBtn" onclick="placeOrder()"><i class="bi bi-lock"></i> Place Order - ${fmt(getTotal())}</button></div>
      </div>`;
    }
  }

  function selectShipping(id) { selectedShipping = id; renderSidebar(); document.querySelectorAll('.shipping-option').forEach(el => { el.classList.toggle('selected', el.querySelector('input').value === id); }); }

  function saveShipping() {
    const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
    shippingAddress.firstName = g('sFirstName'); shippingAddress.lastName = g('sLastName');
    shippingAddress.email = g('sEmail'); shippingAddress.phone = g('sPhone');
    shippingAddress.address = g('sAddress'); shippingAddress.address2 = g('sAddress2');
    shippingAddress.city = g('sCity'); shippingAddress.state = g('sState');
    shippingAddress.zipCode = g('sZip'); shippingAddress.country = g('sCountry');
  }

  function saveBilling() {
    if (sameAsShipping) { Object.assign(billingAddress, shippingAddress); return; }
    const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
    billingAddress.firstName = g('bFirstName'); billingAddress.lastName = g('bLastName');
    billingAddress.address = g('bAddress'); billingAddress.address2 = g('bAddress2');
    billingAddress.city = g('bCity'); billingAddress.state = g('bState');
    billingAddress.zipCode = g('bZip'); billingAddress.country = g('bCountry');
  }

  function savePayment() {
    const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
    paymentInfo.cardNumber = g('cardNum'); paymentInfo.cardName = g('cardName');
    paymentInfo.expiryDate = g('cardExpiry'); paymentInfo.cvv = g('cardCvv');
    const sc = document.getElementById('saveCard'); if (sc) paymentInfo.saveCard = sc.checked;
  }

  function formatCardNum(el) { let v = el.value.replace(/\D/g,''); v = v.replace(/(.{4})/g,'$1 ').trim(); el.value = v.substring(0,19); paymentInfo.cardNumber = el.value; }
  function formatExpiry(el) { let v = el.value.replace(/\D/g,''); if(v.length>=2) v=v.substring(0,2)+'/'+v.substring(2,4); el.value=v; paymentInfo.expiryDate=el.value; }

  function nextStep() { if (currentStep < totalSteps) { currentStep++; renderStep(); } }
  function prevStep() { if (currentStep > 1) { currentStep--; renderStep(); } }
  function goToStep(s) { if (s <= currentStep) { currentStep = s; renderStep(); } }

  function placeOrder() {
    const btn = document.getElementById('placeOrderBtn');
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Processing...';
    btn.disabled = true;
    setTimeout(() => {
      const orderNum = 'ORD-' + Math.random().toString(36).substring(2,10).toUpperCase();
      document.getElementById('orderNumberDisplay').textContent = orderNum;
      document.getElementById('confirmEmail').textContent = shippingAddress.email || 'john.doe@example.com';
      document.getElementById('confirmCity').textContent = (shippingAddress.city || 'New York') + ', ' + (shippingAddress.state || 'NY');
      document.getElementById('checkoutContainer').style.display = 'none';
      document.getElementById('orderConfirmation').style.display = '';
    }, 2500);
  }

  renderStep();
</script>
</body>
</html>
