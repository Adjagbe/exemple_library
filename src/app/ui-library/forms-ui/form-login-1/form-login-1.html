<div class="fl1">
  <div class="fl1__card">
    <div class="fl1__logo">⬡</div>
    <h2 class="fl1__title">Welcome back</h2>
    <p class="fl1__sub">Sign in to your account</p>
    <form class="fl1__form" (ngSubmit)="submit()">
      <div class="fl1__field">
        <label>Email address</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="fl1__field">
        <label>Password <a href="#" class="fl1__forgot">Forgot?</a></label>
        <div class="fl1__pwd">
          <input [type]="showPwd ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="••••••••" required>
          <button type="button" class="fl1__eye" (click)="showPwd=!showPwd">{{ showPwd ? '🙈' : '👁' }}</button>
        </div>
      </div>
      <button class="fl1__submit" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Sign in →</span>
        <span *ngIf="loading" class="fl1__spin"></span>
      </button>
    </form>
    <p class="fl1__signup">Don't have an account? <a href="#">Sign up</a></p>
  </div>
</div>
