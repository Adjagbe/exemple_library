<div class="fr1">
  <div class="fr1__card">
    <h2 class="fr1__title">Create your account</h2>
    <p class="fr1__sub">Join 50,000+ developers today</p>
    <form class="fr1__form">
      <div class="fr1__row2">
        <div class="fr1__field"><label>Full name</label><input type="text" [(ngModel)]="name" name="n" placeholder="John Doe"></div>
        <div class="fr1__field"><label>Email</label><input type="email" [(ngModel)]="email" name="e" placeholder="you@example.com"></div>
      </div>
      <div class="fr1__field">
        <label>Password</label>
        <div class="fr1__pwd">
          <input [type]="showPwd?'text':'password'" [(ngModel)]="password" name="p" placeholder="Min. 8 characters">
          <button type="button" (click)="showPwd=!showPwd">{{ showPwd?'🙈':'👁' }}</button>
        </div>
        <div class="fr1__strength">
          <div [class]="'fr1__bar fr1__bar--' + (password.length > 10 ? 'strong' : password.length > 5 ? 'medium' : password.length > 0 ? 'weak' : '')"></div>
        </div>
      </div>
      <label class="fr1__agree"><input type="checkbox" [(ngModel)]="agree" name="a"> I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
      <button class="fr1__submit" type="submit" [disabled]="!agree">Create account</button>
    </form>
    <p class="fr1__login">Already have an account? <a href="#">Sign in</a></p>
  </div>
</div>
