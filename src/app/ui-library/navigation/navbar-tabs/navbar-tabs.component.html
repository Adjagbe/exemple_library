<div class="ui-navbar-showcase">
  <nav class="nbar nbar--default nbar--tabs">
    <div class="nbar-top">
      <a href="#" class="nbar-brand" (click)="$event.preventDefault()">
        <div class="nbar-logo">P</div>
        <span class="nbar-brand-name">Platform</span>
      </a>
      <div class="nbar-actions">
        <button class="nbar-icon-btn">
          <i class="bi bi-bell"></i>
          <span class="nbar-notif-dot"></span>
        </button>
        <button class="nbar-icon-btn"><i class="bi bi-gear"></i></button>
        <div class="nbar-avatar">JD</div>
      </div>
    </div>
    <div class="nbar-tabs-row">
      <a *ngFor="let tab of tabs"
         href="#"
         class="nbar-tab"
         [class.active]="tab.active"
         (click)="$event.preventDefault(); setActive(tab)">
        {{ tab.label }}
      </a>
    </div>
  </nav>
</div>
