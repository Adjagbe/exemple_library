<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Navbar - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }

    .ui-navbar-showcase { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    

    .nbar { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; border-radius: 0.75rem; transition: all 0.3s; }
    .nbar--dark { background: #111827; border: 1px solid #1f2937; }

    .nbar-brand { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; flex-shrink: 0; }
    .nbar-logo { width: 36px; height: 36px; background: linear-gradient(135deg, #4f46e5, #7c3aed); border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 1rem; flex-shrink: 0; }
    .nbar-brand-name { font-size: 1.1rem; font-weight: 700; color: #f9fafb; white-space: nowrap; }

    .nbar-nav { display: flex; align-items: center; gap: 0.125rem; }
    .nbar-link { display: flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500; color: #9ca3af; text-decoration: none; border-radius: 0.5rem; transition: all 0.2s; white-space: nowrap; cursor: pointer; }
    .nbar-link:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .nbar-link.active { color: #fff; background: rgba(79,70,229,0.2); }

    .nbar-actions { display: flex; align-items: center; gap: 0.625rem; flex-shrink: 0; }
    .nbar-search { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.875rem; background: rgba(255,255,255,0.06); border: 1px solid transparent; border-radius: 0.5rem; transition: all 0.2s; min-width: 220px; }
    .nbar-search:focus-within { background: rgba(255,255,255,0.1); border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .nbar-search i { color: #9ca3af; font-size: 0.85rem; }
    .nbar-search input { border: none; background: none; font-size: 0.8rem; color: #e5e7eb; width: 100%; outline: none; }
    .nbar-search input::placeholder { color: #9ca3af; }
    .nbar-search kbd { font-size: 0.6rem; padding: 0.125rem 0.375rem; background: rgba(255,255,255,0.1); border-radius: 0.25rem; color: #6b7280; font-family: inherit; }

    .nbar-icon-btn { position: relative; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: none; border: none; border-radius: 0.5rem; color: #9ca3af; cursor: pointer; transition: all 0.2s; font-size: 1.1rem; padding: 0; }
    .nbar-icon-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .nbar-notif-dot { position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; border: 2px solid #111827; }
    .nbar-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
    .nbar-avatar:hover { border-color: #4f46e5; }
  </style>
</head>
<body>
  <div class="ui-navbar-showcase">

    <nav class="nbar nbar--dark" id="navbar-dark">
      <a href="#" class="nbar-brand" onclick="event.preventDefault()">
        <div class="nbar-logo">P</div>
        <span class="nbar-brand-name">Platform</span>
      </a>
      <div class="nbar-nav" id="nav-links"></div>
      <div class="nbar-actions">
        <div class="nbar-search">
          <i class="bi bi-search"></i>
          <input type="text" placeholder="Rechercher..." />
          <kbd>⌘K</kbd>
        </div>
        <button class="nbar-icon-btn">
          <i class="bi bi-bell"></i>
          <span class="nbar-notif-dot"></span>
        </button>
        <div class="nbar-avatar">ML</div>
      </div>
    </nav>
  </div>

  <script>
    (function () {
      var links = [
        { label: 'Dashboard', active: true },
        { label: 'Projets', active: false },
        { label: 'Équipe', active: false },
        { label: 'Rapports', active: false }
      ];

      var container = document.getElementById('nav-links');

      function render() {
        container.innerHTML = '';
        links.forEach(function (link) {
          var a = document.createElement('a');
          a.href = '#';
          a.className = 'nbar-link' + (link.active ? ' active' : '');
          a.textContent = link.label;
          a.addEventListener('click', function (e) {
            e.preventDefault();
            links.forEach(function (l) { l.active = false; });
            link.active = true;
            render();
          });
          container.appendChild(a);
        });
      }
      render();
    })();
  </script>
</body>
</html>
