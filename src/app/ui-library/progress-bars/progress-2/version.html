<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Progress 2 – Dark Circular</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:3rem 2rem}
.pg2{display:flex;flex-wrap:wrap;gap:2.5rem;justify-content:center}
.pg2__circ{display:flex;flex-direction:column;align-items:center;gap:1rem}
.pg2__svg-wrap{position:relative;width:100px;height:100px}
.pg2__svg{width:100%;height:100%;transform:rotate(-90deg)}
.pg2__track{fill:none;stroke:rgba(255,255,255,.06);stroke-width:8}
.pg2__arc{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.pg2__center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pg2__val{font-size:1.25rem;font-weight:900;color:#f1f5f9;line-height:1}
.pg2__unit{font-size:.6rem;color:#475569;margin-top:.15rem}
.pg2__lbl{font-size:.8125rem;font-weight:600;color:#64748b;text-align:center}
</style></head>
<body>
<div class="pg2" id="pg2wrap"></div>
<script>(function(){
  var metrics=[
    {label:'CPU usage',val:72,color:'url(#g1)'},
    {label:'Memory',val:48,color:'url(#g2)'},
    {label:'Disk I/O',val:91,color:'url(#g3)'},
    {label:'Network',val:35,color:'url(#g4)'}
  ];
  var grads=[
    ['#6366f1','#a78bfa'],['#22c55e','#4ade80'],['#ef4444','#f87171'],['#f59e0b','#fbbf24']
  ];
  var wrap=document.getElementById('pg2wrap');
  var r=42, circ=2*Math.PI*r;
  metrics.forEach(function(m,i){
    var div=document.createElement('div'); div.className='pg2__circ';
    var svgWrap=document.createElement('div'); svgWrap.className='pg2__svg-wrap';
    var svgId='svgg'+i;
    var svg='<svg class="pg2__svg" viewBox="0 0 100 100">'
      +'<defs><linearGradient id="g'+(i+1)+'" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="'+grads[i][0]+'"/><stop offset="100%" stop-color="'+grads[i][1]+'"/></linearGradient></defs>'
      +'<circle class="pg2__track" cx="50" cy="50" r="'+r+'"/>'
      +'<circle class="pg2__arc" cx="50" cy="50" r="'+r+'" stroke="'+m.color+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'" id="'+svgId+'"/>'
      +'</svg>';
    var center='<div class="pg2__center"><div class="pg2__val">'+m.val+'</div><div class="pg2__unit">%</div></div>';
    svgWrap.innerHTML=svg+center;
    var lbl=document.createElement('div'); lbl.className='pg2__lbl'; lbl.textContent=m.label;
    div.appendChild(svgWrap); div.appendChild(lbl); wrap.appendChild(div);
    setTimeout(function(id,v){
      var arc=document.getElementById(id);
      var offset=circ - (v/100)*circ;
      arc.style.strokeDashoffset=offset;
    },200,svgId,m.val);
  });
})()</script>
</body></html>
