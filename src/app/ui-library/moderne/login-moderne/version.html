<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Moderne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; }

    /* ── Layout ─────────────────────── */
    .lm {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #4a0060;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    @media (max-width: 768px) {
      .lm { grid-template-columns: 1fr; padding: 3rem 1.5rem; }
    }

    /* ── Background shapes ──────────── */
    .lm__bg { position: absolute; inset: 0; pointer-events: none; }

    .lm__shape { position: absolute; }

    .lm__shape--1 {
      width: 220px; height: 260px;
      border: 3px solid #c084fc;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      top: 5%; left: 28%;
      transform: rotate(-20deg);
      opacity: .18;
    }
    .lm__shape--2 {
      width: 160px; height: 200px;
      border: 3px solid #c084fc;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      bottom: 10%; left: 32%;
      transform: rotate(30deg);
      opacity: .18;
    }
    .lm__shape--3 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(99,102,241,.45) 0%, transparent 70%);
      top: 20%; right: 5%;
      border-radius: 50%;
      opacity: .18;
    }
    .lm__shape--4 {
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(99,102,241,.35) 0%, transparent 70%);
      bottom: 5%; right: 30%;
      border-radius: 50%;
      opacity: .18;
    }
    .lm__shape--5 {
      width: 80px; height: 120px;
      border: 2.5px solid #c084fc;
      border-radius: 40px;
      top: 60%; left: 44%;
      transform: rotate(15deg);
      opacity: .12;
    }

    /* ── Left column ────────────────── */
    .lm__left {
      position: relative;
      z-index: 1;
      padding: 5rem 3rem 5rem 5%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    @media (max-width: 768px) { .lm__left { padding: 0 0 3rem; } }

    .lm__logo { margin-bottom: 2.5rem; }

    .lm__logo-icon {
      display: flex;
      gap: 4px;
    }
    .lm__logo-icon span {
      display: inline-block;
      width: 10px;
      background: #fff;
      border-radius: 2px;
    }
    .lm__logo-icon span:first-child { height: 26px; }
    .lm__logo-icon span:last-child  { height: 18px; margin-top: 8px; }

    .lm__welcome {
      font-size: clamp(3rem, 6vw, 5rem);
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
      margin-bottom: 1.5rem;
      letter-spacing: -.02em;
    }

    .lm__divider {
      width: 2.5rem;
      height: 2px;
      background: #fff;
      margin-bottom: 1.5rem;
    }

    .lm__desc {
      font-size: .9rem;
      color: rgba(255,255,255,.65);
      line-height: 1.7;
      max-width: 320px;
      margin-bottom: 2rem;
    }

    .lm__learn-btn {
      padding: .65rem 1.75rem;
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: #fff;
      font-weight: 700;
      font-size: .875rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity .2s;
      font-family: 'Inter', sans-serif;
    }
    .lm__learn-btn:hover { opacity: .85; }

    /* ── Right column ───────────────── */
    .lm__right {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 5% 4rem 2rem;
    }
    @media (max-width: 768px) { .lm__right { padding: 0; } }

    .lm__card {
      background: rgba(80, 20, 90, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }

    .lm__card-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: .375rem;
    }

    .lm__card-underline {
      width: 2.5rem;
      height: 2px;
      background: #fff;
      margin: 0 auto 2rem;
    }

    .lm__field { margin-bottom: 1.25rem; }

    .lm__label {
      display: block;
      font-size: .8125rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: .5rem;
    }

    .lm__input {
      width: 100%;
      padding: .6875rem 1rem;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 999px;
      font-size: .875rem;
      color: #fff;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s;
    }
    .lm__input::placeholder { color: rgba(255,255,255,.4); }
    .lm__input:focus { border-color: rgba(255,255,255,.4); }

    .lm__submit {
      width: 100%;
      padding: .8rem;
      background: linear-gradient(90deg, #f97316, #ef4444);
      color: #fff;
      font-weight: 800;
      font-size: .9375rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      margin-top: 1.75rem;
      transition: opacity .2s;
      font-family: 'Inter', sans-serif;
      letter-spacing: .02em;
    }
    .lm__submit:hover { opacity: .87; }

    /* ── OAuth buttons ──────────────── */
    .lm__oauth {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      margin-bottom: 1.25rem;
    }

    .lm__oauth-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .625rem;
      padding: .7rem 1rem;
      border-radius: 999px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Inter', sans-serif;
      border: none;
    }
    .lm__oauth-btn--google { background: #fff; color: #1f2937; }
    .lm__oauth-btn--google:hover { background: #f1f5f9; }
    .lm__oauth-btn--github { background: #24292e; color: #fff; }
    .lm__oauth-btn--github:hover { background: #1a1e22; }

    .lm__oauth-icon { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Separator ──────────────────── */
    .lm__separator {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.25rem;
      color: rgba(255,255,255,.3);
      font-size: .75rem;
    }
    .lm__separator::before,
    .lm__separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.15);
    }
  </style>
</head>
<body>

<section class="lm">
  <!-- Decorative background shapes -->
  <div class="lm__bg">
    <div class="lm__shape lm__shape--1"></div>
    <div class="lm__shape lm__shape--2"></div>
    <div class="lm__shape lm__shape--3"></div>
    <div class="lm__shape lm__shape--4"></div>
    <div class="lm__shape lm__shape--5"></div>
  </div>

  <!-- Left -->
  <div class="lm__left">
    <div class="lm__logo">
      <div class="lm__logo-icon">
        <span></span>
        <span></span>
      </div>
    </div>
    <h1 class="lm__welcome">Welcome!</h1>
    <div class="lm__divider"></div>
    <p class="lm__desc">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
    <button class="lm__learn-btn">Learn More</button>
  </div>

  <!-- Right: Sign in card -->
  <div class="lm__right">
    <div class="lm__card">
      <h2 class="lm__card-title">Sign in</h2>
      <div class="lm__card-underline"></div>

      <!-- OAuth buttons -->
      <div class="lm__oauth">
        <button class="lm__oauth-btn lm__oauth-btn--google" onclick="window.lmGoogle()">
          <svg class="lm__oauth-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <button class="lm__oauth-btn lm__oauth-btn--github" onclick="window.lmGithub()">
          <svg class="lm__oauth-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.607.069-.607 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
          Continue with GitHub
        </button>
      </div>

      <div class="lm__separator"><span>or sign in with email</span></div>

      <div class="lm__field">
        <label class="lm__label">User Name</label>
        <input class="lm__input" type="text" value="TechTree" id="lm-username" placeholder="Username">
      </div>

      <div class="lm__field">
        <label class="lm__label">Password</label>
        <input class="lm__input" type="password" value="secret123" id="lm-password" placeholder="Password">
      </div>

      <button class="lm__submit" onclick="window.lmSubmit()">Submit</button>
    </div>
  </div>
</section>

<script>
(function () {
  window.lmSubmit = function () {
    var u = document.getElementById('lm-username').value;
    alert('Welcome, ' + u + '!');
  };
  window.lmGoogle = function () { alert('Redirecting to Google OAuth...'); };
  window.lmGithub = function () { alert('Redirecting to GitHub OAuth...'); };
})();
</script>
