<div class="pc2">
  <div class="pc2__bg"><div class="pc2__orb"></div></div>
  <div class="pc2__inner">
    <h2 class="pc2__h">Choose your plan</h2>
    <p class="pc2__sub">Scale as you grow. No hidden fees.</p>
    <div class="pc2__grid">
      <div class="pc2__card" *ngFor="let p of plans" [class.pc2__card--hot]="p.hot" [style.--accent]="p.accent">
        <span class="pc2__hot" *ngIf="p.hot">⭐ Best value</span>
        <h3 class="pc2__name">{{ p.name }}</h3>
        <div class="pc2__price">{{ p.price }}<small>{{ p.period }}</small></div>
        <ul class="pc2__feats">
          <li *ngFor="let f of p.features">✓ {{ f }}</li>
        </ul>
        <button class="pc2__cta" [class.pc2__cta--hot]="p.hot">Get started</button>
      </div>
    </div>
  </div>
</div>
