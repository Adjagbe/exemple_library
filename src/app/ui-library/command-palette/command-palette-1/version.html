<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Command Palette 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0b0818,#0f172a);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4rem 2rem}
.cp1__hint{font-size:.875rem;color:#475569;margin-bottom:1.5rem}
.cp1__hint kbd{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:.375rem;padding:.2rem .45rem;font-size:.8125rem;font-family:inherit;color:#94a3b8}
.cp1__backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100}
.cp1__backdrop.open{display:flex;align-items:flex-start;justify-content:center;padding-top:15vh}
.cp1__modal{width:100%;max-width:560px;background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:1.25rem;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.cp1__search-row{display:flex;align-items:center;gap:.75rem;padding:.875rem 1.125rem;border-bottom:1px solid rgba(255,255,255,.06)}
.cp1__search-ico{font-size:1.125rem;color:#475569;flex-shrink:0}
.cp1__input{flex:1;background:none;border:none;font-size:1rem;font-family:inherit;color:#f1f5f9;outline:none}
.cp1__input::placeholder{color:#475569}
.cp1__esc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:.375rem;padding:.15rem .5rem;font-size:.6875rem;color:#475569;cursor:pointer;font-family:inherit}
.cp1__section{padding:.5rem 0}
.cp1__section-lbl{font-size:.6875rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#475569;padding:.5rem 1.125rem .35rem}
.cp1__item{display:flex;align-items:center;gap:.875rem;padding:.625rem 1.125rem;cursor:pointer;transition:background .15s}
.cp1__item:hover,.cp1__item.active{background:rgba(99,102,241,.12)}
.cp1__item-ico{width:2rem;height:2rem;border-radius:.5rem;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.cp1__item-text{flex:1;min-width:0}
.cp1__item-label{font-size:.9rem;font-weight:600;color:#e2e8f0}
.cp1__item-sub{font-size:.75rem;color:#64748b;margin-top:.1rem}
.cp1__item-kbd{display:flex;gap:.2rem;flex-shrink:0}
.cp1__item-kbd kbd{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:.3rem;padding:.1rem .35rem;font-size:.6875rem;color:#64748b;font-family:inherit}
.cp1__footer{display:flex;gap:1.25rem;padding:.625rem 1.125rem;border-top:1px solid rgba(255,255,255,.05);font-size:.6875rem;color:#475569}
.cp1__footer span{display:flex;align-items:center;gap:.3rem}
.cp1__footer kbd{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:.3rem;padding:.1rem .35rem;font-size:.6875rem;font-family:inherit;color:#64748b}
.cp1__open-btn{padding:.75rem 1.75rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:.875rem;color:#94a3b8;font-size:.9375rem;font-family:inherit;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.75rem}
.cp1__open-btn:hover{background:rgba(255,255,255,.1)}
</style></head>
<body>
<p class="cp1__hint">Press <kbd>⌘</kbd><kbd>K</kbd> or click below</p>
<button class="cp1__open-btn" onclick="window.cpOpen()">
  <span>🔍</span><span>Search or run a command...</span><span style="margin-left:auto;display:flex;gap:.2rem"><kbd style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:.3rem;padding:.1rem .35rem;font-size:.6875rem;color:#64748b;font-family:Inter,sans-serif">⌘</kbd><kbd style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:.3rem;padding:.1rem .35rem;font-size:.6875rem;color:#64748b;font-family:Inter,sans-serif">K</kbd></span>
</button>
<div class="cp1__backdrop" id="cpback" onclick="window.cpClose()">
  <div class="cp1__modal" onclick="event.stopPropagation()">
    <div class="cp1__search-row">
      <span class="cp1__search-ico">🔍</span>
      <input class="cp1__input" placeholder="Search commands, pages, people..." id="cpinput" oninput="window.cpFilter(this.value)">
      <button class="cp1__esc" onclick="window.cpClose()">Esc</button>
    </div>
    <div id="cpbody">
      <div class="cp1__section">
        <div class="cp1__section-lbl">Navigation</div>
        <div class="cp1__item"><div class="cp1__item-ico">📊</div><div class="cp1__item-text"><div class="cp1__item-label">Go to Dashboard</div><div class="cp1__item-sub">Overview & analytics</div></div><div class="cp1__item-kbd"><kbd>G</kbd><kbd>D</kbd></div></div>
        <div class="cp1__item"><div class="cp1__item-ico">👥</div><div class="cp1__item-text"><div class="cp1__item-label">Team settings</div><div class="cp1__item-sub">Manage members</div></div></div>
        <div class="cp1__item"><div class="cp1__item-ico">📦</div><div class="cp1__item-text"><div class="cp1__item-label">All projects</div></div></div>
      </div>
      <div class="cp1__section">
        <div class="cp1__section-lbl">Actions</div>
        <div class="cp1__item"><div class="cp1__item-ico">➕</div><div class="cp1__item-text"><div class="cp1__item-label">New project</div></div><div class="cp1__item-kbd"><kbd>⌘</kbd><kbd>N</kbd></div></div>
        <div class="cp1__item"><div class="cp1__item-ico">🚀</div><div class="cp1__item-text"><div class="cp1__item-label">Deploy to production</div></div></div>
        <div class="cp1__item"><div class="cp1__item-ico">🌙</div><div class="cp1__item-text"><div class="cp1__item-label">Toggle dark mode</div></div></div>
      </div>
    </div>
    <div class="cp1__footer">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span><kbd>↵</kbd> select</span>
      <span><kbd>Esc</kbd> close</span>
    </div>
  </div>
</div>
<script>(function(){
  window.cpOpen = function(){ document.getElementById('cpback').classList.add('open'); setTimeout(function(){document.getElementById('cpinput').focus();},50); };
  window.cpClose = function(){ document.getElementById('cpback').classList.remove('open'); document.getElementById('cpinput').value=''; };
  window.cpFilter = function(v){ /* filter items based on v */ };
  document.addEventListener('keydown', function(e){ if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();window.cpOpen();} if(e.key==='Escape') window.cpClose(); });
})()</script>
</body></html>
