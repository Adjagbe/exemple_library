    <span class="cb1__title">We value your privacy</span>
  </div>
  <p class="cb1__text">
    We use cookies to enhance your experience, analyze traffic, and personalize content.
    You can manage your preferences below. <a href="#" class="cb1__link">Learn more</a>
  </p>
  <div class="cb1__toggles">
    <div class="cb1__row">
      <div class="cb1__row-info">
        <span class="cb1__row-label">Necessary</span>Required for the site to function
      </div>
      <label class="cb1__switch">
        <input type="checkbox" checked disabled>
        <span class="cb1__slider"></span>
      </label>
    </div>
    <div class="cb1__row">
      <div class="cb1__row-info">
        <span class="cb1__row-label">Analytics</span>Help us improve our services
      </div>
      <label class="cb1__switch">
        <input type="checkbox" [(ngModel)]="analytics">
        <span class="cb1__slider"></span>
      </label>
    </div>
    <div class="cb1__row">
      <div class="cb1__row-info">
        <span class="cb1__row-label">Marketing</span>Personalized ads &amp; content
      </div>
      <label class="cb1__switch">
        <input type="checkbox" [(ngModel)]="marketing">
        <span class="cb1__slider"></span>
      </label>
    </div>
  </div>
  <div class="cb1__actions">
    <button class="cb1__btn-all" (click)="acceptAll()">Accept all</button>
    <button class="cb1__btn-sel" (click)="saveSelection()">Save preferences</button>
    <button class="cb1__btn-rej" (click)="rejectAll()">Reject all</button>
  </div>
</div>
