<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cookie Banner 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8fafc;min-height:700px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:1.5rem}
.cb1-demo-lbl{font-size:.875rem;color:#94a3b8;font-weight:500}
.cb1-btn-show{padding:.75rem 1.5rem;background:#4f46e5;color:#fff;font-weight:700;font-size:.875rem;border:none;border-radius:.875rem;cursor:pointer;transition:background .2s}
.cb1-btn-show:hover{background:#4338ca}
/* Banner */
.cb1{position:fixed;bottom:1.5rem;left:1.5rem;right:1.5rem;max-width:700px;margin:0 auto;background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:1.25rem;padding:1.5rem;box-shadow:0 16px 48px rgba(0,0,0,.25);display:none;z-index:9999;animation:slideUp .35s ease}
.cb1.show{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.cb1__head{display:flex;align-items:center;gap:.75rem;margin-bottom:.875rem}
.cb1__ico{font-size:1.5rem}
.cb1__title{font-size:1rem;font-weight:800;color:#f1f5f9}
.cb1__text{font-size:.8125rem;color:#94a3b8;line-height:1.65;margin-bottom:1.25rem}
.cb1__text a{color:#818cf8;text-decoration:none}
.cb1__toggles{display:flex;flex-direction:column;gap:.625rem;margin-bottom:1.25rem}
.cb1__row{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:rgba(255,255,255,.04);border-radius:.75rem}
.cb1__row-info{font-size:.8125rem;color:#94a3b8}
.cb1__row-label{font-weight:600;color:#e2e8f0;margin-right:.375rem}
.cb1__switch{position:relative;width:2.75rem;height:1.5rem;flex-shrink:0}
.cb1__switch input{opacity:0;width:0;height:0}
.cb1__slider{position:absolute;cursor:pointer;inset:0;background:#334155;border-radius:999px;transition:.3s}
.cb1__slider::before{content:'';position:absolute;height:1.1rem;width:1.1rem;left:.2rem;top:.2rem;background:#fff;border-radius:50%;transition:.3s}
input:checked+.cb1__slider{background:#6366f1}
input:checked+.cb1__slider::before{transform:translateX(1.25rem)}
input:disabled+.cb1__slider{opacity:.5;cursor:not-allowed}
.cb1__actions{display:flex;gap:.75rem;flex-wrap:wrap}
.cb1__btn-all{flex:1;padding:.7rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-weight:700;font-size:.875rem;border:none;border-radius:.875rem;cursor:pointer;transition:opacity .2s}
.cb1__btn-all:hover{opacity:.85}
.cb1__btn-sel{flex:1;padding:.7rem;background:rgba(255,255,255,.06);color:#94a3b8;font-weight:600;font-size:.875rem;border:1px solid rgba(255,255,255,.08);border-radius:.875rem;cursor:pointer;transition:all .2s}
.cb1__btn-sel:hover{background:rgba(255,255,255,.1)}
.cb1__btn-rej{padding:.7rem 1.25rem;background:none;color:#475569;font-weight:600;font-size:.875rem;border:none;cursor:pointer;font-family:inherit;transition:color .2s}
.cb1__btn-rej:hover{color:#94a3b8}
</style></head>
<body>
<p class="cb1-demo-lbl">Cookie banner demo</p>
<button class="cb1-btn-show" onclick="window.cbShow()">Show cookie banner</button>
<div class="cb1" id="cb1">
  <div class="cb1__head"><span class="cb1__ico">

  </span><span class="cb1__title">We value your privacy</span></div>
  <p class="cb1__text">We use cookies to enhance your experience, analyze traffic, and personalize content. You can manage your preferences below. <a href="#">Learn more</a></p>
  <div class="cb1__toggles">
    <div class="cb1__row"><div class="cb1__row-info"><span class="cb1__row-label">Necessary</span>Required for the site to function</div><label class="cb1__switch"><input type="checkbox" checked disabled><span class="cb1__slider"></span></label></div>
    <div class="cb1__row"><div class="cb1__row-info"><span class="cb1__row-label">Analytics</span>Help us improve our services</div><label class="cb1__switch"><input type="checkbox" id="cb1-analytics"><span class="cb1__slider"></span></label></div>
    <div class="cb1__row"><div class="cb1__row-info"><span class="cb1__row-label">Marketing</span>Personalized ads & content</div><label class="cb1__switch"><input type="checkbox" id="cb1-marketing"><span class="cb1__slider"></span></label></div>
  </div>
  <div class="cb1__actions">
    <button class="cb1__btn-all" onclick="window.cbAcceptAll()">Accept all</button>
    <button class="cb1__btn-sel" onclick="window.cbSaveSelection()">Save preferences</button>
    <button class="cb1__btn-rej" onclick="window.cbReject()">Reject all</button>
  </div>
</div>
<script>(function(){
  window.cbShow = function(){ document.getElementById('cb1').classList.add('show'); };
  window.cbClose = function(){ document.getElementById('cb1').classList.remove('show'); };
  window.cbAcceptAll = function(){ document.getElementById('cb1-analytics').checked=true; document.getElementById('cb1-marketing').checked=true; window.cbClose(); };
  window.cbSaveSelection = function(){ window.cbClose(); };
  window.cbReject = function(){ document.getElementById('cb1-analytics').checked=false; document.getElementById('cb1-marketing').checked=false; window.cbClose(); };
  setTimeout(function(){ window.cbShow(); }, 800);
})()</script>
</body></html>
