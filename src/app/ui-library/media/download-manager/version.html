<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionnaire de téléchargements - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:#f3f4f6;min-height:100vh}

    .download-showcase{max-width:900px;margin:0 auto;padding:2rem}
    .page-title{font-size:2rem;font-weight:700;color:#111827;margin:0 0 .5rem}
    .page-subtitle{color:#6b7280;margin:0 0 2rem}

    .featured-download{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:1rem;padding:2rem;color:#fff}
    .featured-content{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem}
    .featured-icon{width:64px;height:64px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);border-radius:1rem;flex-shrink:0}
    .featured-icon i{font-size:1.75rem}
    .featured-info{flex:1}
    .featured-info h2{margin:0 0 .375rem;font-size:1.5rem;font-weight:700}
    .featured-info p{margin:0 0 .75rem;opacity:.9;font-size:.9375rem}
    .featured-meta{display:flex;gap:1.5rem;font-size:.8125rem;opacity:.8}
    .featured-meta span{display:flex;align-items:center;gap:.375rem}
    .featured-action{text-align:center}
    .download-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.25rem;background:#fff;border:none;border-radius:.5rem;font-weight:600;font-size:.9375rem;color:#4f46e5;cursor:pointer;transition:all .2s}
    .download-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,.2)}
    .download-btn--large{padding:1rem 2rem;font-size:1rem}
    .download-size{display:block;margin-top:.5rem;font-size:.75rem;opacity:.8}
    .platform-buttons{display:flex;gap:.75rem;flex-wrap:wrap}
    .platform-btn{display:flex;align-items:center;gap:.5rem;padding:.625rem 1rem;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:.5rem;color:#fff;font-size:.875rem;cursor:pointer;transition:all .2s}
    .platform-btn small{opacity:.7}
    .platform-btn:hover{background:rgba(255,255,255,.25)}

    @media(max-width:768px){
      .featured-content{flex-direction:column;text-align:center}
      .featured-meta{justify-content:center}
      .platform-buttons{justify-content:center}
    }
  </style>
</head>
<body>

<div class="download-showcase">
  <h1 class="page-title">Téléchargements</h1>
  <p class="page-subtitle">Gestionnaire de téléchargements</p>

  <section class="featured-download">
    <div class="featured-content">
      <div class="featured-icon"><i class="bi bi-box-seam"></i></div>
      <div class="featured-info">
        <h2>Application Premium v2.4.0</h2>
        <p>La dernière version avec toutes les nouvelles fonctionnalités</p>
        <div class="featured-meta">
          <span><i class="bi bi-calendar3"></i> 15 Janvier 2024</span>
          <span><i class="bi bi-download"></i> 12.4k téléchargements</span>
        </div>
      </div>
      <div class="featured-action">
        <button class="download-btn download-btn--large"><i class="bi bi-download"></i> Télécharger</button>
        <span class="download-size">124 MB</span>
      </div>
    </div>
    <div class="platform-buttons" id="platformButtons"></div>
  </section>
</div>

<script>
(function(){
var platformDownloads = [
  { platform: 'Windows', icon: 'bi-windows', size: '124 MB' },
  { platform: 'macOS', icon: 'bi-apple', size: '118 MB' },
  { platform: 'Linux', icon: 'bi-ubuntu', size: '98 MB' },
  { platform: 'Source', icon: 'bi-code-square', size: '45 MB' }
];

document.getElementById('platformButtons').innerHTML = platformDownloads.map(function(p) {
  return '<button class="platform-btn"><i class="bi '+p.icon+'"></i><span>'+p.platform+'</span><small>'+p.size+'</small></button>';
}).join('');
})();
</script>

</body>
</html>
