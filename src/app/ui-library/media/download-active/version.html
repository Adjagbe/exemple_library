<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Téléchargements actifs - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:#f3f4f6;min-height:100vh}

    .download-active-showcase{max-width:900px;margin:0 auto;padding:2rem}
    .section-title{font-size:1.125rem;font-weight:600;color:#374151;margin:0 0 1rem}

    .active-downloads{display:flex;flex-direction:column;gap:.75rem}
    .download-item{display:flex;align-items:center;gap:1rem;padding:1rem;background:#fff;border:1px solid #e5e7eb;border-radius:.75rem;transition:all .2s}
    .download-item:hover{box-shadow:0 2px 10px rgba(0,0,0,.05)}
    .download-item:hover .download-actions{opacity:1}
    .download-item.completed{background:#f0fdf4;border-color:#bbf7d0}
    .download-item.completed .download-icon{color:#10b981}
    .download-item.paused .progress-fill{background:#f59e0b}
    .download-icon{display:flex;align-items:center;justify-content:center;width:40px;height:40px;background:#f3f4f6;border-radius:.5rem;color:#4f46e5;flex-shrink:0}
    .download-icon i{font-size:1.125rem}
    .download-info{flex:1;min-width:0}
    .download-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
    .download-name{font-weight:600;color:#111827;font-size:.9375rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .download-speed{font-size:.75rem;color:#10b981;font-weight:600}
    .download-progress{display:flex;align-items:center;gap:.75rem}
    .progress-bar{flex:1;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#4f46e5,#7c3aed);border-radius:3px;transition:width .3s}
    .progress-fill.completed{background:#10b981}
    .progress-fill.paused{background:#f59e0b}
    .progress-text{font-size:.75rem;color:#6b7280;white-space:nowrap}
    .download-actions{display:flex;gap:.25rem;opacity:0;transition:opacity .2s}
    .action-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:#f3f4f6;border:none;border-radius:.375rem;color:#6b7280;cursor:pointer;transition:all .2s}
    .action-btn:hover{background:#e5e7eb;color:#374151}
    .action-btn--danger:hover{background:#fee2e2;color:#ef4444}

    @media(max-width:768px){.download-actions{opacity:1}}
  </style>
</head>
<body>

<div class="download-active-showcase">
  <h2 class="section-title">Téléchargements actifs</h2>
  <div class="active-downloads" id="activeDownloads"></div>
</div>

<script>
(function(){
var activeDownloads = [
  { id: '1', name: 'Application-v2.4.0.dmg', size: 124000000, downloaded: 87000000, speed: '2.4 MB/s', status: 'downloading' },
  { id: '2', name: 'Documentation.pdf', size: 8500000, downloaded: 8500000, speed: '-', status: 'completed' },
  { id: '3', name: 'SDK-v3.1.0.zip', size: 45000000, downloaded: 15000000, speed: '-', status: 'paused' }
];

function formatSize(bytes) {
  if (bytes === 0) return '0 B';
  var k = 1024;
  var sizes = ['B', 'KB', 'MB', 'GB'];
  var i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function getProgress(d) {
  return (d.downloaded / d.size) * 100;
}

function renderActiveDownloads() {
  var container = document.getElementById('activeDownloads');
  container.innerHTML = activeDownloads.map(function(d) {
    return '<div class="download-item '+(d.status==='completed'?'completed':'')+' '+(d.status==='paused'?'paused':'')+'">' +
      '<div class="download-icon"><i class="bi '+(d.status==='completed'?'bi-check-circle-fill':'bi-file-earmark-arrow-down')+'"></i></div>' +
      '<div class="download-info">' +
        '<div class="download-header">' +
          '<span class="download-name">'+d.name+'</span>' +
          (d.status==='downloading'?'<span class="download-speed">'+d.speed+'</span>':'') +
        '</div>' +
        '<div class="download-progress">' +
          '<div class="progress-bar"><div class="progress-fill '+(d.status==='completed'?'completed':'')+' '+(d.status==='paused'?'paused':'')+'" style="width:'+getProgress(d)+'%"></div></div>' +
          '<span class="progress-text">'+formatSize(d.downloaded)+' / '+formatSize(d.size)+'</span>' +
        '</div>' +
      '</div>' +
      '<div class="download-actions">' +
        (d.status==='downloading'?'<button class="action-btn" onclick="pauseDownload(\''+d.id+'\')" title="Pause"><i class="bi bi-pause-fill"></i></button>':'') +
        (d.status==='paused'?'<button class="action-btn" onclick="resumeDownload(\''+d.id+'\')" title="Reprendre"><i class="bi bi-play-fill"></i></button>':'') +
        (d.status==='completed'?'<button class="action-btn" title="Ouvrir le dossier"><i class="bi bi-folder2-open"></i></button>':'') +
        '<button class="action-btn action-btn--danger" onclick="cancelDownload(\''+d.id+'\')" title="Annuler"><i class="bi bi-x-lg"></i></button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function pauseDownload(id) {
  var d = activeDownloads.find(function(x){return x.id===id});
  if (d) { d.status = 'paused'; renderActiveDownloads(); }
}

function resumeDownload(id) {
  var d = activeDownloads.find(function(x){return x.id===id});
  if (d) { d.status = 'downloading'; renderActiveDownloads(); }
}

function cancelDownload(id) {
  activeDownloads = activeDownloads.filter(function(x){return x.id!==id});
  renderActiveDownloads();
}

window.pauseDownload = pauseDownload;
window.resumeDownload = resumeDownload;
window.cancelDownload = cancelDownload;

renderActiveDownloads();
})();
</script>

</body>
</html>
