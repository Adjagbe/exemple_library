<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Profile Card 2 – Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#06060f;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:3rem 2rem}
.pc2{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:1.5rem;padding:2rem;width:100%;max-width:360px}
.pc2__top{display:flex;gap:1.125rem;align-items:flex-start;margin-bottom:1.5rem}
.pc2__avatar{width:4rem;height:4rem;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;color:#fff;flex-shrink:0}
.pc2__info-name{font-size:1.0625rem;font-weight:800;color:#f1f5f9}
.pc2__info-role{font-size:.8125rem;color:#64748b;margin-top:.2rem}
.pc2__tags{display:flex;flex-wrap:wrap;gap:.375rem;margin-top:.625rem}
.pc2__tag{font-size:.6875rem;font-weight:600;padding:.2rem .5rem;border-radius:999px;background:rgba(99,102,241,.15);color:#a5b4fc}
.pc2__bio{font-size:.875rem;color:#94a3b8;line-height:1.65;margin-bottom:1.5rem}
.pc2__skills{margin-bottom:1.5rem}
.pc2__skill-lbl{font-size:.75rem;color:#64748b;font-weight:600;margin-bottom:.5rem}
.pc2__skill{margin-bottom:.625rem}
.pc2__skill-name{display:flex;justify-content:space-between;font-size:.8125rem;color:#94a3b8;margin-bottom:.3rem}
.pc2__bar-t{height:5px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.pc2__bar-f{height:100%;border-radius:999px;background:linear-gradient(to right,#6366f1,#a78bfa)}
.pc2__actions{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.pc2__btn-a{padding:.75rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-weight:700;font-size:.875rem;border:none;border-radius:.875rem;cursor:pointer;transition:opacity .2s}
.pc2__btn-a:hover{opacity:.85}
.pc2__btn-b{padding:.75rem;background:rgba(255,255,255,.06);color:#94a3b8;font-weight:600;font-size:.875rem;border:1px solid rgba(255,255,255,.1);border-radius:.875rem;cursor:pointer}
</style></head>
<body>
<div class="pc2">
  <div class="pc2__top">
    <div class="pc2__avatar">AL</div>
    <div>
      <div class="pc2__info-name">Alex Liu</div>
      <div class="pc2__info-role">Full-Stack Developer · Remote</div>
      <div class="pc2__tags"><span class="pc2__tag">React</span><span class="pc2__tag">Node.js</span><span class="pc2__tag">TypeScript</span></div>
    </div>
  </div>
  <p class="pc2__bio">Passionate about building scalable SaaS products. 8+ years shipping user-centric applications at startups and scale-ups.</p>
  <div class="pc2__skills">
    <div class="pc2__skill-lbl">Skills</div>
    <div class="pc2__skill"><div class="pc2__skill-name"><span>Frontend</span><span>95%</span></div><div class="pc2__bar-t"><div class="pc2__bar-f" style="width:95%"></div></div></div>
    <div class="pc2__skill"><div class="pc2__skill-name"><span>Backend</span><span>80%</span></div><div class="pc2__bar-t"><div class="pc2__bar-f" style="width:80%"></div></div></div>
    <div class="pc2__skill"><div class="pc2__skill-name"><span>DevOps</span><span>65%</span></div><div class="pc2__bar-t"><div class="pc2__bar-f" style="width:65%"></div></div></div>
  </div>
  <div class="pc2__actions">
    <button class="pc2__btn-a">View profile</button>
    <button class="pc2__btn-b">Send message</button>
  </div>
</div>
<script>(function(){})()</script>
</body></html>
