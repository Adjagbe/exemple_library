<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════ */
    /* SEARCH COMPONENT - Premium UI Library                           */
    /* ═══════════════════════════════════════════════════════════════ */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f8fafc;
      line-height: 1.5;
    }

    .search-showcase {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      color: #111827;
      margin: 0 0 0.5rem 0;
    }

    .page-subtitle {
      color: #6b7280;
      margin: 0 0 2rem 0;
    }

    .showcase-section {
      margin-bottom: 3rem;
    }

    .section-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: #374151;
      margin: 0 0 1.5rem 0;
    }

    /* ─────────────────────────────────────────────────────────────────
       SEARCH CONTAINER
       ───────────────────────────────────────────────────────────────── */
    .search-container {
      position: relative;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.25rem;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 1rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
    }

    .search-box:hover {
      border-color: #d1d5db;
    }

    .search-box.active {
      border-color: #4f46e5;
      box-shadow: 0 4px 20px rgba(79, 70, 229, 0.15);
    }

    .search-icon {
      color: #9ca3af;
      font-size: 1.125rem;
    }

    .search-input {
      flex: 1;
      border: none;
      background: none;
      font-size: 1rem;
      color: #111827;
    }

    .search-input::placeholder {
      color: #9ca3af;
    }

    .search-input:focus {
      outline: none;
    }

    .search-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .clear-btn {
      padding: 0.375rem;
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      border-radius: 0.25rem;
    }

    .clear-btn:hover {
      background: #f3f4f6;
      color: #374151;
    }

    .search-shortcut {
      padding: 0.25rem 0.5rem;
      background: #f3f4f6;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      color: #6b7280;
      font-family: monospace;
    }

    /* ─────────────────────────────────────────────────────────────────
       DROPDOWN
       ───────────────────────────────────────────────────────────────── */
    .search-dropdown {
      position: absolute;
      top: calc(100% + 0.5rem);
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 1rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      z-index: 100;
      overflow: hidden;
      display: none;
    }

    .search-dropdown.open {
      display: block;
    }

    .dropdown-content {
      padding: 0.5rem;
    }

    .suggestion-section {
      padding: 0.5rem;
    }

    .suggestion-section:not(:last-child) {
      border-bottom: 1px solid #f3f4f6;
      margin-bottom: 0.5rem;
      padding-bottom: 1rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.25rem;
    }

    .section-header span {
      font-size: 0.7rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .clear-all-btn {
      background: none;
      border: none;
      font-size: 0.75rem;
      color: #4f46e5;
      cursor: pointer;
    }

    .clear-all-btn:hover {
      text-decoration: underline;
    }

    .suggestion-list {
      display: flex;
      flex-direction: column;
    }

    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .suggestion-item:hover {
      background: #f9fafb;
    }

    .suggestion-item > i:first-child {
      color: #9ca3af;
    }

    .suggestion-item span {
      flex: 1;
      color: #374151;
    }

    .suggestion-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .suggestion-text {
      color: #374151;
    }

    .suggestion-meta {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .suggestion-action {
      color: #d1d5db;
      transform: rotate(-45deg);
    }

    .remove-btn {
      padding: 0.25rem;
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      border-radius: 0.25rem;
      opacity: 0;
      transition: all 0.15s ease;
    }

    .suggestion-item:hover .remove-btn {
      opacity: 1;
    }

    .remove-btn:hover {
      background: #fee2e2;
      color: #ef4444;
    }

    .no-suggestions {
      text-align: center;
      padding: 2rem;
    }

    .no-suggestions i {
      font-size: 2rem;
      color: #d1d5db;
      margin-bottom: 0.5rem;
      display: block;
    }

    .no-suggestions p {
      color: #6b7280;
      margin: 0;
    }

    /* ─────────────────────────────────────────────────────────────────
       RESULTS
       ───────────────────────────────────────────────────────────────── */
    .results-container {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #f3f4f6;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .results-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .results-count {
      font-weight: 600;
      color: #111827;
    }

    .results-query {
      color: #6b7280;
    }

    .results-tabs {
      display: flex;
      gap: 0.25rem;
    }

    .tab-btn {
      padding: 0.5rem 1rem;
      background: none;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-btn:hover {
      background: #f3f4f6;
    }

    .tab-btn.active {
      background: #eff6ff;
      color: #4f46e5;
      font-weight: 600;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      padding: 1.5rem;
    }

    .result-card {
      display: flex;
      flex-direction: column;
      background: #f9fafb;
      border-radius: 0.75rem;
      overflow: hidden;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .result-card:hover {
      background: #f3f4f6;
      transform: translateY(-2px);
    }

    .result-image {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 120px;
      background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
    }

    .result-image i {
      font-size: 2.5rem;
      color: #9ca3af;
    }

    .result-content {
      padding: 1rem;
    }

    .result-category {
      font-size: 0.7rem;
      font-weight: 600;
      color: #4f46e5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .result-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111827;
      margin: 0.25rem 0;
    }

    .result-description {
      font-size: 0.8rem;
      color: #6b7280;
      margin: 0 0 0.75rem 0;
      line-height: 1.4;
    }

    .result-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-price {
      font-size: 1rem;
      font-weight: 700;
      color: #111827;
    }

    .result-rating {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .result-rating i {
      color: #fbbf24;
    }

    /* ─────────────────────────────────────────────────────────────────
       RESPONSIVE
       ───────────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .search-showcase {
        padding: 1rem;
      }

      .results-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .results-tabs {
        width: 100%;
        overflow-x: auto;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="search-showcase">
    <h1 class="page-title">Recherche</h1>
    <p class="page-subtitle">Composant de recherche avancée avec suggestions</p>

    <!-- Main Search -->
    <section class="showcase-section">
      <h2 class="section-title">Recherche avec suggestions</h2>
      
      <div class="search-container">
        <div class="search-box" id="searchBox">
          <i class="bi bi-search search-icon"></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Rechercher des produits, catégories..."
            class="search-input"
          >
          <div class="search-actions">
            <button class="clear-btn" id="clearBtn" style="display: none;">
              <i class="bi bi-x-lg"></i>
            </button>
            <span class="search-shortcut">⌘K</span>
          </div>
        </div>

        <div class="search-dropdown" id="searchDropdown">
          <!-- Empty state with recent & popular -->
          <div class="dropdown-content" id="defaultSuggestions">
            <!-- Recent Searches -->
            <div class="suggestion-section" id="recentSection">
              <div class="section-header">
                <span>Recherches récentes</span>
                <button class="clear-all-btn" onclick="clearRecentSearches()">Effacer</button>
              </div>
              <div class="suggestion-list" id="recentList"></div>
            </div>

            <!-- Popular Searches -->
            <div class="suggestion-section">
              <div class="section-header">
                <span>Tendances</span>
              </div>
              <div class="suggestion-list" id="popularList"></div>
            </div>
          </div>

          <!-- Search suggestions -->
          <div class="dropdown-content" id="searchSuggestions" style="display: none;">
            <div class="suggestion-list" id="suggestionList"></div>
            <div class="no-suggestions" id="noSuggestions" style="display: none;">
              <i class="bi bi-search"></i>
              <p id="noSuggestionsText">Aucune suggestion pour ""</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Search Results -->
    <section class="showcase-section">
      <h2 class="section-title">Résultats de recherche</h2>
      
      <div class="results-container">
        <!-- Results Header -->
        <div class="results-header">
          <div class="results-info">
            <span class="results-count">156 résultats</span>
            <span class="results-query">pour "MacBook"</span>
          </div>
          <div class="results-tabs" id="resultsTabs"></div>
        </div>

        <!-- Results Grid -->
        <div class="results-grid" id="resultsGrid"></div>
      </div>
    </section>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // SEARCH COMPONENT - Premium UI Library
    // ═══════════════════════════════════════════════════════════════

    // ─────────────────────────────────────────────────────────────────
    // DATA
    // ─────────────────────────────────────────────────────────────────
    let recentSearches = [
      { id: '1', text: 'MacBook Pro', type: 'recent', icon: 'bi-clock-history' },
      { id: '2', text: 'iPhone 15', type: 'recent', icon: 'bi-clock-history' },
      { id: '3', text: 'Casque audio', type: 'recent', icon: 'bi-clock-history' }
    ];

    const popularSearches = [
      { id: '1', text: 'Écouteurs sans fil', type: 'popular', icon: 'bi-fire' },
      { id: '2', text: 'Tablettes', type: 'popular', icon: 'bi-fire' },
      { id: '3', text: 'Montres connectées', type: 'popular', icon: 'bi-fire' }
    ];

    const suggestions = [
      { id: '1', text: 'MacBook Pro 16"', type: 'product', meta: 'Électronique' },
      { id: '2', text: 'MacBook Air M2', type: 'product', meta: 'Électronique' },
      { id: '3', text: 'Mac Mini', type: 'product', meta: 'Électronique' },
      { id: '4', text: 'Accessoires Mac', type: 'category', icon: 'bi-folder' }
    ];

    const searchResults = [
      { id: '1', title: 'MacBook Pro 16" M3 Pro', description: '36 Go RAM, 512 Go SSD, Puce M3 Pro', category: 'Électronique', price: 2999.99, rating: 4.8 },
      { id: '2', title: 'MacBook Pro 14" M3', description: '18 Go RAM, 512 Go SSD, Puce M3', category: 'Électronique', price: 2199.99, rating: 4.7 },
      { id: '3', title: 'MacBook Air 15" M3', description: '8 Go RAM, 256 Go SSD, Puce M3', category: 'Électronique', price: 1499.99, rating: 4.6 },
      { id: '4', title: 'Coque MacBook Pro 16"', description: 'Protection rigide transparente', category: 'Accessoires', price: 39.99, rating: 4.2 }
    ];

    const tabs = [
      { id: 'all', label: 'Tous' },
      { id: 'products', label: 'Produits' },
      { id: 'categories', label: 'Catégories' },
      { id: 'users', label: 'Utilisateurs' }
    ];

    let activeTab = 'all';
    let searchQuery = '';
    let isSearchOpen = false;

    // ─────────────────────────────────────────────────────────────────
    // DOM ELEMENTS
    // ─────────────────────────────────────────────────────────────────
    const searchBox = document.getElementById('searchBox');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const searchDropdown = document.getElementById('searchDropdown');
    const defaultSuggestions = document.getElementById('defaultSuggestions');
    const searchSuggestions = document.getElementById('searchSuggestions');
    const suggestionList = document.getElementById('suggestionList');
    const noSuggestions = document.getElementById('noSuggestions');
    const noSuggestionsText = document.getElementById('noSuggestionsText');

    // ─────────────────────────────────────────────────────────────────
    // RENDER FUNCTIONS
    // ─────────────────────────────────────────────────────────────────
    function renderRecentSearches() {
      const recentList = document.getElementById('recentList');
      const recentSection = document.getElementById('recentSection');

      if (recentSearches.length === 0) {
        recentSection.style.display = 'none';
        return;
      }

      recentSection.style.display = 'block';
      recentList.innerHTML = recentSearches.map(item => `
        <div class="suggestion-item" onclick="selectSuggestion('${item.text}')">
          <i class="bi ${item.icon || 'bi-search'}"></i>
          <span>${item.text}</span>
          <button class="remove-btn" onclick="removeRecentSearch('${item.id}'); event.stopPropagation();">
            <i class="bi bi-x"></i>
          </button>
        </div>
      `).join('');
    }

    function renderPopularSearches() {
      const popularList = document.getElementById('popularList');
      popularList.innerHTML = popularSearches.map(item => `
        <div class="suggestion-item" onclick="selectSuggestion('${item.text}')">
          <i class="bi ${item.icon || 'bi-search'}"></i>
          <span>${item.text}</span>
        </div>
      `).join('');
    }

    function renderSuggestions() {
      const query = searchQuery.toLowerCase();
      const filtered = suggestions.filter(s => s.text.toLowerCase().includes(query));

      if (filtered.length === 0) {
        suggestionList.innerHTML = '';
        noSuggestions.style.display = 'block';
        noSuggestionsText.textContent = `Aucune suggestion pour "${searchQuery}"`;
        return;
      }

      noSuggestions.style.display = 'none';
      suggestionList.innerHTML = filtered.map(item => `
        <div class="suggestion-item" onclick="selectSuggestion('${item.text}')">
          <i class="bi ${item.icon || 'bi-search'}"></i>
          <div class="suggestion-content">
            <span class="suggestion-text">${item.text}</span>
            ${item.meta ? `<span class="suggestion-meta">${item.meta}</span>` : ''}
          </div>
          <i class="bi bi-arrow-up-left suggestion-action"></i>
        </div>
      `).join('');
    }

    function renderTabs() {
      const tabsContainer = document.getElementById('resultsTabs');
      tabsContainer.innerHTML = tabs.map(tab => `
        <button class="tab-btn ${activeTab === tab.id ? 'active' : ''}" onclick="setActiveTab('${tab.id}')">
          ${tab.label}
        </button>
      `).join('');
    }

    function renderResults() {
      const grid = document.getElementById('resultsGrid');
      grid.innerHTML = searchResults.map(result => `
        <div class="result-card">
          <div class="result-image">
            <i class="bi bi-laptop"></i>
          </div>
          <div class="result-content">
            <span class="result-category">${result.category}</span>
            <h3 class="result-title">${result.title}</h3>
            <p class="result-description">${result.description}</p>
            <div class="result-footer">
              <span class="result-price">${formatPrice(result.price)}</span>
              ${result.rating ? `
                <div class="result-rating">
                  <i class="bi bi-star-fill"></i>
                  <span>${result.rating}</span>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    // ─────────────────────────────────────────────────────────────────
    // EVENT HANDLERS
    // ─────────────────────────────────────────────────────────────────
    function onSearchFocus() {
      isSearchOpen = true;
      searchBox.classList.add('active');
      searchDropdown.classList.add('open');
      updateDropdownContent();
    }

    function onSearchBlur() {
      setTimeout(() => {
        isSearchOpen = false;
        searchBox.classList.remove('active');
        searchDropdown.classList.remove('open');
      }, 200);
    }

    function onSearchInput() {
      searchQuery = searchInput.value;
      clearBtn.style.display = searchQuery ? 'block' : 'none';
      updateDropdownContent();
    }

    function updateDropdownContent() {
      if (searchQuery.trim()) {
        defaultSuggestions.style.display = 'none';
        searchSuggestions.style.display = 'block';
        renderSuggestions();
      } else {
        defaultSuggestions.style.display = 'block';
        searchSuggestions.style.display = 'none';
      }
    }

    function selectSuggestion(text) {
      searchInput.value = text;
      searchQuery = text;
      clearBtn.style.display = 'block';
      searchDropdown.classList.remove('open');
    }

    function clearSearch() {
      searchInput.value = '';
      searchQuery = '';
      clearBtn.style.display = 'none';
      searchInput.focus();
      updateDropdownContent();
    }

    function clearRecentSearches() {
      recentSearches = [];
      renderRecentSearches();
    }

    function removeRecentSearch(id) {
      recentSearches = recentSearches.filter(s => s.id !== id);
      renderRecentSearches();
    }

    function setActiveTab(tab) {
      activeTab = tab;
      renderTabs();
    }

    function formatPrice(price) {
      return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(price);
    }

    // ─────────────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      searchInput.addEventListener('focus', onSearchFocus);
      searchInput.addEventListener('blur', onSearchBlur);
      searchInput.addEventListener('input', onSearchInput);
      clearBtn.addEventListener('click', clearSearch);

      // Keyboard shortcut
      document.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          searchInput.focus();
        }
      });

      renderRecentSearches();
      renderPopularSearches();
      renderTabs();
      renderResults();
    });
  </script>
</body>
</html>
