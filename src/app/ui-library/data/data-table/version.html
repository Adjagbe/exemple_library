<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Table - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════ */
    /* DATA TABLE COMPONENT - Premium UI Library                       */
    /* ═══════════════════════════════════════════════════════════════ */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f8fafc;
      line-height: 1.5;
    }

    .datatable-showcase {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* ─────────────────────────────────────────────────────────────────
       HEADER
       ───────────────────────────────────────────────────────────────── */
    .showcase-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-content h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111827;
      margin: 0 0 0.25rem 0;
    }

    .header-content p {
      color: #6b7280;
      margin: 0;
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
    }

    /* ─────────────────────────────────────────────────────────────────
       BUTTONS
       ───────────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn--sm {
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
    }

    .btn--primary {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
    }

    .btn--primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    .btn--outline {
      background: white;
      border: 2px solid #e5e7eb;
      color: #374151;
    }

    .btn--outline:hover {
      border-color: #4f46e5;
      color: #4f46e5;
    }

    .btn--danger {
      background: #fee2e2;
      color: #dc2626;
    }

    .btn--danger:hover {
      background: #fecaca;
    }

    /* ─────────────────────────────────────────────────────────────────
       TOOLBAR
       ───────────────────────────────────────────────────────────────── */
    .datatable-toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 1rem;
      background: white;
      border-radius: 0.75rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .search-box {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 250px;
      max-width: 400px;
      padding: 0.625rem 1rem;
      background: #f9fafb;
      border: 2px solid transparent;
      border-radius: 0.5rem;
      transition: all 0.2s ease;
    }

    .search-box:focus-within {
      background: white;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .search-box i:first-child {
      color: #9ca3af;
      margin-right: 0.75rem;
    }

    .search-input {
      flex: 1;
      border: none;
      background: none;
      font-size: 0.9rem;
      color: #374151;
    }

    .search-input::placeholder {
      color: #9ca3af;
    }

    .search-input:focus {
      outline: none;
    }

    .clear-btn {
      padding: 0.25rem;
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      border-radius: 0.25rem;
    }

    .clear-btn:hover {
      color: #374151;
      background: #e5e7eb;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .filter-select {
      padding: 0.625rem 2rem 0.625rem 1rem;
      background: #f9fafb;
      border: 2px solid transparent;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      color: #374151;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 0.5rem center;
      background-size: 1.5em;
    }

    .filter-select:focus {
      outline: none;
      background-color: white;
      border-color: #4f46e5;
    }

    .clear-filters-btn {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 0.75rem;
      background: none;
      border: none;
      color: #6b7280;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 0.375rem;
    }

    .clear-filters-btn:hover {
      background: #f3f4f6;
      color: #374151;
    }

    .selection-info {
      display: none;
      align-items: center;
      gap: 1rem;
      margin-left: auto;
      padding-left: 1rem;
      border-left: 1px solid #e5e7eb;
    }

    .selection-info.visible {
      display: flex;
    }

    .selection-info span {
      font-size: 0.875rem;
      color: #6b7280;
      font-weight: 500;
    }

    /* ─────────────────────────────────────────────────────────────────
       TABLE CONTAINER
       ───────────────────────────────────────────────────────────────── */
    .datatable-container {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      overflow-x: auto;
    }

    /* ─────────────────────────────────────────────────────────────────
       TABLE
       ───────────────────────────────────────────────────────────────── */
    .ui-datatable {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .ui-datatable thead {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    }

    .ui-datatable thead th {
      padding: 1rem;
      font-weight: 600;
      color: #374151;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      border-bottom: 2px solid #e5e7eb;
      white-space: nowrap;
    }

    .ui-datatable thead th.sortable {
      cursor: pointer;
      user-select: none;
    }

    .ui-datatable thead th.sortable:hover {
      background: #e5e7eb;
    }

    .ui-datatable tbody tr {
      transition: background 0.15s ease;
    }

    .ui-datatable tbody tr:hover {
      background: #f9fafb;
    }

    .ui-datatable tbody tr.selected {
      background: #eff6ff;
    }

    .ui-datatable tbody tr.selected:hover {
      background: #dbeafe;
    }

    .ui-datatable tbody tr:not(:last-child) td {
      border-bottom: 1px solid #f3f4f6;
    }

    .ui-datatable tbody td {
      padding: 0.875rem 1rem;
      color: #374151;
      vertical-align: middle;
    }

    .th-content {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sort-icon {
      font-size: 0.7rem;
      color: #9ca3af;
    }

    /* ─────────────────────────────────────────────────────────────────
       CHECKBOX
       ───────────────────────────────────────────────────────────────── */
    .checkbox-cell {
      width: 50px;
      text-align: center !important;
    }

    .row-checkbox {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
    }

    /* ─────────────────────────────────────────────────────────────────
       BADGES
       ───────────────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .badge--primary {
      background: #eff6ff;
      color: #3b82f6;
    }

    .badge--secondary {
      background: #f3f4f6;
      color: #6b7280;
    }

    .badge--success {
      background: #ecfdf5;
      color: #10b981;
    }

    .badge--warning {
      background: #fffbeb;
      color: #f59e0b;
    }

    .badge--danger {
      background: #fee2e2;
      color: #ef4444;
    }

    /* ─────────────────────────────────────────────────────────────────
       CURRENCY
       ───────────────────────────────────────────────────────────────── */
    .currency {
      font-weight: 600;
      color: #111827;
    }

    /* ─────────────────────────────────────────────────────────────────
       STOCK PROGRESS
       ───────────────────────────────────────────────────────────────── */
    .stock-progress {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 100px;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .stock-value {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6b7280;
      min-width: 30px;
    }

    /* ─────────────────────────────────────────────────────────────────
       ACTION BUTTONS
       ───────────────────────────────────────────────────────────────── */
    .action-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
    }

    .action-btn {
      padding: 0.375rem;
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      border-radius: 0.375rem;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      background: #f3f4f6;
      color: #374151;
    }

    .action-btn--danger:hover {
      background: #fee2e2;
      color: #dc2626;
    }

    /* ─────────────────────────────────────────────────────────────────
       EMPTY STATE
       ───────────────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem !important;
    }

    .empty-content i {
      font-size: 3rem;
      color: #d1d5db;
      margin-bottom: 1rem;
      display: block;
    }

    .empty-content p {
      color: #6b7280;
      margin: 0 0 1rem 0;
    }

    /* ─────────────────────────────────────────────────────────────────
       PAGINATION
       ───────────────────────────────────────────────────────────────── */
    .datatable-pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem;
      margin-top: 1rem;
      background: white;
      border-radius: 0.75rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .pagination-info {
      font-size: 0.875rem;
      color: #6b7280;
    }

    .pagination-controls {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .page-size {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .page-size label {
      font-size: 0.8rem;
      color: #6b7280;
    }

    .page-size select {
      padding: 0.375rem 0.75rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.375rem;
      font-size: 0.8rem;
      color: #374151;
      cursor: pointer;
    }

    .page-size select:focus {
      outline: none;
      border-color: #4f46e5;
    }

    .page-nav {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .page-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 0.5rem;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      color: #374151;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .page-btn:hover:not(:disabled) {
      border-color: #4f46e5;
      color: #4f46e5;
    }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .page-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: white;
    }

    /* ─────────────────────────────────────────────────────────────────
       RESPONSIVE
       ───────────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .showcase-header {
        flex-direction: column;
        align-items: stretch;
      }

      .header-actions {
        justify-content: flex-end;
      }

      .datatable-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-box {
        max-width: none;
      }

      .selection-info {
        margin-left: 0;
        padding-left: 0;
        border-left: none;
        padding-top: 0.75rem;
        border-top: 1px solid #e5e7eb;
        justify-content: space-between;
      }

      .datatable-pagination {
        flex-direction: column;
        align-items: stretch;
      }

      .pagination-controls {
        flex-direction: column;
        align-items: stretch;
        gap: 1rem;
      }

      .page-nav {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="datatable-showcase">
    <!-- Header -->
    <div class="showcase-header">
      <div class="header-content">
        <h1>Data Table</h1>
        <p>Tableau avancé avec pagination, recherche et filtres</p>
      </div>

      <div class="header-actions">
        <button class="btn btn--outline" onclick="exportData()">
          <i class="bi bi-download"></i>
          Exporter
        </button>
        <button class="btn btn--primary">
          <i class="bi bi-plus-lg"></i>
          Ajouter
        </button>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="datatable-toolbar">
      <!-- Search -->
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input 
          type="text" 
          id="searchInput"
          placeholder="Rechercher un produit..."
          class="search-input"
          oninput="onSearch()"
        >
        <button class="clear-btn" id="clearSearchBtn" style="display: none;" onclick="clearSearch()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <!-- Filters -->
      <div class="filters">
        <select id="categoryFilter" class="filter-select" onchange="onFilterChange()">
          <option value="">Toutes catégories</option>
          <option value="Électronique">Électronique</option>
          <option value="Vêtements">Vêtements</option>
          <option value="Maison">Maison</option>
          <option value="Sports">Sports</option>
        </select>

        <select id="statusFilter" class="filter-select" onchange="onFilterChange()">
          <option value="">Tous statuts</option>
          <option value="En stock">En stock</option>
          <option value="Stock faible">Stock faible</option>
          <option value="Rupture">Rupture</option>
        </select>

        <button class="clear-filters-btn" id="clearFiltersBtn" style="display: none;" onclick="clearFilters()">
          <i class="bi bi-x-circle"></i>
          Effacer
        </button>
      </div>

      <!-- Selection info -->
      <div class="selection-info" id="selectionInfo">
        <span id="selectedCount">0 élément(s) sélectionné(s)</span>
        <button class="btn btn--danger btn--sm">
          <i class="bi bi-trash"></i>
          Supprimer
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="datatable-container">
      <table class="ui-datatable">
        <thead>
          <tr>
            <th class="checkbox-cell">
              <input type="checkbox" id="selectAll" class="row-checkbox" onchange="toggleSelectAll()">
            </th>
            <th class="sortable" style="width: 80px; text-align: center" onclick="sortBy('id')">
              <div class="th-content"><span>ID</span><i class="bi bi-chevron-expand sort-icon" id="sort-id"></i></div>
            </th>
            <th class="sortable" onclick="sortBy('product')">
              <div class="th-content"><span>Produit</span><i class="bi bi-chevron-expand sort-icon" id="sort-product"></i></div>
            </th>
            <th class="sortable" onclick="sortBy('category')">
              <div class="th-content"><span>Catégorie</span><i class="bi bi-chevron-expand sort-icon" id="sort-category"></i></div>
            </th>
            <th class="sortable" style="text-align: right" onclick="sortBy('price')">
              <div class="th-content"><span>Prix</span><i class="bi bi-chevron-expand sort-icon" id="sort-price"></i></div>
            </th>
            <th class="sortable" style="text-align: center" onclick="sortBy('stock')">
              <div class="th-content"><span>Stock</span><i class="bi bi-chevron-expand sort-icon" id="sort-stock"></i></div>
            </th>
            <th class="sortable" onclick="sortBy('status')">
              <div class="th-content"><span>Statut</span><i class="bi bi-chevron-expand sort-icon" id="sort-status"></i></div>
            </th>
            <th class="sortable" onclick="sortBy('lastUpdate')">
              <div class="th-content"><span>Mise à jour</span><i class="bi bi-chevron-expand sort-icon" id="sort-lastUpdate"></i></div>
            </th>
            <th style="width: 100px; text-align: center"></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="datatable-pagination" id="pagination">
      <div class="pagination-info" id="paginationInfo">
        Affichage de <strong>1</strong> à <strong>5</strong> sur <strong>15</strong> résultats
      </div>

      <div class="pagination-controls">
        <div class="page-size">
          <label>Lignes par page:</label>
          <select id="pageSize" onchange="onPageSizeChange()">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
          </select>
        </div>

        <div class="page-nav" id="pageNav"></div>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // DATA TABLE COMPONENT - Premium UI Library
    // ═══════════════════════════════════════════════════════════════

    // ─────────────────────────────────────────────────────────────────
    // DATA
    // ─────────────────────────────────────────────────────────────────
    const allData = [
      { id: 1, product: 'MacBook Pro 16"', category: 'Électronique', price: 2499.99, stock: 85, status: 'En stock', lastUpdate: '2024-05-01', selected: false },
      { id: 2, product: 'iPhone 15 Pro', category: 'Électronique', price: 1199.99, stock: 120, status: 'En stock', lastUpdate: '2024-05-02', selected: false },
      { id: 3, product: 'Nike Air Max 90', category: 'Sports', price: 149.99, stock: 25, status: 'Stock faible', lastUpdate: '2024-04-28', selected: false },
      { id: 4, product: 'Canapé 3 places', category: 'Maison', price: 899.99, stock: 0, status: 'Rupture', lastUpdate: '2024-04-15', selected: false },
      { id: 5, product: 'T-Shirt Premium', category: 'Vêtements', price: 39.99, stock: 200, status: 'En stock', lastUpdate: '2024-05-03', selected: false },
      { id: 6, product: 'iPad Pro 12.9"', category: 'Électronique', price: 1099.99, stock: 45, status: 'En stock', lastUpdate: '2024-05-01', selected: false },
      { id: 7, product: 'Vélo de route', category: 'Sports', price: 1299.99, stock: 8, status: 'Stock faible', lastUpdate: '2024-04-20', selected: false },
      { id: 8, product: 'Lampe design', category: 'Maison', price: 129.99, stock: 60, status: 'En stock', lastUpdate: '2024-04-25', selected: false },
      { id: 9, product: 'Jean slim', category: 'Vêtements', price: 79.99, stock: 150, status: 'En stock', lastUpdate: '2024-05-02', selected: false },
      { id: 10, product: 'AirPods Pro', category: 'Électronique', price: 279.99, stock: 0, status: 'Rupture', lastUpdate: '2024-04-10', selected: false },
      { id: 11, product: 'Raquette tennis', category: 'Sports', price: 189.99, stock: 35, status: 'En stock', lastUpdate: '2024-04-22', selected: false },
      { id: 12, product: 'Table basse', category: 'Maison', price: 249.99, stock: 18, status: 'Stock faible', lastUpdate: '2024-04-18', selected: false },
      { id: 13, product: 'Chemise lin', category: 'Vêtements', price: 69.99, stock: 90, status: 'En stock', lastUpdate: '2024-05-01', selected: false },
      { id: 14, product: 'Samsung Galaxy S24', category: 'Électronique', price: 999.99, stock: 70, status: 'En stock', lastUpdate: '2024-05-03', selected: false },
      { id: 15, product: 'Haltères 10kg', category: 'Sports', price: 49.99, stock: 100, status: 'En stock', lastUpdate: '2024-04-30', selected: false }
    ];

    let filteredData = [...allData];
    let displayedData = [];
    let currentPage = 1;
    let pageSize = 5;
    let sortColumn = '';
    let sortDirection = 'asc';

    const categoryColors = {
      'Électronique': 'primary',
      'Vêtements': 'success',
      'Maison': 'warning',
      'Sports': 'danger'
    };

    const statusColors = {
      'En stock': 'success',
      'Stock faible': 'warning',
      'Rupture': 'danger'
    };

    // ─────────────────────────────────────────────────────────────────
    // RENDER TABLE
    // ─────────────────────────────────────────────────────────────────
    function renderTable() {
      const tbody = document.getElementById('tableBody');

      if (displayedData.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="9" class="empty-state">
              <div class="empty-content">
                <i class="bi bi-inbox"></i>
                <p>Aucun résultat trouvé</p>
                <button class="btn btn--outline btn--sm" onclick="clearFilters()">
                  Réinitialiser les filtres
                </button>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = displayedData.map(row => `
        <tr class="${row.selected ? 'selected' : ''}">
          <td class="checkbox-cell">
            <input type="checkbox" class="row-checkbox" ${row.selected ? 'checked' : ''} onchange="toggleRowSelection(${row.id})">
          </td>
          <td style="text-align: center">${row.id}</td>
          <td>${row.product}</td>
          <td><span class="badge badge--${categoryColors[row.category]}">${row.category}</span></td>
          <td style="text-align: right"><span class="currency">${formatCurrency(row.price)}</span></td>
          <td style="text-align: center">
            <div class="stock-progress">
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${Math.min(100, row.stock)}%; background: ${getStockColor(row.stock)}"></div>
              </div>
              <span class="stock-value">${row.stock}</span>
            </div>
          </td>
          <td><span class="badge badge--${statusColors[row.status]}">${row.status}</span></td>
          <td>${formatDate(row.lastUpdate)}</td>
          <td style="text-align: center">
            <div class="action-buttons">
              <button class="action-btn" title="Voir"><i class="bi bi-eye"></i></button>
              <button class="action-btn" title="Modifier"><i class="bi bi-pencil"></i></button>
              <button class="action-btn action-btn--danger" title="Supprimer"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // ─────────────────────────────────────────────────────────────────
    // PAGINATION
    // ─────────────────────────────────────────────────────────────────
    function updateDisplayedData() {
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      displayedData = filteredData.slice(start, end);
      renderTable();
      renderPagination();
      updateSelectAllState();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredData.length / pageSize);
      const startIndex = (currentPage - 1) * pageSize + 1;
      const endIndex = Math.min(currentPage * pageSize, filteredData.length);

      document.getElementById('paginationInfo').innerHTML = 
        `Affichage de <strong>${startIndex}</strong> à <strong>${endIndex}</strong> sur <strong>${filteredData.length}</strong> résultats`;

      // Page navigation
      const pageNav = document.getElementById('pageNav');
      let pages = getPageNumbers(totalPages);

      pageNav.innerHTML = `
        <button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(1)">
          <i class="bi bi-chevron-double-left"></i>
        </button>
        <button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">
          <i class="bi bi-chevron-left"></i>
        </button>
        ${pages.map(p => `
          <button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>
        `).join('')}
        <button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">
          <i class="bi bi-chevron-right"></i>
        </button>
        <button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${totalPages})">
          <i class="bi bi-chevron-double-right"></i>
        </button>
      `;
    }

    function getPageNumbers(totalPages) {
      const pages = [];
      let start = Math.max(1, currentPage - 2);
      let end = Math.min(totalPages, currentPage + 2);

      if (end - start < 4) {
        if (start === 1) end = Math.min(totalPages, start + 4);
        else start = Math.max(1, end - 4);
      }

      for (let i = start; i <= end; i++) pages.push(i);
      return pages;
    }

    function goToPage(page) {
      const totalPages = Math.ceil(filteredData.length / pageSize);
      if (page >= 1 && page <= totalPages) {
        currentPage = page;
        updateDisplayedData();
      }
    }

    function onPageSizeChange() {
      pageSize = parseInt(document.getElementById('pageSize').value);
      currentPage = 1;
      updateDisplayedData();
    }

    // ─────────────────────────────────────────────────────────────────
    // FILTERING & SEARCH
    // ─────────────────────────────────────────────────────────────────
    function applyFilters() {
      const searchQuery = document.getElementById('searchInput').value.toLowerCase();
      const categoryFilter = document.getElementById('categoryFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;

      filteredData = allData.filter(row => {
        const matchesSearch = !searchQuery || 
          row.product.toLowerCase().includes(searchQuery) ||
          row.category.toLowerCase().includes(searchQuery);
        const matchesCategory = !categoryFilter || row.category === categoryFilter;
        const matchesStatus = !statusFilter || row.status === statusFilter;
        return matchesSearch && matchesCategory && matchesStatus;
      });

      // Apply sorting
      if (sortColumn) {
        filteredData.sort((a, b) => {
          let valA = a[sortColumn];
          let valB = b[sortColumn];
          let comparison = 0;
          if (valA < valB) comparison = -1;
          if (valA > valB) comparison = 1;
          return sortDirection === 'asc' ? comparison : -comparison;
        });
      }

      currentPage = 1;
      updateDisplayedData();
      updateClearFiltersVisibility();
    }

    function onSearch() {
      const searchQuery = document.getElementById('searchInput').value;
      document.getElementById('clearSearchBtn').style.display = searchQuery ? 'block' : 'none';
      applyFilters();
    }

    function onFilterChange() {
      applyFilters();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearSearchBtn').style.display = 'none';
      applyFilters();
    }

    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('categoryFilter').value = '';
      document.getElementById('statusFilter').value = '';
      document.getElementById('clearSearchBtn').style.display = 'none';
      applyFilters();
    }

    function updateClearFiltersVisibility() {
      const searchQuery = document.getElementById('searchInput').value;
      const categoryFilter = document.getElementById('categoryFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;
      const hasFilters = searchQuery || categoryFilter || statusFilter;
      document.getElementById('clearFiltersBtn').style.display = hasFilters ? 'flex' : 'none';
    }

    // ─────────────────────────────────────────────────────────────────
    // SORTING
    // ─────────────────────────────────────────────────────────────────
    function sortBy(column) {
      if (sortColumn === column) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortColumn = column;
        sortDirection = 'asc';
      }
      updateSortIcons();
      applyFilters();
    }

    function updateSortIcons() {
      const columns = ['id', 'product', 'category', 'price', 'stock', 'status', 'lastUpdate'];
      columns.forEach(col => {
        const icon = document.getElementById(`sort-${col}`);
        if (icon) {
          if (col === sortColumn) {
            icon.className = `bi ${sortDirection === 'asc' ? 'bi-chevron-up' : 'bi-chevron-down'} sort-icon`;
          } else {
            icon.className = 'bi bi-chevron-expand sort-icon';
          }
        }
      });
    }

    // ─────────────────────────────────────────────────────────────────
    // SELECTION
    // ─────────────────────────────────────────────────────────────────
    function toggleSelectAll() {
      const checked = document.getElementById('selectAll').checked;
      displayedData.forEach(row => {
        const dataRow = allData.find(r => r.id === row.id);
        if (dataRow) dataRow.selected = checked;
      });
      renderTable();
      updateSelectionInfo();
    }

    function toggleRowSelection(id) {
      const row = allData.find(r => r.id === id);
      if (row) row.selected = !row.selected;
      renderTable();
      updateSelectAllState();
      updateSelectionInfo();
    }

    function updateSelectAllState() {
      const allSelected = displayedData.length > 0 && displayedData.every(row => row.selected);
      document.getElementById('selectAll').checked = allSelected;
    }

    function updateSelectionInfo() {
      const count = allData.filter(r => r.selected).length;
      const selectionInfo = document.getElementById('selectionInfo');
      selectionInfo.classList.toggle('visible', count > 0);
      document.getElementById('selectedCount').textContent = `${count} élément(s) sélectionné(s)`;
    }

    // ─────────────────────────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────────────────────────
    function formatCurrency(value) {
      return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(value);
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function getStockColor(stock) {
      if (stock === 0) return '#ef4444';
      if (stock < 30) return '#f59e0b';
      return '#10b981';
    }

    function exportData() {
      console.log('Export data:', filteredData);
      alert('Export des données...');
    }

    // ─────────────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      updateDisplayedData();
    });
  </script>
</body>
</html>
