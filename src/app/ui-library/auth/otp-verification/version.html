<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}

    .auth-card{width:100%;max-width:420px;background:#fff;border-radius:1.5rem;padding:2.5rem;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);text-align:center}
    .auth-card__title{font-size:1.5rem;font-weight:700;color:#111827;margin:0 0 .75rem}
    .auth-card__subtitle{font-size:.9rem;color:#6b7280;line-height:1.6;margin:0 0 2rem}
    .auth-card__subtitle strong{color:#111827}

    .alert{display:none;align-items:center;gap:.75rem;padding:.875rem 1rem;border-radius:.5rem;margin-bottom:1.5rem;font-size:.875rem}
    .alert.show{display:flex}
    .alert--error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}

    /* OTP INPUTS */
    .otp-container{margin-bottom:2rem}
    .otp-inputs{display:flex;justify-content:center;gap:.75rem}
    .otp-input{width:48px;height:56px;text-align:center;font-size:1.5rem;font-weight:600;border:2px solid #e5e7eb;border-radius:.75rem;background:#fff;color:#111827;transition:all .2s;caret-color:#4f46e5}
    .otp-input:focus{outline:none;border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
    .otp-input.filled{border-color:#4f46e5;background:#eef2ff}
    .otp-input.error{border-color:#ef4444;animation:shake .5s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}

    .otp-loading{display:none;align-items:center;justify-content:center;gap:.5rem;margin-top:1rem;font-size:.875rem;color:#6b7280}
    .otp-loading.show{display:flex}
    .otp-loading .spinner{width:18px;height:18px;border:2px solid #e5e7eb;border-top-color:#4f46e5;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* RESEND */
    .resend-section{margin-bottom:1.5rem}
    .resend-text{font-size:.875rem;color:#6b7280;margin:0 0 .5rem}
    .resend-text strong{color:#4f46e5;font-weight:600}
    .resend-btn{display:inline-flex;align-items:center;gap:.375rem;background:none;border:none;color:#4f46e5;font-size:.875rem;font-weight:600;cursor:pointer;padding:.5rem 1rem;border-radius:.5rem;transition:all .2s}
    .resend-btn:hover:not(:disabled){background:#eef2ff}
    .resend-btn:disabled{opacity:.5;cursor:not-allowed}

    /* HELP */
    .help-section{display:flex;justify-content:center;gap:1.5rem;padding-top:1rem;border-top:1px solid #f3f4f6}
    .help-link{display:flex;align-items:center;gap:.375rem;font-size:.8rem;color:#6b7280;text-decoration:none;transition:color .2s}
    .help-link:hover{color:#4f46e5}

    /* SUCCESS */
    .otp-form{display:block}.otp-form.hidden{display:none}
    .success-state{display:none}.success-state.show{display:block}
    .success-state__icon{width:80px;height:80px;background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
    .success-state__icon i{font-size:2.5rem;color:#059669}
    .success-state__title{font-size:1.5rem;font-weight:700;color:#111827;margin:0 0 .75rem}
    .success-state__text{font-size:.9rem;color:#6b7280;line-height:1.6;margin:0 0 1.5rem}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1.5rem;font-size:.9rem;font-weight:600;border:none;border-radius:.5rem;cursor:pointer;transition:all .2s;text-decoration:none}
    .btn--primary{background:#4f46e5;color:#fff}
    .btn--primary:hover{background:#4338ca}
    .btn--full{width:100%}
  </style>
</head>
<body>
<div class="auth-card">
  <div class="otp-form" id="otpForm">
    <h1 class="auth-card__title">Vérification</h1>
    <p class="auth-card__subtitle">Nous avons envoyé un code de vérification à 6 chiffres à<br><strong>utilisateur@exemple.com</strong></p>

    <div class="alert alert--error" id="alertError"><i class="bi bi-exclamation-circle"></i><span id="errorText"></span></div>

    <div class="otp-container">
      <div class="otp-inputs" id="otpInputs"></div>
      <div class="otp-loading" id="otpLoading"><span class="spinner"></span><span>Vérification...</span></div>
    </div>

    <div class="resend-section">
      <p class="resend-text" id="resendText">Renvoyer le code dans <strong id="timerDisplay">1:00</strong></p>
      <button class="resend-btn" id="resendBtn" style="display:none" onclick="resendCode()"><i class="bi bi-arrow-clockwise"></i>Renvoyer le code</button>
    </div>

    <div class="help-section">
      <a href="#" class="help-link"><i class="bi bi-question-circle"></i>Besoin d'aide ?</a>
      <a href="#" class="help-link"><i class="bi bi-arrow-left"></i>Retour</a>
    </div>
  </div>

  <div class="success-state" id="successState">
    <div class="success-state__icon"><i class="bi bi-check-lg"></i></div>
    <h2 class="success-state__title">Vérification réussie !</h2>
    <p class="success-state__text">Votre identité a été vérifiée avec succès.<br>Vous pouvez maintenant continuer.</p>
    <a href="#" class="btn btn--primary btn--full"><span>Continuer</span><i class="bi bi-arrow-right"></i></a>
  </div>
</div>

<script>
let otpValues = ['','','','','',''];
let resendTimer = 60;
let timerInterval;

function createInputs() {
  const container = document.getElementById('otpInputs');
  container.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.maxLength = 6;
    inp.className = 'otp-input';
    inp.inputMode = 'numeric';
    inp.autocomplete = 'one-time-code';
    inp.dataset.index = i;
    inp.addEventListener('input', e => onInput(e, i));
    inp.addEventListener('keydown', e => onKeydown(e, i));
    container.appendChild(inp);
  }
}

function getInputs() { return document.querySelectorAll('.otp-input'); }

function onInput(e, index) {
  const input = e.target;
  const value = input.value;
  if (value.length > 1) { handlePaste(value); return; }
  if (value && !/^\d$/.test(value)) { input.value = ''; otpValues[index] = ''; return; }
  otpValues[index] = value;
  input.classList.toggle('filled', !!value);
  if (value && index < 5) getInputs()[index+1].focus();
  if (otpValues.every(v => v !== '')) verifyOtp();
}

function onKeydown(e, index) {
  if (e.key === 'Backspace' && !otpValues[index] && index > 0) getInputs()[index-1].focus();
  if (e.key === 'ArrowLeft' && index > 0) getInputs()[index-1].focus();
  if (e.key === 'ArrowRight' && index < 5) getInputs()[index+1].focus();
}

function handlePaste(value) {
  const digits = value.replace(/\D/g, '').slice(0,6).split('');
  const inputs = getInputs();
  digits.forEach((d, i) => { otpValues[i] = d; inputs[i].value = d; inputs[i].classList.add('filled'); });
  inputs[Math.min(digits.length, 5)].focus();
  if (digits.length === 6) verifyOtp();
}

async function verifyOtp() {
  const otp = otpValues.join('');
  if (otp.length !== 6) return;

  document.getElementById('alertError').classList.remove('show');
  document.getElementById('otpLoading').classList.add('show');

  await new Promise(r => setTimeout(r, 1500));
  document.getElementById('otpLoading').classList.remove('show');

  if (otp === '123456') {
    document.getElementById('otpForm').classList.add('hidden');
    document.getElementById('successState').classList.add('show');
  } else {
    document.getElementById('errorText').textContent = 'Code incorrect. Veuillez réessayer.';
    document.getElementById('alertError').classList.add('show');
    const inputs = getInputs();
    inputs.forEach(inp => { inp.value = ''; inp.classList.remove('filled'); inp.classList.add('error'); });
    otpValues = ['','','','','',''];
    inputs[0].focus();
    setTimeout(() => inputs.forEach(inp => inp.classList.remove('error')), 500);
  }
}

function startTimer() {
  resendTimer = 60;
  document.getElementById('resendBtn').style.display = 'none';
  document.getElementById('resendText').style.display = '';
  timerInterval = setInterval(() => {
    resendTimer--;
    const mins = Math.floor(resendTimer/60);
    const secs = (resendTimer%60).toString().padStart(2,'0');
    document.getElementById('timerDisplay').textContent = `${mins}:${secs}`;
    if (resendTimer <= 0) {
      clearInterval(timerInterval);
      document.getElementById('resendText').style.display = 'none';
      document.getElementById('resendBtn').style.display = '';
    }
  }, 1000);
}

async function resendCode() {
  document.getElementById('resendBtn').disabled = true;
  await new Promise(r => setTimeout(r, 1000));
  document.getElementById('resendBtn').disabled = false;
  startTimer();
}

createInputs();
startTimer();
getInputs()[0].focus();
</script>
</body>
</html>
