<div class="confirmation-page">
  <div class="confirmation-card">
    <div class="state-container">
      <div class="success-icon">
        <div class="success-circle">
          <i class="bi bi-check-lg"></i>
        </div>
        <div class="success-particles">
          @for (i of [1, 2, 3, 4, 5, 6]; track i) {
            <div class="particle particle--{{ i }}"></div>
          }
        </div>
      </div>
      
      <h2 class="state-title">Email confirmé !</h2>
      <p class="state-text">
        Votre adresse email <strong>{{ email }}</strong> a été vérifiée avec succès.
      </p>
      
      <div class="success-features">
        <div class="feature-item">
          <i class="bi bi-shield-check"></i>
          <span>Compte sécurisé</span>
        </div>
        <div class="feature-item">
          <i class="bi bi-bell"></i>
          <span>Notifications activées</span>
        </div>
        <div class="feature-item">
          <i class="bi bi-unlock"></i>
          <span>Accès complet</span>
        </div>
      </div>

      <a href="#" class="btn btn--primary btn--full">
        <span>Accéder à mon compte</span>
        <i class="bi bi-arrow-right"></i>
      </a>
    </div>
  </div>

  <div class="page-footer">
    <p>Vous n'avez pas demandé cette vérification ? <a href="#">Signalez-le</a></p>
  </div>
</div>
