<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captcha Slider - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:whitesmoke;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}

    .captcha-card{width:100%;max-width:420px;background:#fff;border-radius:1rem;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);overflow:hidden}

    .captcha-header{display:flex;align-items:center;gap:1rem;padding:1.25rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
    .captcha-header__icon{width:48px;height:48px;background:rgba(255,255,255,.2);border-radius:.75rem;display:flex;align-items:center;justify-content:center}
    .captcha-header__icon i{font-size:1.5rem}
    .captcha-header__title{font-size:1rem;font-weight:600;margin:0 0 .25rem}
    .captcha-header__subtitle{font-size:.8rem;margin:0;opacity:.9}

    .alert{display:none;align-items:center;gap:.5rem;margin:.75rem;padding:.75rem;border-radius:.5rem;font-size:.8rem}
    .alert.show{display:flex}
    .alert--error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}

    .slider-captcha{padding:1.5rem}
    .slider-instruction{display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.85rem;color:#6b7280;margin-bottom:1rem}
    .slider-visual{margin-bottom:1.5rem}
    .slider-image{position:relative;height:120px;background:linear-gradient(135deg,#f3f4f6,#e5e7eb);border-radius:.5rem;overflow:hidden}
    .slider-target{position:absolute;top:50%;transform:translateY(-50%);width:4px;height:60%;background:#4f46e5;border-radius:2px}
    .slider-target::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid #4f46e5}
    .slider-track{position:relative;height:48px;background:#f3f4f6;border-radius:.5rem;cursor:pointer;overflow:hidden}
    .slider-progress{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#4f46e5,#7c3aed);border-radius:.5rem 0 0 .5rem;pointer-events:none}
    .slider-handle{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:40px;background:#fff;border-radius:.375rem;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;cursor:grab;z-index:1}
    .slider-handle:active{cursor:grabbing}
    .slider-handle i{color:#4f46e5;font-size:1.25rem}
    .slider-hint{text-align:center;font-size:.75rem;color:#9ca3af;margin:.75rem 0 0}

    .captcha-content{display:block}.captcha-content.hidden{display:none}
    .success-state{display:none;padding:2.5rem;text-align:center}
    .success-state.show{display:block}
    .success-icon{width:80px;height:80px;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center}
    .success-icon i{font-size:5rem;color:#10b981}
    .success-title{font-size:1.25rem;font-weight:700;color:#111827;margin:0 0 .5rem}
    .success-text{font-size:.9rem;color:#6b7280;margin:0 0 1.5rem}
    .verified-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.625rem 1.25rem;background:#d1fae5;border-radius:9999px;color:#059669;font-size:.875rem;font-weight:600}
  </style>
</head>
<body>
<div class="captcha-card">
  <div class="captcha-content" id="captchaContent">
    <div class="captcha-header">
      <div class="captcha-header__icon"><i class="bi bi-arrows"></i></div>
      <div><h3 class="captcha-header__title">Vérification de sécurité</h3><p class="captcha-header__subtitle">Faites glisser le curseur</p></div>
    </div>

    <div class="alert alert--error" id="alertError"><i class="bi bi-exclamation-circle"></i><span id="errorText"></span></div>

    <div class="slider-captcha">
      <div class="slider-instruction"><i class="bi bi-arrows-move"></i><span>Faites glisser le curseur jusqu'à la position indiquée</span></div>
      <div class="slider-visual">
        <div class="slider-image">
          <div class="slider-target" id="sliderTarget"></div>
        </div>
      </div>
      <div class="slider-track" id="sliderTrack">
        <div class="slider-progress" id="sliderProgress"></div>
        <div class="slider-handle" id="sliderHandle"><i class="bi bi-arrows"></i></div>
      </div>
      <p class="slider-hint">Glissez vers la droite pour aligner avec le repère</p>
    </div>
  </div>

  <div class="success-state" id="successState">
    <div class="success-icon"><i class="bi bi-check-circle-fill"></i></div>
    <h3 class="success-title">Vérification réussie</h3>
    <p class="success-text">Vous avez prouvé que vous n'êtes pas un robot.</p>
    <div class="verified-badge"><i class="bi bi-shield-fill-check"></i><span>Vérifié</span></div>
  </div>
</div>

<script>
(function(){
var sliderPos = 0;
var targetPos = 0;
var isDragging = false;

var track = document.getElementById('sliderTrack');
var handle = document.getElementById('sliderHandle');

function generateCaptcha() {
  document.getElementById('alertError').classList.remove('show');
  targetPos = 50 + Math.floor(Math.random() * 150);
  sliderPos = 0;
  document.getElementById('sliderTarget').style.left = targetPos + 'px';
  updateSliderUI();
}

function updateSliderUI() {
  handle.style.left = sliderPos + 'px';
  document.getElementById('sliderProgress').style.width = (sliderPos + 25) + 'px';
}

handle.addEventListener('mousedown', function(e) { isDragging = true; e.preventDefault(); });
handle.addEventListener('touchstart', function(e) { isDragging = true; e.preventDefault(); });
document.addEventListener('mousemove', function(e) { if (isDragging) moveSlider(e.clientX); });
document.addEventListener('touchmove', function(e) { if (isDragging) moveSlider(e.touches[0].clientX); });
document.addEventListener('mouseup', endSlider);
document.addEventListener('touchend', endSlider);

function moveSlider(clientX) {
  var rect = track.getBoundingClientRect();
  sliderPos = Math.max(0, Math.min(clientX - rect.left - 25, rect.width - 50));
  updateSliderUI();
}

function endSlider() {
  if (!isDragging) return;
  isDragging = false;
  if (Math.abs(sliderPos - targetPos) <= 10) {
    setTimeout(function() {
      document.getElementById('captchaContent').classList.add('hidden');
      document.getElementById('successState').classList.add('show');
    }, 500);
  }
}

window.generateCaptcha = generateCaptcha;

generateCaptcha();
})();
</script>
</body>
</html>
