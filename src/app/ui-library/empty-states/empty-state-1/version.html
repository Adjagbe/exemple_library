<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Empty State 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:3rem 2rem}
.es1{text-align:center;max-width:420px}
.es1__illus{width:8rem;height:8rem;background:#eef2ff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3rem;margin:0 auto 1.75rem}
.es1__h{font-size:1.375rem;font-weight:800;color:#1e293b;margin-bottom:.625rem}
.es1__p{font-size:.9375rem;color:#64748b;line-height:1.7;margin-bottom:2rem}
.es1__cta{padding:.85rem 2.25rem;background:#4f46e5;color:#fff;font-weight:700;font-size:.9375rem;border:none;border-radius:.875rem;cursor:pointer;transition:background .2s}
.es1__cta:hover{background:#4338ca}
.es1__link{display:block;margin-top:1rem;font-size:.875rem;color:#6366f1;cursor:pointer;text-decoration:none}
</style></head>
<body>
<div class="es1">
  <div class="es1__illus">📁</div>
  <h2 class="es1__h">No projects yet</h2>
  <p class="es1__p">Get started by creating your first project. It takes less than a minute.</p>
  <button class="es1__cta">+ Create project</button>
  <a href="#" class="es1__link">Import from GitHub instead →</a>
</div>
<script>(function(){})()</script>
</body></html>
