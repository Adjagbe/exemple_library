<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Card Horizontal - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:#f9fafb;min-height:100vh}

    .user-cards-showcase{max-width:1400px;margin:0 auto;padding:2rem}
    .section-title{font-size:1.5rem;font-weight:700;color:#111827;margin:0 0 1.5rem 0}
    .horizontal-grid{display:flex;flex-direction:column;gap:1rem}

    .avatar{position:relative;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:50%;flex-shrink:0}
    .avatar--md{width:56px;height:56px;font-size:1rem}
    .avatar--lg{width:80px;height:80px;font-size:1.5rem}
    .avatar-text{color:#fff;font-weight:600}
    .status-indicator{position:absolute;bottom:2px;right:2px;width:12px;height:12px;border-radius:50%;border:2px solid #fff}
    .status--online{background:#10b981}.status--offline{background:#9ca3af}.status--busy{background:#ef4444}.status--away{background:#f59e0b}

    .user-card{background:#fff;border-radius:1rem;box-shadow:0 4px 20px rgba(0,0,0,.06);overflow:hidden;transition:all .3s ease}
    .user-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.1)}

    /* HORIZONTAL */
    .user-card--horizontal{display:flex;align-items:center;gap:1.5rem;padding:1.5rem}
    .user-card--horizontal .card-main{flex:1;display:flex;align-items:center;gap:2rem;min-width:0}
    .user-card--horizontal .card-info{flex:1;min-width:0}
    .user-card--horizontal .user-name{font-size:1.1rem;font-weight:600;color:#111827;margin:0 0 .25rem}
    .user-card--horizontal .user-role{font-size:.875rem;color:#4f46e5;font-weight:500;margin:0 0 .5rem}
    .user-card--horizontal .user-location{font-size:.8rem;color:#6b7280;margin:0;display:flex;align-items:center;gap:.375rem}
    .user-card--horizontal .card-stats{display:flex;gap:2rem;padding-left:2rem;border-left:1px solid #e5e7eb}
    .user-card--horizontal .stat{display:flex;flex-direction:column;align-items:center;text-align:center}
    .user-card--horizontal .stat-value{font-size:1.125rem;font-weight:700;color:#111827}
    .user-card--horizontal .stat-label{font-size:.7rem;color:#6b7280;text-transform:uppercase}
    .user-card--horizontal .card-actions{display:flex;gap:.5rem}

    /* TEAM */
    .user-card--team{display:flex;align-items:center;gap:1rem;padding:1.25rem 1.5rem;position:relative}
    .team-badge{position:absolute;top:0;right:1.5rem;display:flex;align-items:center;gap:.375rem;padding:.25rem .75rem;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;font-size:.7rem;font-weight:600;border-radius:0 0 .5rem .5rem}
    .team-badge i{font-size:.6rem}
    .user-card--team .card-content{flex:1;min-width:0}
    .user-card--team .user-name{font-size:1rem;font-weight:600;color:#111827;margin:0 0 .125rem}
    .user-card--team .user-role{font-size:.8rem;color:#4f46e5;margin:0 0 .5rem}
    .contact-info{display:flex;flex-wrap:wrap;gap:1rem}
    .contact-info span{font-size:.75rem;color:#6b7280;display:flex;align-items:center;gap:.375rem}
    .contact-info span i{color:#9ca3af}
    .user-card--team .card-actions{display:flex;gap:.5rem}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.625rem 1.25rem;border:none;border-radius:.5rem;font-size:.875rem;font-weight:600;cursor:pointer;transition:all .2s ease}
    .btn--sm{padding:.5rem 1rem;font-size:.8rem}
    .btn--primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
    .btn--primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.4)}
    .btn--outline{background:#fff;border:2px solid #e5e7eb;color:#374151}
    .btn--outline:hover{border-color:#4f46e5;color:#4f46e5}
    .btn--icon{width:40px;height:40px;padding:0;background:#f3f4f6;color:#6b7280;border-radius:.5rem}
    .btn--icon:hover{background:#e5e7eb;color:#374151}
    .btn--icon.btn--primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
    .btn--icon.btn--primary:hover{box-shadow:0 4px 12px rgba(79,70,229,.4)}

    @media(max-width:768px){
      .user-cards-showcase{padding:1rem}
      .user-card--horizontal{flex-direction:column;text-align:center}
      .user-card--horizontal .card-main{flex-direction:column;gap:1rem}
      .user-card--horizontal .card-stats{padding-left:0;border-left:none;padding-top:1rem;border-top:1px solid #e5e7eb}
      .user-card--horizontal .card-actions{width:100%;justify-content:center}
      .user-card--team{flex-wrap:wrap}
      .user-card--team .team-badge{position:static;order:-1;width:100%;justify-content:center;border-radius:.5rem;margin-bottom:.5rem}
      .user-card--team .card-actions{width:100%;justify-content:flex-end}
    }
  </style>
</head>
<body>
<div class="user-cards-showcase">
  <h2 class="section-title">Cards Horizontales</h2>
  <div class="horizontal-grid">
    <!-- Horizontal Card -->
    <div class="user-card user-card--horizontal">
      <div class="avatar avatar--lg"><span class="avatar-text">LB</span><span class="status-indicator status--offline"></span></div>
      <div class="card-main">
        <div class="card-info"><h3 class="user-name">Lucas Bernard</h3><p class="user-role">Data Analyst • Analytics</p><p class="user-location"><i class="bi bi-geo-alt"></i> Toulouse, France</p></div>
        <div class="card-stats">
          <div class="stat"><span class="stat-value">28</span><span class="stat-label">Projets</span></div>
          <div class="stat"><span class="stat-value">134</span><span class="stat-label">Tâches</span></div>
          <div class="stat"><span class="stat-value">67</span><span class="stat-label">Avis</span></div>
        </div>
      </div>
      <div class="card-actions"><button class="btn btn--primary btn--sm"><i class="bi bi-eye"></i> Profil</button><button class="btn btn--outline btn--sm"><i class="bi bi-chat"></i></button></div>
    </div>

    <!-- Team Card -->
    <div class="user-card user-card--team">
      <div class="team-badge"><i class="bi bi-star-fill"></i> Team Lead</div>
      <div class="avatar avatar--md"><span class="avatar-text">EP</span><span class="status-indicator status--online"></span></div>
      <div class="card-content">
        <h3 class="user-name">Emma Petit</h3>
        <p class="user-role">Lead UX Designer</p>
        <div class="contact-info"><span><i class="bi bi-envelope"></i> emma.petit@email.com</span><span><i class="bi bi-telephone"></i> +33 6 00 00 00 00</span></div>
      </div>
      <div class="card-actions"><button class="btn btn--icon btn--primary"><i class="bi bi-chat-fill"></i></button></div>
    </div>
  </div>
</div>
</body>
</html>
