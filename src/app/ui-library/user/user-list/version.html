<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User List - Premium UI Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:#f9fafb;min-height:100vh}

    .user-list-page{max-width:1400px;margin:0 auto;padding:2rem}

    /* HEADER */
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem}
    .page-header h1{font-size:1.75rem;font-weight:700;color:#111827;margin:0 0 .25rem}
    .page-header p{color:#6b7280;margin:0}

    /* TOOLBAR */
    .toolbar{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .search-box{display:flex;align-items:center;gap:.75rem;padding:.625rem 1rem;background:#fff;border:2px solid #e5e7eb;border-radius:.5rem;flex:1;min-width:250px;max-width:400px;transition:all .2s}
    .search-box:focus-within{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
    .search-box i{color:#9ca3af}
    .search-box input{flex:1;border:none;background:none;font-size:.9rem;color:#374151;outline:none}
    .search-box input::placeholder{color:#9ca3af}
    .filters{display:flex;gap:.75rem}
    .filters select{padding:.625rem 2rem .625rem 1rem;background:#fff;border:2px solid #e5e7eb;border-radius:.5rem;font-size:.875rem;color:#374151;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right .5rem center;background-size:1.25em}
    .filters select:focus{outline:none;border-color:#4f46e5}
    .bulk-actions{display:flex;align-items:center;gap:.75rem;margin-left:auto;padding-left:1rem;border-left:1px solid #e5e7eb}
    .bulk-actions.hidden{display:none}
    .selected-count{font-size:.875rem;color:#6b7280;font-weight:500}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.625rem 1.25rem;border:none;border-radius:.5rem;font-size:.875rem;font-weight:600;cursor:pointer;transition:all .2s}
    .btn--sm{padding:.5rem .75rem}
    .btn--primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
    .btn--primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.4)}
    .btn--outline{background:#fff;border:2px solid #e5e7eb;color:#374151}
    .btn--outline:hover{border-color:#4f46e5;color:#4f46e5}
    .btn--danger{background:#fee2e2;color:#dc2626}
    .btn--danger:hover{background:#fecaca}

    /* TABLE */
    .user-list-container{background:#fff;border-radius:1rem;box-shadow:0 4px 20px rgba(0,0,0,.06);overflow:hidden}
    .user-table{width:100%;border-collapse:collapse}
    .user-table thead{background:#f9fafb}
    .user-table thead th{padding:1rem;font-size:.75rem;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;text-align:left;border-bottom:1px solid #e5e7eb}
    .user-table tbody tr{transition:background .15s}
    .user-table tbody tr:hover{background:#f9fafb}
    .user-table tbody tr.selected{background:#eff6ff}
    .user-table tbody tr.selected:hover{background:#dbeafe}
    .user-table tbody tr:not(:last-child) td{border-bottom:1px solid #f3f4f6}
    .user-table tbody td{padding:1rem;vertical-align:middle}
    .checkbox-cell{width:50px;text-align:center}
    .checkbox-cell input{width:18px;height:18px;accent-color:#4f46e5;cursor:pointer}
    .actions-cell{width:120px;text-align:center}

    /* USER CELL */
    .user-cell{display:flex;align-items:center;gap:.75rem}
    .user-avatar{width:40px;height:40px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.875rem;font-weight:600;color:#fff;flex-shrink:0}
    .user-info-cell{display:flex;flex-direction:column}
    .user-name{font-weight:600;color:#111827}
    .user-email{font-size:.8rem;color:#6b7280}

    /* BADGES */
    .role-badge{display:inline-flex;padding:.25rem .625rem;border-radius:9999px;font-size:.7rem;font-weight:600}
    .role--admin{background:#fee2e2;color:#dc2626}
    .role--manager{background:#fffbeb;color:#d97706}
    .role--user{background:#eff6ff;color:#3b82f6}
    .role--guest{background:#f3f4f6;color:#6b7280}
    .status-badge{display:inline-flex;align-items:center;gap:.375rem;font-size:.8rem;font-weight:500}
    .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
    .status--active{color:#10b981}
    .status--active .status-dot{background:#10b981}
    .status--inactive{color:#6b7280}
    .status--inactive .status-dot{background:#9ca3af}
    .status--pending{color:#f59e0b}
    .status--pending .status-dot{background:#f59e0b}
    .last-active{font-size:.875rem;color:#6b7280}

    /* ACTIONS */
    .action-buttons{display:flex;align-items:center;justify-content:center;gap:.25rem}
    .action-btn{padding:.5rem;background:none;border:none;color:#6b7280;cursor:pointer;border-radius:.375rem;transition:all .2s}
    .action-btn:hover{background:#f3f4f6;color:#374151}
    .action-btn--danger:hover{background:#fee2e2;color:#dc2626}

    /* EMPTY */
    .empty-state{text-align:center;padding:4rem 2rem;display:none}
    .empty-state i{font-size:4rem;color:#d1d5db;margin-bottom:1rem;display:block}
    .empty-state h3{font-size:1.125rem;color:#374151;margin:0 0 .5rem}
    .empty-state p{color:#6b7280;margin:0}

    /* PAGINATION */
    .pagination{display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem}
    .pagination-info{font-size:.875rem;color:#6b7280}
    .pagination-controls{display:flex;gap:.25rem}
    .page-btn{min-width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid #e5e7eb;border-radius:.375rem;font-size:.875rem;color:#374151;cursor:pointer;transition:all .2s}
    .page-btn:hover:not(:disabled){border-color:#4f46e5;color:#4f46e5}
    .page-btn:disabled{opacity:.5;cursor:not-allowed}
    .page-btn.active{background:#4f46e5;border-color:#4f46e5;color:#fff}

    @media(max-width:1024px){
      .user-list-page{padding:1rem}
      .toolbar{flex-direction:column;align-items:stretch}
      .search-box{max-width:none}
      .filters{justify-content:stretch}
      .filters select{flex:1}
      .bulk-actions{margin-left:0;padding-left:0;border-left:none;justify-content:space-between}
      .user-list-container{overflow-x:auto}
      .user-table{min-width:800px}
    }
  </style>
</head>
<body>
<div class="user-list-page">
  <div class="page-header">
    <div><h1>Utilisateurs</h1><p>Gérez les utilisateurs de votre application</p></div>
    <button class="btn btn--primary"><i class="bi bi-plus-lg"></i> Nouvel utilisateur</button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-box"><i class="bi bi-search"></i><input type="text" id="searchInput" placeholder="Rechercher un utilisateur..."></div>
    <div class="filters">
      <select id="roleFilter"><option value="">Tous les rôles</option><option value="admin">Admin</option><option value="manager">Manager</option><option value="user">Utilisateur</option><option value="guest">Invité</option></select>
      <select id="statusFilter"><option value="">Tous les statuts</option><option value="active">Actif</option><option value="inactive">Inactif</option><option value="pending">En attente</option></select>
    </div>
    <div class="bulk-actions hidden" id="bulkActions">
      <span class="selected-count" id="selectedCount">0 sélectionné(s)</span>
      <button class="btn btn--danger btn--sm" onclick="deleteSelected()"><i class="bi bi-trash"></i> Supprimer</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="user-list-container">
    <table class="user-table">
      <thead>
        <tr>
          <th class="checkbox-cell"><input type="checkbox" id="selectAll"></th>
          <th>Utilisateur</th>
          <th>Rôle</th>
          <th>Département</th>
          <th>Statut</th>
          <th>Dernière activité</th>
          <th class="actions-cell">Actions</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState"><i class="bi bi-people"></i><h3>Aucun utilisateur trouvé</h3><p>Essayez de modifier vos filtres de recherche.</p></div>
  </div>

  <!-- PAGINATION -->
  <div class="pagination">
    <span class="pagination-info" id="paginationInfo">Affichage 1-8 sur 8 utilisateurs</span>
    <div class="pagination-controls">
      <button class="page-btn" disabled><i class="bi bi-chevron-left"></i></button>
      <button class="page-btn active">1</button>
      <button class="page-btn"><i class="bi bi-chevron-right"></i></button>
    </div>
  </div>
</div>

<script>
const users = [
  { id:1, firstName:'Jean', lastName:'Dupont', email:'jean.dupont@email.com', role:'admin', department:'Direction', status:'active', lastActive:new Date(Date.now()-1000*60*5) },
  { id:2, firstName:'Marie', lastName:'Martin', email:'marie.martin@email.com', role:'manager', department:'Marketing', status:'active', lastActive:new Date(Date.now()-1000*60*60*2) },
  { id:3, firstName:'Pierre', lastName:'Bernard', email:'pierre.bernard@email.com', role:'user', department:'Développement', status:'inactive', lastActive:new Date(Date.now()-1000*60*60*24*7) },
  { id:4, firstName:'Sophie', lastName:'Dubois', email:'sophie.dubois@email.com', role:'user', department:'Design', status:'active', lastActive:new Date(Date.now()-1000*60*60) },
  { id:5, firstName:'Lucas', lastName:'Moreau', email:'lucas.moreau@email.com', role:'guest', department:'Externe', status:'pending', lastActive:new Date(Date.now()-1000*60*60*24*3) },
  { id:6, firstName:'Emma', lastName:'Petit', email:'emma.petit@email.com', role:'user', department:'Ressources Humaines', status:'active', lastActive:new Date(Date.now()-1000*60*30) },
  { id:7, firstName:'Thomas', lastName:'Robert', email:'thomas.robert@email.com', role:'manager', department:'Ventes', status:'active', lastActive:new Date(Date.now()-1000*60*60*4) },
  { id:8, firstName:'Léa', lastName:'Richard', email:'lea.richard@email.com', role:'user', department:'Support', status:'inactive', lastActive:new Date(Date.now()-1000*60*60*24*14) }
];

let selectedIds = new Set();

const roleLabels = { admin:'Admin', manager:'Manager', user:'Utilisateur', guest:'Invité' };
const statusLabels = { active:'Actif', inactive:'Inactif', pending:'En attente' };

function getInitials(u) { return (u.firstName[0]+u.lastName[0]).toUpperCase(); }

function formatLastActive(d) {
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff/60000);
  if (mins < 1) return "À l'instant";
  if (mins < 60) return `Il y a ${mins} min`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24) return `Il y a ${hrs}h`;
  const days = Math.floor(hrs/24);
  if (days < 7) return `Il y a ${days}j`;
  const weeks = Math.floor(days/7);
  return `Il y a ${weeks} sem.`;
}

function getFiltered() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const role = document.getElementById('roleFilter').value;
  const status = document.getElementById('statusFilter').value;
  return users.filter(u => {
    const matchSearch = !search || `${u.firstName} ${u.lastName} ${u.email}`.toLowerCase().includes(search);
    const matchRole = !role || u.role === role;
    const matchStatus = !status || u.status === status;
    return matchSearch && matchRole && matchStatus;
  });
}

function renderTable() {
  const filtered = getFiltered();
  const tbody = document.getElementById('userTableBody');
  const empty = document.getElementById('emptyState');

  if (!filtered.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('paginationInfo').textContent = '0 utilisateurs';
    return;
  }
  empty.style.display = 'none';
  document.getElementById('paginationInfo').textContent = `Affichage 1-${filtered.length} sur ${filtered.length} utilisateurs`;

  tbody.innerHTML = filtered.map(u => `
    <tr class="${selectedIds.has(u.id)?'selected':''}">
      <td class="checkbox-cell"><input type="checkbox" data-id="${u.id}" ${selectedIds.has(u.id)?'checked':''}></td>
      <td><div class="user-cell"><div class="user-avatar">${getInitials(u)}</div><div class="user-info-cell"><span class="user-name">${u.firstName} ${u.lastName}</span><span class="user-email">${u.email}</span></div></div></td>
      <td><span class="role-badge role--${u.role}">${roleLabels[u.role]}</span></td>
      <td>${u.department}</td>
      <td><span class="status-badge status--${u.status}"><span class="status-dot"></span>${statusLabels[u.status]}</span></td>
      <td><span class="last-active">${formatLastActive(u.lastActive)}</span></td>
      <td class="actions-cell"><div class="action-buttons"><button class="action-btn" title="Voir" onclick="alert('Voir ${u.firstName} ${u.lastName}')"><i class="bi bi-eye"></i></button><button class="action-btn" title="Modifier" onclick="alert('Modifier ${u.firstName} ${u.lastName}')"><i class="bi bi-pencil"></i></button><button class="action-btn action-btn--danger" title="Supprimer" onclick="alert('Supprimer ${u.firstName} ${u.lastName}')"><i class="bi bi-trash"></i></button></div></td>
    </tr>
  `).join('');

  // Row checkboxes
  tbody.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      const id = parseInt(cb.dataset.id);
      if (cb.checked) selectedIds.add(id); else selectedIds.delete(id);
      updateSelection();
      renderTable();
    });
  });
}

function updateSelection() {
  const bulk = document.getElementById('bulkActions');
  const countEl = document.getElementById('selectedCount');
  const selectAll = document.getElementById('selectAll');
  const filtered = getFiltered();
  if (selectedIds.size > 0) {
    bulk.classList.remove('hidden');
    countEl.textContent = `${selectedIds.size} sélectionné(s)`;
  } else {
    bulk.classList.add('hidden');
  }
  selectAll.checked = filtered.length > 0 && filtered.every(u => selectedIds.has(u.id));
}

function deleteSelected() {
  alert(`Suppression de ${selectedIds.size} utilisateur(s)`);
  selectedIds.clear();
  updateSelection();
  renderTable();
}

// Select all
document.getElementById('selectAll').addEventListener('change', function() {
  const filtered = getFiltered();
  if (this.checked) filtered.forEach(u => selectedIds.add(u.id));
  else filtered.forEach(u => selectedIds.delete(u.id));
  updateSelection();
  renderTable();
});

// Filters
document.getElementById('searchInput').addEventListener('input', () => { selectedIds.clear(); updateSelection(); renderTable(); });
document.getElementById('roleFilter').addEventListener('change', () => { selectedIds.clear(); updateSelection(); renderTable(); });
document.getElementById('statusFilter').addEventListener('change', () => { selectedIds.clear(); updateSelection(); renderTable(); });

renderTable();
</script>
</body>
</html>
